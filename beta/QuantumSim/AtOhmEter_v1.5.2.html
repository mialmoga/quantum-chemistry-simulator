<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AtOhmEter V1.5.2 - Bloom Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #44ddcc;
            background: rgba(0,0,0,0.75);
            padding: 14px 18px;
            border-left: 2px solid #ff5555;
            z-index: 10;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        #ui h1 { font-size: 15px; letter-spacing: 0.12em; color: #eee; }
        #ui .mode { font-size: 9px; color: #ffaa00; margin-top: 4px; letter-spacing: 0.2em; }
        #ui .info { font-size: 9px; color: #44ddcc88; margin-top: 8px; line-height: 1.7; }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #44ddcc;
            background: rgba(0,0,0,0.75);
            padding: 12px 16px;
            border-left: 2px solid #44ddcc44;
            z-index: 10;
            backdrop-filter: blur(4px);
        }
        #controls label { font-size: 9px; letter-spacing: 0.15em; color: #ffaa0099; display: block; margin-bottom: 2px; }
        #controls input[type=range] {
            width: 160px; accent-color: #ff5555;
            display: block; margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>AtOhmEter // V1.5.2</h1>
        <div class="mode">MODO: GAS CUÁNTICO + UNREAL BLOOM</div>
        <div class="info">
            NÚCLEOS: H⁺ + H⁺ &nbsp;|&nbsp; INTERFERENCIA: ACTIVA<br>
            DRAG: órbita &nbsp;|&nbsp; SCROLL: zoom
        </div>
    </div>

    <div id="controls">
        <label>BLOOM STRENGTH</label>
        <input type="range" id="bloomStrength" min="0" max="4" step="0.05" value="1.8">
        <label>BLOOM RADIUS</label>
        <input type="range" id="bloomRadius" min="0" max="1" step="0.01" value="0.4">
        <label>BLOOM THRESHOLD</label>
        <input type="range" id="bloomThreshold" min="0" max="1" step="0.01" value="0.08">
        <label>VELOCIDAD</label>
        <input type="range" id="speed" min="0.1" max="6" step="0.1" value="3.0">
    </div>

    <script type="importmap">
    {
      "imports": {
        "three": "/lib/three/build/three.module.js",
        "three/addons/": "/lib/three/examples/jsm/"
      }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        // ─── RENDERER ───────────────────────────────────────────────
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 7;

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;

        // ─── POST-PROCESSING ────────────────────────────────────────
        const renderPass = new RenderPass(scene, camera);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.8,   // strength
            0.4,   // radius
            0.08   // threshold
        );

        const outputPass = new OutputPass();

        const composer = new EffectComposer(renderer);
        composer.addPass(renderPass);
        composer.addPass(bloomPass);
        composer.addPass(outputPass);

        // ─── CONTROLES UI ───────────────────────────────────────────
        let speedMult = 3.0;
        document.getElementById('bloomStrength').addEventListener('input', e => {
            bloomPass.strength = parseFloat(e.target.value);
        });
        document.getElementById('bloomRadius').addEventListener('input', e => {
            bloomPass.radius = parseFloat(e.target.value);
        });
        document.getElementById('bloomThreshold').addEventListener('input', e => {
            bloomPass.threshold = parseFloat(e.target.value);
        });
        document.getElementById('speed').addEventListener('input', e => {
            speedMult = parseFloat(e.target.value);
        });

        // ─── VOLUMEN: CUBO FRONT-SIDE ────────────────────────────────
        // FrontSide: los fragmentos se generan en la cara de entrada del rayo.
        // vWorldPos = punto exacto donde el rayo ENTRA al volumen.
        // Marchamos desde ahí hacia adentro con rayDir (cámara → superficie).
        const BOX = 3.2; // half-size del cubo de marching
        const geometry = new THREE.BoxGeometry(BOX * 2, BOX * 2, BOX * 2);

        const material = new THREE.ShaderMaterial({
            uniforms: {
                uTime:      { value: 0.0 },
                uCameraPos: { value: new THREE.Vector3() },
                uBoxSize:   { value: BOX }
            },
            vertexShader: /* glsl */`
                varying vec3 vWorldPos;
                void main() {
                    // Posición en espacio mundo — punto de entrada del rayo
                    vec4 wp = modelMatrix * vec4(position, 1.0);
                    vWorldPos = wp.xyz;
                    gl_Position = projectionMatrix * viewMatrix * wp;
                }
            `,
            fragmentShader: /* glsl */`
                precision highp float;

                varying vec3 vWorldPos;
                uniform vec3  uCameraPos;
                uniform float uTime;
                uniform float uBoxSize;

                // ── Campo de interferencia cuántica ──────────────────
                float map(vec3 p) {
                    float d1 = length(p - vec3( 0.55, 0.0, 0.0));
                    float d2 = length(p - vec3(-0.55, 0.0, 0.0));

                    // Ondas esféricas que se propagan e interfieren
                    float w1 = cos(13.0 * d1 - uTime) * exp(-d1 * 1.1);
                    float w2 = cos(13.0 * d2 - uTime) * exp(-d2 * 1.1);

                    // Modulación de fase cruzada (efecto entrelazamiento)
                    float cross = sin(7.0 * d1 + 7.0 * d2 - uTime * 0.7) * 0.3;

                    return w1 + w2 + cross;
                }

                // ── Intersección rayo-AABB para punto de SALIDA ──────
                // Dado que estamos en FrontSide, vWorldPos es el punto de
                // ENTRADA. Calculamos cuánto puede avanzar el rayo antes
                // de salir del cubo.
                float boxExit(vec3 ro, vec3 rd, float bs) {
                    vec3 tMax = (sign(rd) * bs - ro) / rd;
                    return min(min(tMax.x, tMax.y), tMax.z);
                }

                void main() {
                    // Dirección del rayo: cámara → punto de entrada (FrontSide ✓)
                    vec3 rayDir = normalize(vWorldPos - uCameraPos);
                    vec3 rayPos = vWorldPos;

                    // Distancia máxima dentro del cubo
                    float tMax = boxExit(rayPos, rayDir, uBoxSize - 0.001);
                    // Paso de marching adaptado a la distancia disponible
                    float stepSize = tMax / 48.0;

                    vec4 col = vec4(0.0);

                    for (int i = 0; i < 48; i++) {
                        // Salir si ya salimos del cubo
                        if (float(i) * stepSize > tMax) break;
                        // Early exit si ya es opaco
                        if (col.a >= 0.95) break;

                        float f  = map(rayPos);
                        float af = abs(f);

                        if (af > 0.28) {
                            // Colores HDR (valores > 1 para que Bloom los capture)
                            vec3 posColor = vec3(2.8, 0.15, 0.55);   // magenta caliente
                            vec3 negColor = vec3(0.15, 1.6, 2.8);    // cian frío

                            vec3 baseCol = mix(negColor, posColor, step(0.0, f));

                            // Resonancia dorada en picos de interferencia
                            float peak = smoothstep(0.5, 0.92, af);
                            baseCol += vec3(3.2, 2.0, 0.4) * peak;

                            // Opacidad proporcional a la intensidad del campo
                            float alpha = (af - 0.28) * 0.18 * stepSize / 0.12;
                            alpha = clamp(alpha, 0.0, 0.06);

                            // Compositing front-to-back correcto
                            col.rgb += baseCol * alpha * (1.0 - col.a);
                            col.a   += alpha * (1.0 - col.a);
                        }

                        rayPos += rayDir * stepSize;
                    }

                    // Descarte de píxeles vacíos (evita artefactos en bordes)
                    if (col.a < 0.005) discard;

                    gl_FragColor = col;
                }
            `,
            transparent: true,
            side: THREE.FrontSide,   // ← CORRECCIÓN CLAVE
            depthWrite: false,
            // Sin AdditiveBlending — el composer/Bloom maneja el brillo
            blending: THREE.NormalBlending
        });

        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // ─── PARTÍCULAS DE FONDO ─────────────────────────────────────
        // Un poco de ambiente cuántico sin costo
        const starCount = 600;
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount * 3; i++) {
            starPos[i] = (Math.random() - 0.5) * 80;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({
            color: 0x224455,
            size: 0.08,
            sizeAttenuation: true
        });
        scene.add(new THREE.Points(starGeo, starMat));

        // ─── LOOP ────────────────────────────────────────────────────
        let lastT = 0;
        function animate(t) {
            requestAnimationFrame(animate);
            const dt = (t - lastT) / 1000;
            lastT = t;

            material.uniforms.uTime.value += dt * speedMult;
            material.uniforms.uCameraPos.value.copy(camera.position);

            controls.update();
            composer.render();
        }
        animate(0);

        // ─── RESIZE ──────────────────────────────────────────────────
        window.addEventListener('resize', () => {
            const w = window.innerWidth, h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            composer.setSize(w, h);
            bloomPass.resolution.set(w, h);
        });
    </script>
</body>
</html>
