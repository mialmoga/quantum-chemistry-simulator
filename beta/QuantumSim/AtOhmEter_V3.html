<script type="module">
import * as THREE from 'three';
import { OrbitControls }  from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }     from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }     from 'three/addons/postprocessing/OutputPass.js';

// ═══════════════════════════════════════════════════════════════
//  TABLA PERIÓDICA
// ═══════════════════════════════════════════════════════════════
const ELEMENTS = [
    '—','H','He','Li','Be','B','C','N','O','F','Ne',
    'Na','Mg','Al','Si','P','S','Cl','Ar','K','Ca',
    'Sc','Ti','V','Cr','Mn','Fe','Co','Ni','Cu','Zn',
    'Ga','Ge','As','Se','Br','Kr','Rb','Sr','Y','Zr',
    'Nb','Mo','Tc','Ru','Rh','Pd','Ag','Cd','In','Sn',
    'Sb','Te','I','Xe','Cs','Ba','La','Ce','Pr','Nd',
    'Pm','Sm','Eu','Gd','Tb','Dy','Ho','Er','Tm','Yb',
    'Lu','Hf','Ta','W','Re','Os','Ir','Pt','Au','Hg',
    'Tl','Pb','Bi','Po','At','Rn','Fr','Ra','Ac','Th',
    'Pa','U','Np','Pu','Am','Cm','Bk','Cf','Es','Fm',
    'Md','No','Lr','Rf','Db','Sg','Bh','Hs','Mt','Ds',
    'Rg','Cn','Nh','Fl','Mc','Lv','Ts','Og'
];
const ELEMENT_NAMES = {
    1:'Hidrógeno',2:'Helio',3:'Litio',4:'Berilio',5:'Boro',
    6:'Carbono',7:'Nitrógeno',8:'Oxígeno',9:'Flúor',10:'Neón',
    11:'Sodio',12:'Magnesio',13:'Aluminio',14:'Silicio',15:'Fósforo',
    16:'Azufre',17:'Cloro',18:'Argón',19:'Potasio',20:'Calcio',
    26:'Hierro',29:'Cobre',47:'Plata',79:'Oro',92:'Uranio'
};

function atomicPeriod(Z) {
    return Z<=2?1:Z<=10?2:Z<=18?3:Z<=36?4:Z<=54?5:Z<=86?6:7;
}
function nuclearFrequency(Z, N) {
    if (Z===0) return 0.0;
    const A=Z+N, period=atomicPeriod(Z);
    const ω_base=Math.pow(2.0,period-1);
    const periodStart=[0,1,3,11,19,37,55,87][period-1];
    const periodSize=[0,2,8,8,18,18,32,32][period-1]||32;
    const t=(Z-periodStart)/periodSize;
    const ω_intra=1.0+t*0.618;
    const massCorrection=Math.sqrt(Z/A);
    return ω_base*ω_intra*massCorrection;
}
function nuclearRadius(A) {
    if (A===0) return 0.3;
    return 0.3*Math.pow(A,1.0/3.0);
}

// ═══════════════════════════════════════════════════════════════
//  ESTADO
// ═══════════════════════════════════════════════════════════════
let Z=0, N=0;
function getA()      { return Z+N; }
function getSymbol() { return ELEMENTS[Z]||`Z${Z}`; }
function getName()   { return ELEMENT_NAMES[Z]||getSymbol(); }

function nucleonPositions(count) {
    if (count===0) return [];
    const positions=[], golden=Math.PI*(3.0-Math.sqrt(5.0)), R=nuclearRadius(count);
    for (let i=0;i<count;i++) {
        const y=1.0-(i/Math.max(count-1,1))*2.0;
        const r=Math.sqrt(Math.max(0,1.0-y*y));
        const theta=golden*i;
        positions.push(new THREE.Vector3(R*r*Math.cos(theta),R*y,R*r*Math.sin(theta)));
    }
    return positions;
}

// ═══════════════════════════════════════════════════════════════
//  THREE.JS
// ═══════════════════════════════════════════════════════════════
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.toneMapping=THREE.ReinhardToneMapping;
renderer.toneMappingExposure=1.4;
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.001,10000);
camera.position.set(0,0,8);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;
controls.dampingFactor=0.07;
controls.minDistance=0.002;
controls.maxDistance=500;

const bloomPass=new UnrealBloomPass(new THREE.Vector2(window.innerWidth,window.innerHeight),2.2,0.5,0.06);
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

document.getElementById('bStr').oninput=e=>bloomPass.strength=+e.target.value;
document.getElementById('bRad').oninput=e=>bloomPass.radius=+e.target.value;
document.getElementById('bThr').oninput=e=>bloomPass.threshold=+e.target.value;
document.getElementById('bExp').oninput=e=>renderer.toneMappingExposure=+e.target.value;

// ═══════════════════════════════════════════════════════════════
//  UNIFORMS — incluye los 4 canales orbitales spdf
// ═══════════════════════════════════════════════════════════════
const MAX_SOURCES=32;
const uSources=new Array(MAX_SOURCES).fill(null).map(()=>new THREE.Vector3());
const uIsProton=new Float32Array(MAX_SOURCES);

const uniforms={
    uTime:        {value:0.0},
    uCameraPos:   {value:new THREE.Vector3()},
    uBoxSize:     {value:4.0},
    uOmega:       {value:1.0},
    uZ:           {value:0.0},
    uA:           {value:0.0},
    uNucRadius:   {value:0.3},
    uShowShells:  {value:1.0},
    uZoomLevel:   {value:0.0},
    uOrbRadius:   {value:2.5},
    uNShells:     {value:1.0},
    uSources:     {value:uSources},
    uIsProton:    {value:uIsProton},
    uSourceCount: {value:0},
    // ── spdf toggles & intensidades ──
    uShowS:  {value:1.0},
    uShowP:  {value:1.0},
    uShowD:  {value:1.0},
    uShowF:  {value:1.0},
    uAmpS:   {value:1.0},
    uAmpP:   {value:0.85},
    uAmpD:   {value:0.7},
    uAmpF:   {value:0.55},
};

// ═══════════════════════════════════════════════════════════════
//  SHADERS
// ═══════════════════════════════════════════════════════════════
const vertexShader=/* glsl */`
    varying vec3 vWorldPos;
    void main() {
        vec4 wp=modelMatrix*vec4(position,1.0);
        vWorldPos=wp.xyz;
        gl_Position=projectionMatrix*viewMatrix*wp;
    }
`;

const fragmentShader=/* glsl */`
precision highp float;

varying vec3 vWorldPos;
uniform vec3  uCameraPos;
uniform float uTime;
uniform float uBoxSize;
uniform float uOmega;
uniform float uZ;
uniform float uA;
uniform float uNucRadius;
uniform float uShowShells;
uniform float uZoomLevel;
uniform float uOrbRadius;
uniform float uNShells;

uniform vec3  uSources[32];
uniform float uIsProton[32];
uniform int   uSourceCount;

// ── spdf ──────────────────────────────────────────────────────
uniform float uShowS;
uniform float uShowP;
uniform float uShowD;
uniform float uShowF;
uniform float uAmpS;
uniform float uAmpP;
uniform float uAmpD;
uniform float uAmpF;

// ── Ruido 3D ─────────────────────────────────────────────────
float hash(vec3 p){p=fract(p*0.3183099+0.1);p*=17.0;return fract(p.x*p.y*p.z*(p.x+p.y+p.z));}
float noise3(vec3 x){vec3 i=floor(x);vec3 f=fract(x);f=f*f*(3.0-2.0*f);return mix(mix(mix(hash(i),hash(i+vec3(1,0,0)),f.x),mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z);}

// ── Tubo gluón ───────────────────────────────────────────────
float colorTube(vec3 p,vec3 v1,vec3 v2){vec3 ab=v2-v1;float len=length(ab);if(len<0.001)return 0.0;float t=clamp(dot(p-v1,ab)/(len*len),0.0,1.0);float d=distance(p,v1+t*ab);return exp(-d*d*18.0)*(0.4+len*1.2);}

// ── Vórtice quark ────────────────────────────────────────────
float quarkVortex(vec3 p,vec3 center,float phase){
    vec3 d=p-center;float r=length(d);if(r<0.0001)return 3.0;
    float radial=exp(-r*r*22.0);
    float azimuth=atan(d.y,d.x);float polar=atan(length(d.xy),d.z);
    float vortexOsc=sin(azimuth*3.0+polar*2.0+uTime*uOmega*4.0+phase);
    float pulse=pow(0.5+0.5*sin(uTime*uOmega*6.28318+phase),3.0);
    return radial*(1.0+vortexOsc*0.4)*(0.3+pulse*2.5);
}

// ── Vacío cuántico ───────────────────────────────────────────
float quarkyVacuum(vec3 p,float t){return noise3(p*5.8+t*0.3)*0.6+noise3(p*12.0-t*0.17+3.7)*0.4;}

// ── Onda de nucleón ──────────────────────────────────────────
float nucleonWave(vec3 p,vec3 src,float omega,float t,float isP){
    float d=distance(p,src);if(d<0.0001)return 1.0;
    float wave=cos(omega*12.0*d-t*omega*3.14159)*exp(-d*d*2.2);
    wave*=isP>0.5?1.0:-1.0;
    return wave;
}

// ═══════════════════════════════════════════════════════════════
//  ORBITALES — modulación angular real
//
//  Harmónicos esféricos reales simplificados:
//    S:  Y_0^0  = 1              (esférico)
//    P:  Y_1^0  = cos(θ)         (lóbulos ±Z)
//        Y_1^±1 = sin(θ)cos/sin(φ)  (lóbulos ±X, ±Y)
//    D:  Y_2^0  = 3cos²θ−1      (corona ecuatorial)
//        Y_2^±2 = sin²θ·cos/sin(2φ) (tréboles)
//    F:  Y_3^0  = cos(3θ)·env    (triple lóbulo)
//        Y_3^±3 = sin³θ·cos/sin(3φ) (6 lóbulos)
// ═══════════════════════════════════════════════════════════════

float radialEnvelope(float r, float R_orb, float nShells) {
    float width  = R_orb*(0.25+nShells*0.08);
    float env    = exp(-pow(max(0.0,r-R_orb)/width,2.0))
                 * (1.0-exp(-r*r/(R_orb*0.3)));
    float nodeFreq = nShells*3.14159/R_orb;
    float standing = sin(nodeFreq*r);
    float globalMod = 0.6+0.4*sin(r*3.14159*nShells/R_orb+0.5);
    return env*standing*standing*globalMod;
}

// ─── S orbital ───────────────────────────────────────────────
float orbitalS(vec3 p, float R_orb, float nShells) {
    float r=length(p);
    if(r<0.001||R_orb<0.01) return 0.0;
    // Y_0^0 = constante — simetría esférica perfecta
    return radialEnvelope(r,R_orb,nShells);
}

// ─── P orbital (suma de los 3 ejes) ──────────────────────────
float orbitalP(vec3 p, float R_orb, float nShells, float t) {
    float r=length(p);
    if(r<0.001||R_orb<0.01) return 0.0;

    float cosTheta = p.z/r;
    float sinTheta = length(p.xy)/r;
    float phi      = atan(p.y,p.x);

    // P_z: Y_1^0 ∝ cos(θ) — lóbulos en eje Z
    float Pz = cosTheta*cosTheta;

    // P_x: Y_1^1 ∝ sin(θ)cos(φ)
    float Px = sinTheta*cos(phi);
    Px = Px*Px;

    // P_y: Y_1^{-1} ∝ sin(θ)sin(φ)
    float Py = sinTheta*sin(phi);
    Py = Py*Py;

    // Suma coherente de los 3 suborbitales — todos activos simultáneamente
    // Modulación temporal suave (degenerate superposition)
    float a1=0.6+0.4*sin(t*0.31);
    float a2=0.6+0.4*sin(t*0.31+2.094);
    float a3=0.6+0.4*sin(t*0.31+4.189);

    float angular = a1*Pz + a2*Px + a3*Py;

    return radialEnvelope(r,R_orb,max(nShells,2.0)) * angular * 2.5;
}

// ─── D orbital (suma de los 5 suborbitales reales) ─────────
float orbitalD(vec3 p, float R_orb, float nShells, float t) {
    float r=length(p);
    if(r<0.001||R_orb<0.01) return 0.0;

    float cosT = p.z/r;
    float sinT = length(p.xy)/r;
    float phi  = atan(p.y,p.x);

    // d_z2:  Y_2^0  ∝ 3cos²θ − 1
    float dz2 = 3.0*cosT*cosT - 1.0;
    dz2 = dz2*dz2;

    // d_xz: Y_2^1 ∝ sinθ·cosθ·cos(φ)
    float dxz = sinT*cosT*cos(phi);
    dxz = dxz*dxz;

    // d_yz: Y_2^{-1} ∝ sinθ·cosθ·sin(φ)
    float dyz = sinT*cosT*sin(phi);
    dyz = dyz*dyz;

    // d_{x2-y2}: Y_2^2 ∝ sin²θ·cos(2φ)
    float dx2y2 = sinT*sinT*cos(2.0*phi);
    dx2y2 = dx2y2*dx2y2;

    // d_xy: Y_2^{-2} ∝ sin²θ·sin(2φ)
    float dxy = sinT*sinT*sin(2.0*phi);
    dxy = dxy*dxy;

    // Suma degenerada con modulación lenta
    float phase = t*0.21;
    float angular = 0.5*(dz2+dxz+dyz+dx2y2+dxy)
                  + 0.3*(sin(phase)*dz2 + sin(phase+1.257)*dxz + sin(phase+2.513)*dyz);

    return radialEnvelope(r,R_orb,max(nShells,3.0)) * angular * 3.5;
}

// ─── F orbital (suma de 7 suborbitales reales) ─────────────
float orbitalF(vec3 p, float R_orb, float nShells, float t) {
    float r=length(p);
    if(r<0.001||R_orb<0.01) return 0.0;

    float cosT = p.z/r;
    float sinT = length(p.xy)/r;
    float phi  = atan(p.y,p.x);

    float sinT2 = sinT*sinT;
    float cosT2 = cosT*cosT;

    // f_z3:     Y_3^0  ∝ 5cos³θ − 3cosθ
    float fz3   = 5.0*cosT2*cosT - 3.0*cosT;
    fz3 = fz3*fz3;

    // f_{xz2}: Y_3^1  ∝ sinθ(5cos²θ−1)cosφ
    float fxz2  = sinT*(5.0*cosT2-1.0)*cos(phi);
    fxz2 = fxz2*fxz2;

    // f_{yz2}: Y_3^{-1} ∝ sinθ(5cos²θ−1)sinφ
    float fyz2  = sinT*(5.0*cosT2-1.0)*sin(phi);
    fyz2 = fyz2*fyz2;

    // f_{xyz}: Y_3^2  ∝ sin²θ·cosθ·sin(2φ)
    float fxyz  = sinT2*cosT*sin(2.0*phi);
    fxyz = fxyz*fxyz;

    // f_{z(x2-y2)}: Y_3^{-2} ∝ sin²θ·cosθ·cos(2φ)
    float fzx2  = sinT2*cosT*cos(2.0*phi);
    fzx2 = fzx2*fzx2;

    // f_{x(x2-3y2)}: Y_3^3 ∝ sin³θ·cos(3φ)
    float fx3   = sinT2*sinT*cos(3.0*phi);
    fx3 = fx3*fx3;

    // f_{y(3x2-y2)}: Y_3^{-3} ∝ sin³θ·sin(3φ)
    float fy3   = sinT2*sinT*sin(3.0*phi);
    fy3 = fy3*fy3;

    float phase = t*0.15;
    float angular = (fz3+fxz2+fyz2+fxyz+fzx2+fx3+fy3)/7.0
                  + 0.25*sin(phase)*fz3
                  + 0.25*sin(phase+0.898)*fxz2
                  + 0.25*sin(phase+1.795)*fyz2;

    return radialEnvelope(r,R_orb,max(nShells,4.0)) * angular * 5.0;
}

// ── Box exit ─────────────────────────────────────────────────
float boxExit(vec3 ro,vec3 rd,float bs){vec3 tMax=(sign(rd)*bs-ro)/rd;return min(min(tMax.x,tMax.y),tMax.z);}

// ═══════════════════════════════════════════════════════════════
//  MAIN — RAYMARCHING
// ═══════════════════════════════════════════════════════════════
void main() {
    if(uSourceCount==0){discard;}

    vec3 rayDir=normalize(vWorldPos-uCameraPos);
    vec3 rayPos=vWorldPos;
    float tMax   =boxExit(rayPos,rayDir,uBoxSize-0.001);
    int   steps  =uSourceCount>16?28:(uSourceCount>6?38:48);
    float stepSize=tMax/float(steps);

    vec4 col=vec4(0.0);
    float omega=uOmega, R_nuc=uNucRadius, t=uTime;

    float qr=R_nuc*0.38;
    vec3 src0=uSourceCount>0?uSources[0]:vec3(0.0);
    vec3 q1=src0+vec3(0.0,qr,0.0);
    vec3 q2=src0+vec3(qr*0.866,-qr*0.5,0.0);
    vec3 q3=src0+vec3(-qr*0.866,-qr*0.5,0.0);
    float qrot=t*omega*0.8;
    mat2 rot2=mat2(cos(qrot),-sin(qrot),sin(qrot),cos(qrot));
    q1.xy=rot2*(q1.xy-src0.xy)+src0.xy;
    q2.xy=rot2*(q2.xy-src0.xy)+src0.xy;
    q3.xy=rot2*(q3.xy-src0.xy)+src0.xy;

    for(int i=0;i<64;i++){
        if(float(i)*stepSize>tMax) break;
        if(col.a>=0.97) break;

        vec3 p=rayPos+rayDir*(float(i)*stepSize+stepSize*0.5);

        // ── 1. CAMPO NUCLEAR ──────────────────────────────────────
        float nucField=0.0;
        float distFromOrigin=length(p);
        float nucZone=R_nuc*2.5+1.0/omega;
        if(distFromOrigin<nucZone*3.0){
            for(int s=0;s<32;s++){
                if(s>=uSourceCount) break;
                float ds=distance(p,uSources[s]);
                if(ds>2.2) continue;
                nucField+=nucleonWave(p,uSources[s],omega,t,uIsProton[s]);
            }
        }

        // ── 2. QUARKS ─────────────────────────────────────────────
        float quarkField=0.0, tubeField=0.0;
        float quarkVis=smoothstep(0.3,1.0,uZoomLevel);
        if(quarkVis>0.01){
            quarkField+=quarkVortex(p,q1,0.0);
            quarkField+=quarkVortex(p,q2,2.0943951);
            quarkField+=quarkVortex(p,q3,4.1887902);
            tubeField+=colorTube(p,q1,q2);
            tubeField+=colorTube(p,q2,q3);
            tubeField+=colorTube(p,q3,q1);
        }

        // ── 3. MAR VIRTUAL ────────────────────────────────────────
        float seaField=0.0;
        if(distFromOrigin<R_nuc*2.5)
            seaField=quarkyVacuum(p,t)*0.15*exp(-distFromOrigin/(R_nuc*1.5));

        // ── 4. ORBITALES spdf ─────────────────────────────────────
        float orbS=0.0, orbP=0.0, orbD=0.0, orbF=0.0;
        if(uShowShells>0.5 && uZ>0.0){
            float R=uOrbRadius, n=uNShells;
            if(uShowS>0.5) orbS=orbitalS(p,R,n)        * uAmpS;
            if(uShowP>0.5) orbP=orbitalP(p,R,n,t)      * uAmpP;
            if(uShowD>0.5) orbD=orbitalD(p,R,n,t)      * uAmpD;
            if(uShowF>0.5) orbF=orbitalF(p,R,n,t)      * uAmpF;
        }

        // ══ COLORACIÓN ════════════════════════════════════════════

        // Campo nuclear (rojo/cian)
        float af=abs(nucField);
        if(af>0.12){
            vec3 posCol=vec3(2.2,0.12,0.45);
            vec3 negCol=vec3(0.12,1.4,2.2);
            vec3 baseCol=mix(negCol,posCol,step(0.0,nucField));
            float peak=smoothstep(0.45,0.88,af);
            baseCol+=vec3(3.0,1.8,0.3)*peak;
            float alpha=(af-0.12)*0.14*stepSize/0.1;
            alpha=clamp(alpha,0.0,0.05);
            col.rgb+=baseCol*alpha*(1.0-col.a);
            col.a+=alpha*(1.0-col.a);
        }

        // Quarks
        if(quarkField>0.15&&quarkVis>0.01){
            vec3 qCol=vec3(2.8,2.2,1.4);
            vec3 halo=vec3(1.4,0.9,0.5)*smoothstep(0.15,0.6,quarkField);
            float qa=clamp(quarkField*0.12*quarkVis,0.0,0.08);
            col.rgb+=(qCol*smoothstep(0.6,1.5,quarkField)+halo)*qa*(1.0-col.a);
            col.a+=qa*(1.0-col.a);
        }
        if(tubeField>0.08&&quarkVis>0.01){
            float ta=clamp(tubeField*0.15*quarkVis,0.0,0.1);
            col.rgb+=vec3(3.5,2.2,0.3)*ta*(1.0-col.a);
            col.a+=ta*(1.0-col.a);
        }

        // Sea
        if(seaField>0.0){
            float sa=seaField*0.04;
            col.rgb+=vec3(0.6,0.7,0.9)*seaField*sa*(1.0-col.a);
            col.a+=sa*(1.0-col.a);
        }

        // ─── S orbital — teal/cian (heredado v2) ─────────────────
        if(orbS>0.02){
            vec3 sCol=vec3(0.3,2.0,1.4); // teal
            float breathe=0.7+0.3*sin(t*omega*0.5);
            float oa=clamp(orbS*0.06*breathe,0.0,0.04);
            col.rgb+=sCol*oa*(1.0-col.a);
            col.a+=oa*(1.0-col.a);
        }

        // ─── P orbital — naranja ──────────────────────────────────
        if(orbP>0.01){
            // Naranja vibrante: FF A03C
            vec3 pCol=vec3(2.2,0.85,0.1);
            float breathe=0.65+0.35*sin(t*omega*0.42+1.0);
            float oa=clamp(orbP*0.055*breathe,0.0,0.045);
            col.rgb+=pCol*oa*(1.0-col.a);
            col.a+=oa*(1.0-col.a);
        }

        // ─── D orbital — verde ────────────────────────────────────
        if(orbD>0.01){
            // Verde brillante: 50DC78
            vec3 dCol=vec3(0.15,2.0,0.45);
            float breathe=0.6+0.4*sin(t*omega*0.35+2.1);
            float oa=clamp(orbD*0.05*breathe,0.0,0.04);
            col.rgb+=dCol*oa*(1.0-col.a);
            col.a+=oa*(1.0-col.a);
        }

        // ─── F orbital — púrpura ──────────────────────────────────
        if(orbF>0.01){
            // Púrpura: B464FF
            vec3 fCol=vec3(0.95,0.25,2.2);
            float breathe=0.55+0.45*sin(t*omega*0.28+3.3);
            float oa=clamp(orbF*0.045*breathe,0.0,0.038);
            col.rgb+=fCol*oa*(1.0-col.a);
            col.a+=oa*(1.0-col.a);
        }
    }

    if(col.a<0.004) discard;
    gl_FragColor=col;
}
`;

// ═══════════════════════════════════════════════════════════════
//  MESH
// ═══════════════════════════════════════════════════════════════
const BOX=4.0;
const material=new THREE.ShaderMaterial({uniforms,vertexShader,fragmentShader,transparent:true,side:THREE.FrontSide,depthWrite:false,blending:THREE.NormalBlending});
const mesh=new THREE.Mesh(new THREE.BoxGeometry(BOX*2,BOX*2,BOX*2),material);
scene.add(mesh);

const starGeo=new THREE.BufferGeometry();
const starPos=new Float32Array(800*3);
for(let i=0;i<800*3;i++) starPos[i]=(Math.random()-0.5)*120;
starGeo.setAttribute('position',new THREE.BufferAttribute(starPos,3));
scene.add(new THREE.Points(starGeo,new THREE.PointsMaterial({color:0x112233,size:0.06,sizeAttenuation:true})));

// ═══════════════════════════════════════════════════════════════
//  SYNC
// ═══════════════════════════════════════════════════════════════
function syncNucleus(){
    const A=getA(), ω=nuclearFrequency(Z,N), R=nuclearRadius(A);
    uniforms.uOmega.value=Math.max(ω,0.001);
    uniforms.uZ.value=Z;
    uniforms.uA.value=A;
    uniforms.uNucRadius.value=R;
    uniforms.uSourceCount.value=Math.min(A,MAX_SOURCES);
    const boxSize=Math.max(4.0,R*3.5+2.0);
    uniforms.uBoxSize.value=boxSize;
    mesh.scale.setScalar(boxSize/BOX);
    const allPos=nucleonPositions(A);
    allPos.forEach((pos,i)=>{
        if(i<MAX_SOURCES){uSources[i].copy(pos);uIsProton[i]=i<Z?1.0:0.0;}
    });
    const period=atomicPeriod(Z);
    const R_orb=Math.max(R*1.8,1.2+period*0.35);
    uniforms.uOrbRadius.value=R_orb;
    uniforms.uNShells.value=period;
    const sym=getSymbol(), name=getName();
    document.getElementById('element-display').textContent=
        A===0?'— vacío cuántico —':`${sym} · ${name} · Z=${Z} N=${N} A=${A}`;
    document.getElementById('s-p').textContent=Z;
    document.getElementById('s-n').textContent=N;
    document.getElementById('s-a').textContent=A;
}

function smoothstep(e0,e1,x){const t=Math.max(0,Math.min(1,(x-e0)/(e1-e0)));return t*t*(3-2*t);}

function updateZoomLevel(){
    const dist=camera.position.length(), R=Math.max(uniforms.uNucRadius.value,0.3);
    uniforms.uZoomLevel.value=1.0-smoothstep(R*0.8,R*3.0,dist);
    uniforms.uCameraPos.value.copy(camera.position);
    const label=dist>R*8?'orbital':dist>R*2?'núcleo':'quarks ⚡';
    document.getElementById('s-z').textContent=label;
}

// ═══════════════════════════════════════════════════════════════
//  BOTONES PRINCIPALES
// ═══════════════════════════════════════════════════════════════
document.getElementById('btn-addP').onclick=()=>{Z++;syncNucleus();};
document.getElementById('btn-addN').onclick=()=>{N++;syncNucleus();};
document.getElementById('btn-remP').onclick=()=>{if(Z>0){Z--;syncNucleus();}};
document.getElementById('btn-remN').onclick=()=>{if(N>0){N--;syncNucleus();}};
document.getElementById('btn-reset').onclick=()=>{Z=0;N=0;syncNucleus();};

let shellsOn=true;
document.getElementById('btn-shells').onclick=function(){
    shellsOn=!shellsOn;
    uniforms.uShowShells.value=shellsOn?1.0:0.0;
    this.textContent=shellsOn?'Capas ON':'Capas OFF';
};

// ═══════════════════════════════════════════════════════════════
//  PANEL ORBITAL — checkboxes + sliders
// ═══════════════════════════════════════════════════════════════
function bindOrbital(id, uShow, uAmp) {
    const chk = document.getElementById('chk-'+id);
    const sld = document.getElementById('sld-'+id);
    const val = document.getElementById('val-'+id);

    chk.onchange = () => { uniforms[uShow].value = chk.checked ? 1.0 : 0.0; };
    sld.oninput  = () => {
        const v = parseFloat(sld.value);
        uniforms[uAmp].value = v;
        val.textContent = v.toFixed(2);
    };
}

bindOrbital('s', 'uShowS', 'uAmpS');
bindOrbital('p', 'uShowP', 'uAmpP');
bindOrbital('d', 'uShowD', 'uAmpD');
bindOrbital('f', 'uShowF', 'uAmpF');

// ═══════════════════════════════════════════════════════════════
//  LOOP
// ═══════════════════════════════════════════════════════════════
let lastT=0;
function animate(t){
    requestAnimationFrame(animate);
    const dt=Math.min((t-lastT)/1000,0.05);
    lastT=t;
    uniforms.uTime.value+=dt;
    updateZoomLevel();
    controls.update();
    composer.render();
}

Z=1;N=0;
syncNucleus();
animate(0);

window.addEventListener('resize',()=>{
    const w=window.innerWidth,h=window.innerHeight;
    camera.aspect=w/h;
    camera.updateProjectionMatrix();
    renderer.setSize(w,h);
    composer.setSize(w,h);
    bloomPass.resolution.set(w,h);
});
</script>
