<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandbox Conway - Experimento Bloques</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #1a1a1a; 
        }
        canvas { 
            display: block; 
        }
    </style>
    <script type="importmap">
    {
      "imports": {
        "three":          "./lib/three/build/three.module.js",
        "three/addons/":  "./lib/three/examples/jsm/"
      }
    }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. Configuración Básica
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1e1e1e');

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // Movimiento más suave
        controls.dampingFactor = 0.05;

        // 2. Iluminación
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        // 3. Sistema de Materiales y Texturas (Con Respaldo)
        const fallbackColor = 0x8b5a2b; // Color madera por defecto
        
        const blockMaterial = new THREE.MeshStandardMaterial({ 
            color: fallbackColor,
            roughness: 0.8,
            metalness: 0.1
        });

        const textureLoader = new THREE.TextureLoader();
        
        // Intenta cargar la textura en la misma raíz
        textureLoader.load(
            './img/wood2.png',
            (texture) => {
                // Éxito: Se aplica la textura y se blanquea el color base
                console.log('Textura cargada correctamente por Éter.');
                texture.colorSpace = THREE.SRGBColorSpace; // Corrección de color para web moderna
                
                // Configuración para el futuro mosaico UV
                texture.wrapS = THREE.RepeatWrapping;
                texture.wrapT = THREE.RepeatWrapping;

                blockMaterial.map = texture;
                blockMaterial.color.setHex(0xffffff); 
                blockMaterial.needsUpdate = true;
            },
            undefined, // Progreso (no necesario aquí)
            (error) => {
                // Fallo: Se mantiene el color sólido establecido arriba
                console.warn('Textura no encontrada. Usando color de respaldo.');
            }
        );

        // 4. Creación de la Pieza de Prueba ("L")
        function createTetromino() {
            const group = new THREE.Group();
            
            // Geometría base para cada cubo individual
            // El bisel (Bevel) se puede añadir luego si la estética lo requiere
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            
            // Coordenadas locales para formar una 'L'
            const positions = [
                [0, 0, 0],
                [1, 0, 0],
                [2, 0, 0],
                [2, 1, 0]
            ];

            positions.forEach(pos => {
                const mesh = new THREE.Mesh(geometry, blockMaterial);
                mesh.position.set(pos[0], pos[1], pos[2]);
                
                // Aquí es donde en el futuro ajustaremos los mesh.geometry.attributes.uv
                // para que la textura sea continua según el pos[x] y pos[y]
                
                group.add(mesh);
            });

            // Centrar la pieza para la visualización
            new THREE.Box3().setFromObject(group).getCenter(group.position).multiplyScalar(-1);
            return group;
        }

        const lBlock = createTetromino();
        scene.add(lBlock);

        // 5. Animación y Responsividad
        function animate() {
            requestAnimationFrame(animate);
            
            // Rotación ligera para apreciar la luz y el material
            lBlock.rotation.y += 0.005;
            lBlock.rotation.x += 0.002;

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
