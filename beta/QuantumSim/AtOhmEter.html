<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AtOhmEter V1.2 - Full Visibility</title>
    <style>
        body { margin: 0; background: #000205; color: #44ddcc; font-family: 'Courier New', monospace; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; border-left: 3px solid #ff5555; padding-left: 15px; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui">
        <h1 style="font-size: 18px; margin: 0;">AtOhmEter // V1.2</h1>
        <p style="font-size: 10px; color: #ffaa00;">Sintonía: HELIO-4 | MOD: VOLUMEN ALTO</p>
    </div>

    <script type="importmap">
    {
      "imports": {
        "three": "/lib/three/build/three.module.js",
        "three/addons/": "/lib/three/examples/jsm/"
      }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        camera.position.set(0, 1, 3);
        controls.enableDamping = true;

        // ─── GENERACIÓN DE VOLUMEN MEJORADA ──────────────────────────
        const pointCount = 80000; // Un poco menos para ganar rendimiento/brillo
        const positions = new Float32Array(pointCount * 3);
        for (let i = 0; i < pointCount; i++) {
            const r = 3.5 * Math.pow(Math.random(), 0.5); // Concentrar más puntos cerca del núcleo
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2.0 * Math.random() - 1.0);
            positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
            positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            positions[i*3+2] = r * Math.cos(phi);
        }
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        const material = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                sources: { value: [
                    // Helio: Dos protones (3+3 quarks)
                    new THREE.Vector3(0.35, 0, 0), new THREE.Vector3(0.4, 0.1, 0.1), new THREE.Vector3(0.4, -0.1, -0.1),
                    new THREE.Vector3(-0.35, 0, 0), new THREE.Vector3(-0.4, -0.1, 0.1), new THREE.Vector3(-0.4, 0.1, -0.1)
                ]}
            },
            vertexShader: `
                varying vec3 vPosition;
                void main() {
                    vPosition = position;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    // Puntos más grandes y estables
                    gl_PointSize = 3.5 * (2.0 / -mvPosition.z); 
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform float time;
                uniform vec3 sources[6];
                varying vec3 vPosition;

                void main() {
                    float totalAmp = 0.0;
                    for(int i = 0; i < 6; i++) {
                        float d = distance(vPosition, sources[i]);
                        // At-Ohm Kernel: Frecuencia aumentada para ver más detalle
                        totalAmp += exp(-d * d * 4.0) * cos(18.0 * d - time * 5.0);
                    }

                    // Dinámica de Color de Éter
                    vec3 col = vec3(0.0);
                    
                    // Fase Positiva (Fuego Nuclear)
                    col += vec3(1.0, 0.1, 0.2) * max(0.0, totalAmp) * 0.8;
                    // Fase Negativa (Vacío Cuántico)
                    col += vec3(0.1, 0.6, 1.0) * max(0.0, -totalAmp) * 0.8;

                    // REVELACIÓN DEL ORBITAL (El Chladni Dorado)
                    // Buscamos el "sweet spot" de la armónica
                    float orbital = smoothstep(0.5, 0.7, abs(totalAmp)) * smoothstep(1.2, 0.7, abs(totalAmp));
                    col += vec3(1.0, 0.8, 0.2) * orbital * 1.2;

                    // Glow central para no perder el núcleo
                    float coreGlow = exp(-length(vPosition) * 5.0);
                    col += vec3(1.0, 1.0, 1.0) * coreGlow * 0.5;

                    gl_FragColor = vec4(col, 0.8);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const points = new THREE.Points(geometry, material);
        scene.add(points);

        function animate(t) {
            requestAnimationFrame(animate);
            material.uniforms.time.value = t / 1000;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
