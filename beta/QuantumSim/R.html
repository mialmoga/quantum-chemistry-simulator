<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AtOhmEter V1.5 - Field Reality (Hard Fix)</title>
    <style>
        body { margin: 0; background: #000205; overflow: hidden; font-family: 'Courier New', monospace; }
        #ui { 
            position: absolute; top: 20px; left: 20px; color: #44ddcc; 
            background: rgba(4, 6, 15, 0.9); padding: 15px; 
            border-left: 3px solid #ff5555; pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1 style="font-size: 16px; margin: 0; letter-spacing: 2px;">AtOhmEter // V1.5</h1>
        <p style="font-size: 10px; color: #ffaa00;">MODO: GAS CUÁNTICO (RAYMARCHING r183)</p>
    </div>
    <script type="importmap">
    {
      "imports": {
        "three": "/lib/three/build/three.module.js",
        "three/addons/": "/lib/three/examples/jsm/"
      }
    }
    </script>
<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    camera.position.set(0, 0, 5);

    // En r183, para volumen, a veces es mejor una caja que "envuelva" la vista
    const geometry = new THREE.BoxGeometry(6, 6, 6);

    const material = new THREE.ShaderMaterial({
        uniforms: {
            uTime: { value: 0 },
            uCameraPos: { value: new THREE.Vector3() }
        },
        vertexShader: `
            varying vec3 vWorldPos;
            void main() {
                // Pasamos la posición del mundo para que el Raymarching sepa dónde está el "pincel"
                vec4 worldPos = modelMatrix * vec4(position, 1.0);
                vWorldPos = worldPos.xyz;
                gl_Position = projectionMatrix * viewMatrix * worldPos;
            }
        `,
        fragmentShader: `
            precision highp float;
            varying vec3 vWorldPos;
            uniform vec3 uCameraPos;
            uniform float uTime;

            // Función de Campo (El AtOhmEter Core)
            float map(vec3 p) {
                float d1 = distance(p, vec3(0.5, 0.0, 0.0));
                float d2 = distance(p, vec3(-0.5, 0.0, 0.0));
                float wave = cos(12.0 * d1 - uTime * 3.0) * exp(-d1);
                wave += cos(12.0 * d2 - uTime * 3.0) * exp(-d2);
                return wave;
            }

            void main() {
                vec3 rayDir = normalize(vWorldPos - uCameraPos);
                vec3 rayPos = vWorldPos;
                vec4 finalColor = vec4(0.0);

                // Caminamos 30 pasos HACIA ADENTRO del volumen
                for(int i = 0; i < 30; i++) {
                    float f = map(rayPos);
                    if (abs(f) > 0.3) {
                        vec3 col = (f > 0.0) ? vec3(1.0, 0.2, 0.4) : vec3(0.2, 0.8, 1.0);
                        float alpha = (abs(f) - 0.3) * 0.1;
                        finalColor.rgb += col * alpha;
                        finalColor.a += alpha;
                    }
                    rayPos += rayDir * 0.1; // Paso del rayo
                    if (finalColor.a >= 0.95) break;
                }
                gl_FragColor = finalColor;
            }
        `,
        transparent: true,
        side: THREE.DoubleSide, // r183: DoubleSide ayuda a que no desaparezca al entrar la cámara
        depthWrite: false,      // Vital para que el volumen no bloquee otros objetos
        blending: THREE.AdditiveBlending
    });

    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    function animate(t) {
        requestAnimationFrame(animate);
        material.uniforms.uTime.value = t / 1000;
        material.uniforms.uCameraPos.value.copy(camera.position);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
</script>

</body>
</html>
