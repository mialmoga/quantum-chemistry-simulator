<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Wood Tetris — Studio</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #d8c8a8; font-family: 'Georgia', serif; touch-action: none; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  /* HUD */
  .hud {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 16px 22px;
    display: flex; justify-content: space-between; align-items: flex-start;
    pointer-events: none;
    z-index: 10;
    color: #3a2818;
    text-shadow: 0 1px 2px rgba(255, 240, 220, 0.5);
  }
  .hud-block { display: flex; flex-direction: column; gap: 2px; }
  .hud-block.right { align-items: flex-end; }
  .label { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; opacity: 0.55; font-family: 'Helvetica Neue', sans-serif; font-weight: 500; }
  .value { font-size: 26px; font-weight: 300; letter-spacing: 0.04em; font-variant-numeric: tabular-nums; }
  .value.small { font-size: 16px; }

  .hint {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    color: #3a2818; opacity: 0.4; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    font-family: 'Helvetica Neue', sans-serif; font-weight: 500;
    pointer-events: none; text-align: center;
  }

  /* Pause / Game Over overlay */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(216, 200, 168, 0.85);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    z-index: 20; color: #3a2818;
    font-family: 'Georgia', serif;
  }
  .overlay.show { display: flex; }
  .overlay h1 { font-size: 36px; font-weight: 300; letter-spacing: 0.18em; margin-bottom: 10px; text-transform: uppercase; }
  .overlay p { font-size: 12px; letter-spacing: 0.22em; opacity: 0.55; text-transform: uppercase; margin-bottom: 32px; font-family: 'Helvetica Neue', sans-serif; font-weight: 500; }
  .overlay button {
    background: transparent; border: 1px solid #3a2818;
    color: #3a2818; padding: 14px 38px;
    font-family: 'Helvetica Neue', sans-serif; font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase; font-weight: 500;
    cursor: pointer; transition: all 0.3s ease;
  }
  .overlay button:hover, .overlay button:active { background: #3a2818; color: #f5e8d0; }

  /* Touch controls */
  .touch-controls {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: none;
    z-index: 5;
    padding: 0 6px 6px;
    padding-bottom: max(env(safe-area-inset-bottom, 0), 6px);
  }
  .touch-controls.show { display: flex; gap: 4px; }
  .tc-btn {
    flex: 1;
    background: rgba(58, 40, 24, 0.07);
    border: 1px solid rgba(58, 40, 24, 0.12);
    color: #3a2818;
    padding: 14px 0;
    border-radius: 4px;
    font-family: 'Helvetica Neue', sans-serif; font-size: 18px;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    cursor: pointer; transition: background 0.15s;
  }
  .tc-btn:active { background: rgba(58, 40, 24, 0.18); }

  /* Pause button - estilo madera quemada */
  .pause-btn {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    background: rgba(58, 40, 24, 0.08);
    border: 1px solid rgba(58, 40, 24, 0.15);
    color: #3a2818; opacity: 0.6;
    width: 38px; height: 38px;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer; z-index: 11;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }
  .pause-btn:active { opacity: 1; }

  /* Loading */
  #loading {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #3a2818;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; font-weight: 500;
    opacity: 0.6;
    z-index: 30;
    background: #d8c8a8;
  }
</style>
</head>
<body>
  <div id="loading">Loading textures…</div>
  <div id="app"></div>

  <div class="hud">
    <div class="hud-block">
      <span class="label">Score</span>
      <span class="value" id="score">0</span>
    </div>
    <div class="hud-block right">
      <span class="label">Lines</span>
      <span class="value small" id="lines">0</span>
      <span class="label" style="margin-top: 8px;">Level</span>
      <span class="value small" id="level">1</span>
    </div>
  </div>

  <button class="pause-btn" id="pauseBtn">⏸</button>

  <div class="hint" id="hint">← → MOVE  ·  ↑ ROTATE  ·  ↓ DROP  ·  SPACE HARD DROP</div>

  <div class="touch-controls" id="touchControls">
    <button class="tc-btn" data-action="left">◀</button>
    <button class="tc-btn" data-action="rotate">↻</button>
    <button class="tc-btn" data-action="right">▶</button>
    <button class="tc-btn" data-action="soft">▼</button>
    <button class="tc-btn" data-action="hard">⤓</button>
  </div>

  <div class="overlay" id="overlay">
    <h1 id="overlayTitle">Paused</h1>
    <p id="overlaySubtitle">Take a breath</p>
    <button id="overlayBtn">Resume</button>
  </div>

<script type="importmap">

  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.min.js"

<script type="module">
import * as THREE from 'three';

// ===== CONFIG =====
const COLS = 10;
const ROWS = 20;
const CUBE_SIZE = 1.0;
const SUBDIV = 4;
const SUB_SIZE = CUBE_SIZE / SUBDIV;
const PARTICLE_LIFE = 1.6;
const GRAVITY = -22;
const MAX_PARTICLES = 4096;

// ===== CARGA DE TEXTURAS =====
const loader = new THREE.TextureLoader();

function loadTexture(dataUrl, isColor = false) {
  return new Promise((resolve, reject) => {
    loader.load(dataUrl, (tex) => {
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.anisotropy = 8;
      if (isColor) tex.colorSpace = THREE.SRGBColorSpace;
      resolve(tex);
    }, undefined, reject);
  });
}

async function loadAll() {
  const [
    caobaAlbedo, caobaNormal, caobaRough,
    robleAlbedo, robleNormal, robleRough,
  ] = await Promise.all([
    loadTexture(window.WOOD_TEXTURES.caoba_albedo, true),
    loadTexture(window.WOOD_TEXTURES.caoba_normal, false),
    loadTexture(window.WOOD_TEXTURES.caoba_roughness, false),
    loadTexture(window.WOOD_TEXTURES.roble_albedo, true),
    loadTexture(window.WOOD_TEXTURES.roble_normal, false),
    loadTexture(window.WOOD_TEXTURES.roble_roughness, false),
  ]);
  return { caobaAlbedo, caobaNormal, caobaRough, robleAlbedo, robleNormal, robleRough };
}

// La textura caoba tiene 5x5 tiles. Para que cada cubo del Tetris use exactamente UN tile,
// necesitamos un sistema donde el material muestre solo 1/5 del UV en cada cara.
// Solución: asignar offsets de UV por instancia, o clonar la textura y usar repeat=(1/5, 1/5)
// con offset random. Pero más simple y consistente: usar la textura completa y mapear
// cada cubo a UVs específicas de su tile.

// Para el shatter: cada subcubito tiene un fragmento más pequeño aún de la textura.
// Para mantener performance, los subcubitos comparten un material genérico con la textura.

// ===== TEXTURAS DE TILE INDIVIDUAL =====
// Vamos a crear texturas "tile único" clonando y ajustando repeat/offset
function makeTileTextures(textures) {
  // La caoba tiene 5x5 tiles. Tomamos UN tile (el central, fila 2 col 2) y lo usamos
  // para cada cubo. repeat=(1/5, 1/5), offset=(2/5, 2/5)
  const TILES_PER_ROW = 5;
  const f = 1 / TILES_PER_ROW;

  const albedo = textures.caobaAlbedo.clone();
  const normal = textures.caobaNormal.clone();
  const rough = textures.caobaRough.clone();

  for (const tex of [albedo, normal, rough]) {
    tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping; // No repetir, queremos UN tile
    tex.repeat.set(f, f);
    tex.offset.set(2 * f, 2 * f); // Tile central
    tex.needsUpdate = true;
  }
  albedo.colorSpace = THREE.SRGBColorSpace;
  return { albedo, normal, rough };
}

// ===== TETROMINOS =====
const SHAPES = {
  I: [[0,1],[1,1],[2,1],[3,1]],
  O: [[0,0],[1,0],[0,1],[1,1]],
  T: [[0,1],[1,1],[2,1],[1,0]],
  S: [[1,0],[2,0],[0,1],[1,1]],
  Z: [[0,0],[1,0],[1,1],[2,1]],
  J: [[0,0],[0,1],[1,1],[2,1]],
  L: [[2,0],[0,1],[1,1],[2,1]],
};
const SHAPE_KEYS = Object.keys(SHAPES);

// ===== ESCENA =====
const app = document.getElementById('app');
const scene = new THREE.Scene();
// Fondo crema cálido tipo estudio
scene.background = new THREE.Color('#e8d4b0');
scene.fog = new THREE.Fog('#e8d4b0', 30, 55);

const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1, 32);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
app.appendChild(renderer.domElement);

// ===== ILUMINACIÓN ESTUDIO =====
// Mirando el render del cubo de referencia:
// - Key light cálida desde arriba-izquierda
// - Sombra suave hacia abajo-derecha
// - Ambient cálido alto (no hay zonas negras)
// - Fill light suave para iluminar las caras en sombra

const ambient = new THREE.AmbientLight(0xfff0d8, 0.8);
scene.add(ambient);

const hemi = new THREE.HemisphereLight(0xfff0d8, 0xc8a878, 0.4);
hemi.position.set(0, 20, 0);
scene.add(hemi);

const keyLight = new THREE.DirectionalLight(0xfff5e0, 1.6);
keyLight.position.set(-8, 16, 12);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.near = 1;
keyLight.shadow.camera.far = 60;
keyLight.shadow.camera.left = -16;
keyLight.shadow.camera.right = 16;
keyLight.shadow.camera.top = 22;
keyLight.shadow.camera.bottom = -22;
keyLight.shadow.bias = -0.0003;
keyLight.shadow.normalBias = 0.02;
keyLight.shadow.radius = 6;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0xffe0c0, 0.4);
fillLight.position.set(10, 6, 8);
scene.add(fillLight);

// ===== INICIO ASYNC =====
let textures, tileTextures, woodMaterial, subMaterial, bgMaterial;
let cubeGeo, edgeMaterial;
let particles, boardGroup;
const animations = [];
const activeParticles = [];
const freeIndices = [];

const board = [];
for (let r = 0; r < ROWS; r++) {
  const row = [];
  for (let c = 0; c < COLS; c++) row.push(null);
  board.push(row);
}

let currentPiece = null;
let nextShape = null;
let dropTimer = 0;
let dropInterval = 0.8;
let score = 0;
let lines = 0;
let level = 1;
let gameOver = false;
let paused = false;
let started = false;

const scoreEl = document.getElementById('score');
const linesEl = document.getElementById('lines');
const levelEl = document.getElementById('level');
const loadingEl = document.getElementById('loading');

(async function init() {
  textures = await loadAll();
  tileTextures = makeTileTextures(textures);

  // ===== MATERIAL DE CUBO =====
  // Cada cubo es un tile completo de la textura caoba.
  // El grid (líneas negras) ya viene en la textura.
  woodMaterial = new THREE.MeshStandardMaterial({
    map: tileTextures.albedo,
    normalMap: tileTextures.normal,
    roughnessMap: tileTextures.rough,
    roughness: 1.0,  // multiplicador del roughness map
    metalness: 0.0,
    normalScale: new THREE.Vector2(0.8, 0.8),
  });

  // Geometría con bisel sutil. BoxGeometry plano se ve plástico,
  // queremos esquinas suavizadas pero manteniendo cubicidad.
  // Solución: BoxGeometry con un poco menos de tamaño + EdgesGeometry para acentuar los bordes
  cubeGeo = new THREE.BoxGeometry(CUBE_SIZE * 0.98, CUBE_SIZE * 0.98, CUBE_SIZE * 0.98);

  // ===== MATERIAL DEL FONDO (TABLERO) =====
  // Usamos roble claro tileado, mucho más claro que los cubos
  const bgAlbedo = textures.robleAlbedo.clone();
  const bgNormal = textures.robleNormal.clone();
  const bgRough = textures.robleRough.clone();
  for (const t of [bgAlbedo, bgNormal, bgRough]) {
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    t.repeat.set(4, 5);
    t.needsUpdate = true;
  }
  bgAlbedo.colorSpace = THREE.SRGBColorSpace;

  bgMaterial = new THREE.MeshStandardMaterial({
    map: bgAlbedo,
    normalMap: bgNormal,
    roughnessMap: bgRough,
    roughness: 1.0,
    metalness: 0.0,
    normalScale: new THREE.Vector2(0.3, 0.3),
  });

  // Tablero de fondo - un plano grande
  const boardWidth = COLS * CUBE_SIZE;
  const boardHeight = ROWS * CUBE_SIZE;

  const bgPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(boardWidth + 0.6, boardHeight + 0.6),
    bgMaterial
  );
  bgPlane.position.z = -0.51;
  bgPlane.receiveShadow = true;
  scene.add(bgPlane);

  // Plano de "mesa" detrás, más grande y un poco más oscuro
  const tableTex = textures.robleAlbedo.clone();
  tableTex.wrapS = tableTex.wrapT = THREE.RepeatWrapping;
  tableTex.repeat.set(10, 10);
  tableTex.colorSpace = THREE.SRGBColorSpace;
  tableTex.needsUpdate = true;
  const tableNormal = textures.robleNormal.clone();
  tableNormal.wrapS = tableNormal.wrapT = THREE.RepeatWrapping;
  tableNormal.repeat.set(10, 10);
  tableNormal.needsUpdate = true;

  const tablePlane = new THREE.Mesh(
    new THREE.PlaneGeometry(80, 80),
    new THREE.MeshStandardMaterial({
      map: tableTex,
      normalMap: tableNormal,
      roughness: 0.95,
      metalness: 0,
      color: 0xc8b088,  // Tinte más oscuro para diferenciarlo del playfield
      normalScale: new THREE.Vector2(0.2, 0.2),
    })
  );
  tablePlane.position.z = -2;
  tablePlane.receiveShadow = true;
  scene.add(tablePlane);

  // Marco sutil del playfield (sombra/borde)
  const frameGeo = new THREE.EdgesGeometry(new THREE.PlaneGeometry(boardWidth, boardHeight));
  const frameMat = new THREE.LineBasicMaterial({ color: 0x4a3020, transparent: true, opacity: 0.25 });
  const frame = new THREE.LineSegments(frameGeo, frameMat);
  frame.position.z = -0.49;
  scene.add(frame);

  // ===== PARTICLES SHATTER =====
  const subGeo = new THREE.BoxGeometry(SUB_SIZE * 0.92, SUB_SIZE * 0.92, SUB_SIZE * 0.92);

  // Material de subcubitos: usa la textura completa (sin tile específico) para que cada
  // partícula muestre algo de la textura, pero como son muy chicos no importa mucho que
  // todas muestren el mismo trozo
  const subAlbedo = textures.caobaAlbedo.clone();
  const subNormal = textures.caobaNormal.clone();
  const subRough = textures.caobaRough.clone();
  for (const t of [subAlbedo, subNormal, subRough]) {
    t.wrapS = t.wrapT = THREE.ClampToEdgeWrapping;
    // Tomamos un crop pequeño del centro de la textura para los subcubitos
    t.repeat.set(0.15, 0.15);
    t.offset.set(0.42, 0.42);
    t.needsUpdate = true;
  }
  subAlbedo.colorSpace = THREE.SRGBColorSpace;

  subMaterial = new THREE.MeshStandardMaterial({
    map: subAlbedo,
    normalMap: subNormal,
    roughnessMap: subRough,
    roughness: 1.0,
    metalness: 0,
    normalScale: new THREE.Vector2(0.4, 0.4),
  });

  particles = new THREE.InstancedMesh(subGeo, subMaterial, MAX_PARTICLES);
  particles.castShadow = false;
  particles.receiveShadow = false;
  particles.count = MAX_PARTICLES;
  scene.add(particles);

  for (let i = MAX_PARTICLES - 1; i >= 0; i--) freeIndices.push(i);
  // Inicializar todas en escala 0
  const _m = new THREE.Matrix4();
  const _p = new THREE.Vector3(0, -1000, 0);
  const _q = new THREE.Quaternion();
  const _s = new THREE.Vector3(0, 0, 0);
  for (let i = 0; i < MAX_PARTICLES; i++) {
    _m.compose(_p, _q, _s);
    particles.setMatrixAt(i, _m);
  }
  particles.instanceMatrix.needsUpdate = true;

  // Group para los cubos del tablero
  boardGroup = new THREE.Group();
  scene.add(boardGroup);

  // Listo
  loadingEl.style.display = 'none';
  started = true;
  resize();
  spawnPiece();
  updateHUD();
})();

function makeCube() {
  const mesh = new THREE.Mesh(cubeGeo, woodMaterial);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  return mesh;
}

function gridToWorld(col, row) {
  return {
    x: (col - COLS / 2 + 0.5) * CUBE_SIZE,
    y: (ROWS / 2 - row - 0.5) * CUBE_SIZE,
  };
}

// ===== LÓGICA DEL JUEGO =====
function spawnPiece() {
  if (!started) return;
  const shapeKey = nextShape || SHAPE_KEYS[Math.floor(Math.random() * SHAPE_KEYS.length)];
  nextShape = SHAPE_KEYS[Math.floor(Math.random() * SHAPE_KEYS.length)];

  const shape = SHAPES[shapeKey].map(([x, y]) => [x, y]);
  const minX = Math.min(...shape.map(s => s[0]));
  const maxX = Math.max(...shape.map(s => s[0]));
  const w = maxX - minX + 1;
  const offsetX = Math.floor((COLS - w) / 2) - minX;
  const offsetY = -1;

  const piece = { shape, blocks: [], shapeKey };
  for (const [x, y] of shape) {
    const col = x + offsetX;
    const row = y + offsetY;
    const mesh = makeCube();
    boardGroup.add(mesh);
    const pos = gridToWorld(col, row);
    mesh.position.set(pos.x, pos.y, 0);
    piece.blocks.push({ col, row, mesh });
  }

  if (collides(piece, 0, 0)) {
    triggerGameOver();
    return;
  }
  currentPiece = piece;
}

function collides(piece, dCol, dRow, newBlocks = null) {
  const blocks = newBlocks || piece.blocks;
  for (const b of blocks) {
    const c = b.col + dCol;
    const r = b.row + dRow;
    if (c < 0 || c >= COLS || r >= ROWS) return true;
    if (r >= 0 && board[r][c]) return true;
  }
  return false;
}

function move(dCol, dRow) {
  if (!currentPiece || gameOver || paused) return false;
  if (collides(currentPiece, dCol, dRow)) return false;
  for (const b of currentPiece.blocks) {
    b.col += dCol;
    b.row += dRow;
    const pos = gridToWorld(b.col, b.row);
    b.mesh.position.set(pos.x, pos.y, 0);
  }
  return true;
}

function rotate() {
  if (!currentPiece || gameOver || paused) return;
  if (currentPiece.shapeKey === 'O') return;

  const cx = currentPiece.blocks.reduce((s, b) => s + b.col, 0) / 4;
  const cy = currentPiece.blocks.reduce((s, b) => s + b.row, 0) / 4;
  const px = Math.round(cx);
  const py = Math.round(cy);

  const newBlocks = currentPiece.blocks.map(b => {
    const dx = b.col - px;
    const dy = b.row - py;
    return { col: px - dy, row: py + dx, mesh: b.mesh };
  });

  const kicks = [[0,0],[1,0],[-1,0],[0,-1],[2,0],[-2,0]];
  for (const [kx, ky] of kicks) {
    const candidate = newBlocks.map(b => ({ ...b, col: b.col + kx, row: b.row + ky }));
    if (!collides({ blocks: candidate }, 0, 0)) {
      for (let i = 0; i < currentPiece.blocks.length; i++) {
        currentPiece.blocks[i].col = candidate[i].col;
        currentPiece.blocks[i].row = candidate[i].row;
        const pos = gridToWorld(candidate[i].col, candidate[i].row);
        currentPiece.blocks[i].mesh.position.set(pos.x, pos.y, 0);
      }
      return;
    }
  }
}

function lockPiece() {
  if (!currentPiece) return;
  for (const b of currentPiece.blocks) {
    if (b.row >= 0 && b.row < ROWS) {
      board[b.row][b.col] = b.mesh;
    } else {
      triggerGameOver();
      return;
    }
  }
  currentPiece = null;
  checkLines();
  if (!gameOver) spawnPiece();
}

function checkLines() {
  const fullRows = [];
  for (let r = 0; r < ROWS; r++) {
    if (board[r].every(c => c !== null)) fullRows.push(r);
  }
  if (fullRows.length === 0) return;

  for (const r of fullRows) {
    for (let c = 0; c < COLS; c++) {
      const mesh = board[r][c];
      if (mesh) {
        shatterCube(mesh, c, r);
        boardGroup.remove(mesh);
        board[r][c] = null;
      }
    }
  }

  fullRows.sort((a, b) => a - b);
  for (const fullRow of fullRows) {
    for (let r = fullRow; r > 0; r--) {
      for (let c = 0; c < COLS; c++) {
        board[r][c] = board[r-1][c];
        if (board[r][c]) {
          const mesh = board[r][c];
          const pos = gridToWorld(c, r);
          animateMeshTo(mesh, pos.x, pos.y, 0.28);
        }
      }
    }
    for (let c = 0; c < COLS; c++) board[0][c] = null;
  }

  const linesScored = fullRows.length;
  const points = [0, 100, 300, 500, 800][linesScored] * level;
  score += points;
  lines += linesScored;
  level = Math.floor(lines / 10) + 1;
  dropInterval = Math.max(0.08, 0.8 - (level - 1) * 0.06);
  updateHUD();
}

function animateMeshTo(mesh, x, y, duration) {
  animations.push({
    mesh,
    startX: mesh.position.x, startY: mesh.position.y,
    endX: x, endY: y, t: 0, duration,
  });
}

function updateAnimations(dt) {
  for (let i = animations.length - 1; i >= 0; i--) {
    const a = animations[i];
    a.t += dt;
    const k = Math.min(1, a.t / a.duration);
    const e = 1 - Math.pow(1 - k, 3);
    a.mesh.position.x = a.startX + (a.endX - a.startX) * e;
    a.mesh.position.y = a.startY + (a.endY - a.startY) * e;
    if (k >= 1) animations.splice(i, 1);
  }
}

function updateHUD() {
  scoreEl.textContent = score.toLocaleString();
  linesEl.textContent = lines;
  levelEl.textContent = level;
}

// ===== SHATTER =====
const _matrix = new THREE.Matrix4();
const _quat = new THREE.Quaternion();
const _euler = new THREE.Euler();
const _scale = new THREE.Vector3();
const _pos = new THREE.Vector3();

function shatterCube(mesh, col, row) {
  const wp = gridToWorld(col, row);
  const baseX = wp.x;
  const baseY = wp.y;
  const baseZ = 0;

  const sweepDir = (col / COLS) < 0.5 ? -1 : 1;
  const baseVx = sweepDir * (3 + Math.random() * 2);
  const baseVy = 5 + Math.random() * 3;

  for (let sx = 0; sx < SUBDIV; sx++) {
    for (let sy = 0; sy < SUBDIV; sy++) {
      for (let sz = 0; sz < SUBDIV; sz++) {
        if (freeIndices.length === 0) return;
        const idx = freeIndices.pop();

        const offX = (sx - SUBDIV/2 + 0.5) * SUB_SIZE;
        const offY = (sy - SUBDIV/2 + 0.5) * SUB_SIZE;
        const offZ = (sz - SUBDIV/2 + 0.5) * SUB_SIZE;

        const radialX = offX * 4 + (Math.random() - 0.5) * 2;
        const radialY = offY * 4 + (Math.random() - 0.5) * 2;
        const radialZ = offZ * 6 + (Math.random() - 0.5) * 2 + 2;

        activeParticles.push({
          idx,
          x: baseX + offX, y: baseY + offY, z: baseZ + offZ,
          vx: baseVx + radialX, vy: baseVy + radialY, vz: radialZ,
          rx: Math.random() * Math.PI * 2,
          ry: Math.random() * Math.PI * 2,
          rz: Math.random() * Math.PI * 2,
          rvx: (Math.random() - 0.5) * 12,
          rvy: (Math.random() - 0.5) * 12,
          rvz: (Math.random() - 0.5) * 12,
          age: 0,
        });
      }
    }
  }
}

function updateParticles(dt) {
  for (let i = activeParticles.length - 1; i >= 0; i--) {
    const p = activeParticles[i];
    p.age += dt;
    if (p.age >= PARTICLE_LIFE) {
      _scale.set(0, 0, 0);
      _matrix.compose(_pos.set(0, -1000, 0), _quat.identity(), _scale);
      particles.setMatrixAt(p.idx, _matrix);
      freeIndices.push(p.idx);
      activeParticles.splice(i, 1);
      continue;
    }

    p.vy += GRAVITY * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.z += p.vz * dt;
    p.rx += p.rvx * dt;
    p.ry += p.rvy * dt;
    p.rz += p.rvz * dt;

    const lifeFrac = p.age / PARTICLE_LIFE;
    let s = 1;
    if (lifeFrac > 0.7) s = 1 - (lifeFrac - 0.7) / 0.3;

    _euler.set(p.rx, p.ry, p.rz);
    _quat.setFromEuler(_euler);
    _scale.set(s, s, s);
    _pos.set(p.x, p.y, p.z);
    _matrix.compose(_pos, _quat, _scale);
    particles.setMatrixAt(p.idx, _matrix);
  }
  particles.instanceMatrix.needsUpdate = true;
}

// ===== HARD/SOFT DROP =====
function hardDrop() {
  if (!currentPiece || gameOver || paused) return;
  let dist = 0;
  while (!collides(currentPiece, 0, dist + 1)) dist++;
  if (dist > 0) { move(0, dist); score += dist * 2; }
  lockPiece();
  dropTimer = 0;
}

function softDrop() {
  if (move(0, 1)) {
    score += 1;
    updateHUD();
    dropTimer = 0;
  }
}

// ===== INPUT =====
const keys = {};
window.addEventListener('keydown', (e) => {
  if (gameOver) return;
  if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') { togglePause(); return; }
  if (paused) return;
  if (keys[e.key]) return;
  keys[e.key] = true;
  if (e.key === 'ArrowLeft') move(-1, 0);
  else if (e.key === 'ArrowRight') move(1, 0);
  else if (e.key === 'ArrowUp') rotate();
  else if (e.key === 'ArrowDown') softDrop();
  else if (e.key === ' ') { e.preventDefault(); hardDrop(); }
});
window.addEventListener('keyup', (e) => { keys[e.key] = false; });

const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
if (isTouch) {
  document.getElementById('touchControls').classList.add('show');
  document.getElementById('hint').style.display = 'none';
}
document.querySelectorAll('.tc-btn').forEach(btn => {
  const action = btn.dataset.action;
  let interval = null;
  const trigger = () => {
    if (action === 'left') move(-1, 0);
    else if (action === 'right') move(1, 0);
    else if (action === 'rotate') rotate();
    else if (action === 'soft') softDrop();
    else if (action === 'hard') hardDrop();
  };
  btn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    trigger();
    if (action === 'left' || action === 'right' || action === 'soft') {
      interval = setInterval(trigger, 130);
    }
  }, { passive: false });
  btn.addEventListener('touchend', () => { if (interval) { clearInterval(interval); interval = null; } });
  btn.addEventListener('touchcancel', () => { if (interval) { clearInterval(interval); interval = null; } });
  btn.addEventListener('mousedown', trigger);
});

// Swipe gestures
let touchStartX = 0, touchStartY = 0, touchStartT = 0;
renderer.domElement.addEventListener('touchstart', (e) => {
  if (e.touches.length === 0) return;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchStartT = performance.now();
});
renderer.domElement.addEventListener('touchend', (e) => {
  if (e.changedTouches.length === 0) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const dt = performance.now() - touchStartT;
  const absX = Math.abs(dx), absY = Math.abs(dy);
  if (absX < 20 && absY < 20 && dt < 300) {
    rotate();
  } else if (absX > absY && absX > 30) {
    move(dx > 0 ? 1 : -1, 0);
  } else if (absY > absX && absY > 30) {
    if (dy > 80 && dt < 250) hardDrop();
    else if (dy > 30) softDrop();
  }
});

// ===== PAUSE / GAME OVER =====
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlaySubtitle = document.getElementById('overlaySubtitle');
const overlayBtn = document.getElementById('overlayBtn');
const pauseBtn = document.getElementById('pauseBtn');

function togglePause() {
  if (gameOver) return;
  paused = !paused;
  if (paused) {
    overlayTitle.textContent = 'Paused';
    overlaySubtitle.textContent = 'Take a breath';
    overlayBtn.textContent = 'Resume';
    overlay.classList.add('show');
  } else {
    overlay.classList.remove('show');
  }
}

function triggerGameOver() {
  gameOver = true;
  overlayTitle.textContent = 'Game Over';
  overlaySubtitle.textContent = score.toLocaleString() + ' points · ' + lines + ' lines';
  overlayBtn.textContent = 'Restart';
  overlay.classList.add('show');
}

function restart() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c]) { boardGroup.remove(board[r][c]); board[r][c] = null; }
    }
  }
  if (currentPiece) {
    for (const b of currentPiece.blocks) boardGroup.remove(b.mesh);
    currentPiece = null;
  }
  score = 0; lines = 0; level = 1; dropInterval = 0.8;
  gameOver = false; paused = false;
  updateHUD();
  overlay.classList.remove('show');
  spawnPiece();
}

overlayBtn.addEventListener('click', () => {
  if (gameOver) restart();
  else togglePause();
});
pauseBtn.addEventListener('click', togglePause);

// ===== RESIZE =====
function resize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  const targetH = ROWS * CUBE_SIZE * 1.18;
  const targetW = COLS * CUBE_SIZE * 1.18;
  const fovRad = camera.fov * Math.PI / 180;
  let distance = (targetH / 2) / Math.tan(fovRad / 2);
  const distanceForW = (targetW / 2) / Math.tan(fovRad / 2) / camera.aspect;
  distance = Math.max(distance, distanceForW);
  camera.position.z = distance;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
window.addEventListener('resize', resize);

// ===== LOOP =====
let lastT = performance.now();
function tick() {
  requestAnimationFrame(tick);
  const now = performance.now();
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;

  if (started && !paused && !gameOver) {
    dropTimer += dt;
    if (dropTimer >= dropInterval) {
      dropTimer = 0;
      if (currentPiece && !move(0, 1)) lockPiece();
    }
  }

  if (started) {
    updateAnimations(dt);
    updateParticles(dt);
  }
  renderer.render(scene, camera);
}
tick();

</script>
