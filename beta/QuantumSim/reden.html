<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quantum Chemistry Simulator — V2.8 Redemption</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #fff; touch-action: none; }
        #ui { position: absolute; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; padding: 20px; pointer-events: none; z-index: 10; }
        #element-display { font-size: 18px; color: #44ddcc; text-shadow: 0 0 15px #44ddcc; }
        #panel-control { position: absolute; top: 80px; right: 20px; background: rgba(0,0,0,0.8); border-left: 2px solid #44ddcc; padding: 15px; z-index: 20; pointer-events: auto; backdrop-filter: blur(10px); }
        #panel-control label { display: block; font-size: 9px; color: #44ddcc; margin-bottom: 4px; }
        #panel-control input { width: 120px; margin-bottom: 12px; accent-color: #44ddcc; cursor: pointer; display: block; }
        #controls { position: absolute; bottom: 0; left: 0; right: 0; display: flex; justify-content: center; gap: 8px; padding: 25px; z-index: 10; flex-wrap: wrap; background: linear-gradient(transparent, #000); }
        .btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-family: 'Courier New', monospace; font-size: 11px; padding: 10px 18px; cursor: pointer; border-radius: 4px; transition: 0.2s; pointer-events: auto; }
        .btn:hover { background: #44ddcc; color: #000; }
        .btn.special { border-color: #44ddcc; }
        .btn.danger { border-color: #ff5577; color: #ff5577; }
    </style>
</head>
<body>

<div id="ui">
    <div id="identity">
        <h1 style="font-size: 10px; opacity: 0.5;">QCS // V2.8 FIX APPLIED</h1>
        <div id="element-display">HIDRÓGENO</div>
    </div>
    <div id="stats" style="text-align: right; font-size: 11px;">
        Z: <span id="s-p" style="color:#44ddcc">1</span> | N: <span id="s-n" style="color:#44ddcc">0</span>
    </div>
</div>

<div id="panel-control">
    <label>BLOOM INTENSITY</label>
    <input type="range" id="bStr" min="0" max="5" step="0.1" value="2.2">
    <label>BLOOM RADIUS</label>
    <input type="range" id="bRad" min="0" max="1" step="0.05" value="0.5">
    <label>EXPOSURE</label>
    <input type="range" id="exp" min="0.1" max="3" step="0.1" value="1.3">
</div>

<div id="controls">
    <button class="btn special" id="btn-nextZ">+ SIGUIENTE Z</button>
    <button class="btn" id="btn-addP">+P</button>
    <button class="btn" id="btn-addN">+N</button>
    <button class="btn danger" id="btn-remP">−P</button>
    <button class="btn danger" id="btn-remN">−N</button>
    <button class="btn" id="btn-reset">RESET</button>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

let Z = 1, N = 0;
const MAX_U = 64;
const BOX_SIZE = 4.0;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ReinhardToneMapping;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 5);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.2, 0.5, 0.1);
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

const uSources = new Array(MAX_U).fill(null).map(() => new THREE.Vector3());
const uIsP = new Float32Array(MAX_U);

const uniforms = {
    uTime: { value: 0 },
    uCameraPos: { value: new THREE.Vector3() },
    uSources: { value: uSources },
    uIsP: { value: uIsP },
    uCount: { value: 1 },
    uOmega: { value: 1.0 },
    uBoxSize: { value: BOX_SIZE }
};

const fragmentShader = `
precision highp float;
varying vec3 vWorldPos;
uniform vec3 uCameraPos, uSources[64];
uniform float uTime, uIsP[64], uOmega, uBoxSize;
uniform int uCount;

float boxExit(vec3 ro, vec3 rd, float size) {
    vec3 m = 1.0 / rd;
    vec3 n = m * ro;
    vec3 k = abs(m) * size;
    vec3 t2 = k - n;
    return min(min(t2.x, t2.y), t2.z);
}

void main() {
    vec3 rd = normalize(vWorldPos - uCameraPos);
    float tMax = boxExit(vWorldPos, rd, uBoxSize);
    vec4 finalCol = vec4(0.0);
    int steps = 48;
    float stepSize = tMax / float(steps);

    for(int i=0; i<48; i++) {
        if(finalCol.a > 0.98) break;
        vec3 p = vWorldPos + rd * (float(i) * stepSize + stepSize * 0.5);
        
        float field = 0.0;
        for(int s=0; s<64; s++) {
            if(s >= uCount) break;
            float d = distance(p, uSources[s]);
            // Decay corregido por Ámbar: 2.2
            float wave = cos(uOmega * 14.0 * d - uTime * 6.0) * exp(-d * d * 2.2);
            field += wave * (uIsP[s] > 0.5 ? 1.0 : -0.8);
        }
        
        if(abs(field) > 0.05) {
            vec3 c = field > 0.0 ? vec3(1.0, 0.25, 0.4) : vec3(0.2, 0.6, 1.0);
            float alpha = abs(field) * 0.25 * (1.0 - finalCol.a);
            finalCol.rgb += c * alpha;
            finalCol.a += alpha;
        }
    }
    if(finalCol.a < 0.02) discard;
    gl_FragColor = finalCol;
}
`;

const mesh = new THREE.Mesh(new THREE.BoxGeometry(BOX_SIZE*2, BOX_SIZE*2, BOX_SIZE*2), new THREE.ShaderMaterial({
    uniforms,
    vertexShader: `varying vec3 vWorldPos; void main(){ vWorldPos=(modelMatrix*vec4(position,1.0)).xyz; gl_Position=projectionMatrix*viewMatrix*modelMatrix*vec4(position,1.0); }`,
    fragmentShader, transparent: true, depthWrite: false
}));
scene.add(mesh);

const STABLE_N = [0, 0, 2, 4, 5, 6, 6, 7, 8, 10, 10, 12, 12, 14, 14, 16, 16, 18, 22, 20, 20];
const ELEMENTS = ['Vacío','Hidrógeno','Helio','Litio','Berilio','Boro','Carbono','Nitrógeno','Oxígeno','Flúor','Neón','Sodio','Magnesio','Aluminio','Silicio','Fósforo','Azufre','Cloro','Argón','Potasio','Calcio'];

function sync() {
    const A = Math.min(Z + N, MAX_U);
    uniforms.uCount.value = A;
    uniforms.uOmega.value = 1.0 + (Z * 0.04);
    
    // Distribución por capas
    const pos = [];
    const shells = [{c:2, r:0.3}, {c:8, r:0.8}, {c:20, r:1.4}, {c:34, r:2.1}];
    let rem = A;
    const phi = Math.PI * (3 - Math.sqrt(5));
    for (let s=0; s<shells.length && rem>0; s++) {
        let n = Math.min(rem, shells[s].c);
        for (let i=0; i<n; i++) {
            let y = 1 - (i/(n-1||1))*2;
            let rad = Math.sqrt(1-y*y)*shells[s].r;
            let th = i*phi;
            pos.push(new THREE.Vector3(Math.cos(th)*rad, y*shells[s].r, Math.sin(th)*rad));
        }
        rem -= n;
    }

    for(let i=0; i<MAX_U; i++) {
        if(i < A) { uSources[i].copy(pos[i]); uIsP[i] = i < Z ? 1.0 : 0.0; }
    }
    document.getElementById('element-display').textContent = ELEMENTS[Z]?.toUpperCase() || 'ELEMENTO '+Z;
    document.getElementById('s-p').textContent = Z;
    document.getElementById('s-n').textContent = N;
}

document.getElementById('btn-nextZ').onclick = () => { if(Z<20){ Z++; N=STABLE_N[Z]; sync(); }};
document.getElementById('btn-addP').onclick = () => { if(Z<MAX_U){ Z++; sync(); }};
document.getElementById('btn-addN').onclick = () => { N++; sync(); };
document.getElementById('btn-remP').onclick = () => { if(Z>0){ Z--; sync(); }};
document.getElementById('btn-remN').onclick = () => { if(N>0){ N--; sync(); }};
document.getElementById('btn-reset').onclick = () => { Z=1; N=0; sync(); };
document.getElementById('bStr').oninput = (e) => bloomPass.strength = parseFloat(e.target.value);
document.getElementById('bRad').oninput = (e) => bloomPass.radius = parseFloat(e.target.value);
document.getElementById('exp').oninput = (e) => renderer.toneMappingExposure = parseFloat(e.target.value);

function animate(t) {
    requestAnimationFrame(animate);
    uniforms.uTime.value = t / 1000;
    uniforms.uCameraPos.value.copy(camera.position);
    controls.update();
    composer.render();
}
sync(); animate(0);
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
