<script type="module">
import * as THREE from 'three';
import { OrbitControls }  from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }     from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }     from 'three/addons/postprocessing/OutputPass.js';

// Aumentamos resolución para que la torsión 3D tenga espacio para curvarse
const N    = 32;          
const EXTENT = 2.5;       
const DX   = (2*EXTENT) / (N-1);
const TOTAL_CELLS = N*N*N;

let U = new Float32Array(TOTAL_CELLS);  
let V = new Float32Array(TOTAL_CELLS);  
let W = new Float32Array(TOTAL_CELLS);  

let dU = new Float32Array(TOTAL_CELLS);
let dV = new Float32Array(TOTAL_CELLS);
let dW = new Float32Array(TOTAL_CELLS);

// Advección -(ψ·∇)ψ
let advU = new Float32Array(TOTAL_CELLS);
let advV = new Float32Array(TOTAL_CELLS);
let advW = new Float32Array(TOTAL_CELLS);

// Cross product ψ×(∇×ψ)
let crossX = new Float32Array(TOTAL_CELLS);
let crossY = new Float32Array(TOTAL_CELLS);
let crossZ = new Float32Array(TOTAL_CELLS);

// Snap variacional ∇×[ψ×(∇×ψ)]
let snapX = new Float32Array(TOTAL_CELLS);
let snapY = new Float32Array(TOTAL_CELLS);
let snapZ = new Float32Array(TOTAL_CELLS);

let curlX = new Float32Array(TOTAL_CELLS);
let curlY = new Float32Array(TOTAL_CELLS);
let curlZ = new Float32Array(TOTAL_CELLS);
let curlMag = new Float32Array(TOTAL_CELLS); 

// Buffer independiente para la textura visual (evita corromper la física)
let renderVolume = new Float32Array(TOTAL_CELLS);

let ETA    = 0.15;   
let LAMBDA = 0.08;   
let DT     = 0.015; // Velvet: más bajo = más estable   
let THRESH = 0.15;    
let paused = false;
let frameCount = 0;
let maxEnergy  = 1.0; 

function idx(i,j,k){ return i*N*N + j*N + k; }

function get(arr, i, j, k){
    i = ((i % N) + N) % N;
    j = ((j % N) + N) % N;
    k = ((k % N) + N) % N;
    return arr[idx(i,j,k)];
}

function initNoise(amplitude=0.1) {
    for(let i=0;i<TOTAL_CELLS;i++){
        U[i] = (Math.random()-0.5)*amplitude*2;
        V[i] = (Math.random()-0.5)*amplitude*2;
        W[i] = (Math.random()-0.5)*amplitude*2;
    }
}

// Aumentamos el radio de 3.0 a 6.0 para que soporte los 720 grados sin aliasing numérico
function injectHelical(cx=N/2, cy=N/2, cz=N/2, amplitude=0.8, radius=3.0) {
    for(let i=0;i<N;i++){
        for(let j=0;j<N;j++){
            for(let k=0;k<N;k++){
                const di = i - cx, dj = j - cy, dk = k - cz;
                const r  = Math.sqrt(di*di + dj*dj + dk*dk);
                const envelope = Math.exp(-r*r/(radius*radius));
                if(envelope < 0.01) continue;

                const phi   = Math.atan2(dj, di);
                const theta = Math.atan2(Math.sqrt(di*di+dj*dj), dk);

                const tx = -Math.sin(phi) * Math.cos(theta);
                const ty =  Math.cos(phi) * Math.cos(theta);
                const tz = -Math.sin(theta) * 0.5;

                const phi2   = phi * 2.0;
                const tx2    = -Math.sin(phi2) * 0.3;
                const ty2    =  Math.cos(phi2) * 0.3;

                const n = idx(i,j,k);
                U[n] += amplitude * envelope * (tx + tx2);
                V[n] += amplitude * envelope * (ty + ty2);
                W[n] += amplitude * envelope * tz;
            }
        }
    }
}

function injectPerturbation() {
    const ci = Math.floor(N/4 + Math.random()*N/2);
    const cj = Math.floor(N/4 + Math.random()*N/2);
    const ck = Math.floor(N/4 + Math.random()*N/2);
    injectHelical(ci, cj, ck, 0.6, 2.5);
}

function computeCurl() {
    for(let i=0;i<N;i++){
        for(let j=0;j<N;j++){
            for(let k=0;k<N;k++){
                const dWdy = (get(W,i,j+1,k) - get(W,i,j-1,k)) / (2*DX);
                const dVdz = (get(V,i,j,k+1) - get(V,i,j,k-1)) / (2*DX);
                const dUdz = (get(U,i,j,k+1) - get(U,i,j,k-1)) / (2*DX);
                const dWdx = (get(W,i+1,j,k) - get(W,i-1,j,k)) / (2*DX);
                const dVdx = (get(V,i+1,j,k) - get(V,i-1,j,k)) / (2*DX);
                const dUdy = (get(U,i,j+1,k) - get(U,i,j-1,k)) / (2*DX);

                const n = idx(i,j,k);
                curlX[n] = dWdy - dVdz;
                curlY[n] = dUdz - dWdx;
                curlZ[n] = dVdx - dUdy;
                curlMag[n] = Math.sqrt(
                    curlX[n]*curlX[n] +
                    curlY[n]*curlY[n] +
                    curlZ[n]*curlZ[n]
                );
            }
        }
    }
}

// ── Advección: -(ψ·∇)ψ ──────────────────────────────────────
function computeAdvection(){
    const inv2dx = 1/(2*DX);
    for(let i=0;i<N;i++) for(let j=0;j<N;j++) for(let k=0;k<N;k++){
        const n=idx(i,j,k);
        const u=U[n], v=V[n], w=W[n];
        const dUdx=(get(U,i+1,j,k)-get(U,i-1,j,k))*inv2dx;
        const dUdy=(get(U,i,j+1,k)-get(U,i,j-1,k))*inv2dx;
        const dUdz=(get(U,i,j,k+1)-get(U,i,j,k-1))*inv2dx;
        const dVdx=(get(V,i+1,j,k)-get(V,i-1,j,k))*inv2dx;
        const dVdy=(get(V,i,j+1,k)-get(V,i,j-1,k))*inv2dx;
        const dVdz=(get(V,i,j,k+1)-get(V,i,j,k-1))*inv2dx;
        const dWdx=(get(W,i+1,j,k)-get(W,i-1,j,k))*inv2dx;
        const dWdy=(get(W,i,j+1,k)-get(W,i,j-1,k))*inv2dx;
        const dWdz=(get(W,i,j,k+1)-get(W,i,j,k-1))*inv2dx;
        advU[n] = -(u*dUdx + v*dUdy + w*dUdz);
        advV[n] = -(u*dVdx + v*dVdy + w*dVdz);
        advW[n] = -(u*dWdx + v*dWdy + w*dWdz);
    }
}

// ── Cross: ψ×(∇×ψ) ───────────────────────────────────────────
function computeCross(){
    for(let n=0;n<TOTAL_CELLS;n++){
        const u=U[n], v=V[n], w=W[n];
        const cx=curlX[n], cy=curlY[n], cz=curlZ[n];
        crossX[n] = v*cz - w*cy;
        crossY[n] = w*cx - u*cz;
        crossZ[n] = u*cy - v*cx;
    }
}

// ── Snap variacional: ∇×[ψ×(∇×ψ)] ───────────────────────────
function computeSnapField(){
    const inv2dx = 1/(2*DX);
    for(let i=0;i<N;i++) for(let j=0;j<N;j++) for(let k=0;k<N;k++){
        const n=idx(i,j,k);
        const dZdy=(get(crossZ,i,j+1,k)-get(crossZ,i,j-1,k))*inv2dx;
        const dYdz=(get(crossY,i,j,k+1)-get(crossY,i,j,k-1))*inv2dx;
        const dXdz=(get(crossX,i,j,k+1)-get(crossX,i,j,k-1))*inv2dx;
        const dZdx=(get(crossZ,i+1,j,k)-get(crossZ,i-1,j,k))*inv2dx;
        const dYdx=(get(crossY,i+1,j,k)-get(crossY,i-1,j,k))*inv2dx;
        const dXdy=(get(crossX,i,j+1,k)-get(crossX,i,j-1,k))*inv2dx;
        snapX[n] = dZdy - dYdz;
        snapY[n] = dXdz - dZdx;
        snapZ[n] = dYdx - dXdy;
    }
}

// ── Integración completa ──────────────────────────────────────
function applySnap(){
    computeAdvection();
    computeCross();
    computeSnapField();

    const MAX = 3.0;
    for(let n=0;n<TOTAL_CELLS;n++){
        const curlLocal = curlMag[n];
        const dissip = LAMBDA * (1.0 + curlLocal * 0.5);
        dU[n] = ETA*snapX[n] - dissip*U[n] + advU[n];
        dV[n] = ETA*snapY[n] - dissip*V[n] + advV[n];
        dW[n] = ETA*snapZ[n] - dissip*W[n] + advW[n];
    }
    for(let n=0;n<TOTAL_CELLS;n++){
        U[n] = Math.max(-MAX, Math.min(MAX, U[n] + dU[n]*DT));
        V[n] = Math.max(-MAX, Math.min(MAX, V[n] + dV[n]*DT));
        W[n] = Math.max(-MAX, Math.min(MAX, W[n] + dW[n]*DT));
    }
    // Normalización energética
    const TARGET = 0.8;
    let totalE = 0;
    for(let n=0;n<TOTAL_CELLS;n++) totalE += U[n]*U[n]+V[n]*V[n]+W[n]*W[n];
    totalE /= TOTAL_CELLS;
    if(totalE > 0.0001){
        const scale = Math.sqrt(TARGET / totalE);
        if(scale < 0.95) for(let n=0;n<TOTAL_CELLS;n++){
            U[n]*=scale; V[n]*=scale; W[n]*=scale;
        }
    }
}

function computeEnergy() {
    let e = 0;
    for(let n=0;n<TOTAL_CELLS;n++) e += curlMag[n]*curlMag[n];
    return e / TOTAL_CELLS;
}

function countVortices() {
    let count = 0;
    let prev  = false;
    for(let n=0;n<TOTAL_CELLS;n++){
        const above = curlMag[n] > THRESH;
        if(above && !prev) count++;
        prev = above;
    }
    return Math.floor(count * 0.3);
}

const texture3D = new THREE.Data3DTexture(
    renderVolume, N, N, N
);
texture3D.format  = THREE.RedFormat;
texture3D.type    = THREE.FloatType;
texture3D.minFilter = THREE.LinearFilter;
texture3D.magFilter = THREE.LinearFilter;
texture3D.wrapS = texture3D.wrapT = texture3D.wrapR = THREE.ClampToEdgeWrapping;
texture3D.unpackAlignment = 1;
texture3D.needsUpdate = true;

const phaseData = new Float32Array(TOTAL_CELLS);
const texturePhase = new THREE.Data3DTexture(phaseData, N, N, N);
texturePhase.format    = THREE.RedFormat;
texturePhase.type      = THREE.FloatType;
texturePhase.minFilter = THREE.LinearFilter;
texturePhase.magFilter = THREE.LinearFilter;
texturePhase.wrapS = texturePhase.wrapT = texturePhase.wrapR = THREE.ClampToEdgeWrapping;
texturePhase.unpackAlignment = 1;
texturePhase.needsUpdate = true;

function updateTextures() {
    let maxCurl = 0.001;
    for(let n=0;n<TOTAL_CELLS;n++) if(curlMag[n]>maxCurl) maxCurl=curlMag[n];

    for(let n=0;n<TOTAL_CELLS;n++){
        // Escribimos en renderVolume sin destruir la física original
        renderVolume[n] = curlMag[n] / maxCurl; 
        phaseData[n] = (Math.atan2(curlZ[n], curlX[n]) + Math.PI) / (2*Math.PI);
    }
    texture3D.needsUpdate    = true;
    texturePhase.needsUpdate = true;
}

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.3;
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.001, 1000);
camera.position.set(0, 0, 6);

const ctrl = new OrbitControls(camera, renderer.domElement);
ctrl.enableDamping = true; ctrl.dampingFactor = 0.07;
ctrl.minDistance = 0.5; ctrl.maxDistance = 20;

const bloom = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth*0.5, window.innerHeight*0.5),
    1.8, 0.6, 0.05
);
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(bloom);
composer.addPass(new OutputPass());

const vertexShader = /* glsl */`
    varying vec3 vWorldPos;
    varying vec3 vLocalPos;
    uniform float uBoxSize;
    void main(){
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vWorldPos = wp.xyz;
        // Normalizar a [-1,1] — el box tiene half-size uBoxSize
        vLocalPos = position / uBoxSize;
        gl_Position = projectionMatrix * viewMatrix * wp;
    }
`;

const fragmentShader = /* glsl */`
precision highp float;
precision highp sampler3D;

varying vec3 vWorldPos;
varying vec3 vLocalPos;

uniform vec3    uCameraPos;
uniform vec3    uCameraLocal;
uniform float   uTime;
uniform float   uThresh;
uniform float   uEnergy;
uniform sampler3D uVolume;
uniform sampler3D uPhase;   

float sampleVol(vec3 p){
    vec3 uvw = p * 0.5 + 0.5;
    if(any(lessThan(uvw,vec3(0.0))) || any(greaterThan(uvw,vec3(1.0)))) return 0.0;
    return texture(uVolume, uvw).r;
}
float samplePhase(vec3 p){
    vec3 uvw = p * 0.5 + 0.5;
    if(any(lessThan(uvw,vec3(0.0))) || any(greaterThan(uvw,vec3(1.0)))) return 0.5;
    return texture(uPhase, uvw).r;
}

vec3 volGrad(vec3 p){
    float e = 0.06;
    return vec3(
        sampleVol(p+vec3(e,0,0)) - sampleVol(p-vec3(e,0,0)),
        sampleVol(p+vec3(0,e,0)) - sampleVol(p-vec3(0,e,0)),
        sampleVol(p+vec3(0,0,e)) - sampleVol(p-vec3(0,0,e))
    ) / (2.0*e);
}

vec3 phaseColor(float ph, float density){
    vec3 c0 = vec3(1.0,  0.35, 0.1);   
    vec3 c1 = vec3(0.1,  0.7,  1.0);   
    vec3 c2 = vec3(0.8,  0.2,  1.0);   

    vec3 col;
    if(ph < 0.5) col = mix(c0, c1, ph*2.0);
    else         col = mix(c1, c2, (ph-0.5)*2.0);

    col += vec3(1.2, 1.0, 0.6) * smoothstep(0.75, 1.0, density) * 0.5;
    return col;
}

void main(){
    // Rayo en espacio local [-1,1]
    // uCameraLocal se calcula en JS — sin inverse() en shader
    vec3 rayDir = normalize(vLocalPos - uCameraLocal);
    vec3 rayPos = vLocalPos + rayDir * 0.002;

    int   STEPS    = 96;
    float stepSize = 3.46 / float(STEPS); // diagonal de [-1,1]³ = sqrt(3)*2

    vec4 col = vec4(0.0);

    for(int i=0; i<96; i++){
        if(col.a > 0.95) break;
        vec3 p = rayPos + rayDir * float(i) * stepSize;

        // Salir si estamos fuera del volumen
        if(any(greaterThan(abs(p), vec3(1.0)))) break;

        float density = sampleVol(p);

        // ── Vacío cuántico — siempre visible ─────────────────
        // El tejido nunca está en cero — siempre tirita
        // El vacío siempre visible — incluso sin vórtices
        // Vacío siempre visible — confirma que el rayo recorre el volumen
        float vacuum = density * 0.12 + density*density * 0.2;
        col.rgb += vec3(0.1, 0.2, 0.5) * vacuum * (1.0-col.a);
        col.a   += vacuum * 0.6 * (1.0-col.a);

        // ── Vórtices — donde |curl| supera el umbral ─────────
        if(density > uThresh){
            float phase  = samplePhase(p);
            vec3  grad   = volGrad(p);
            float gMag   = length(grad);
            vec3  normal = gMag > 0.001 ? -normalize(grad) : vec3(0,1,0);
            float diff   = max(0.0, dot(normal, normalize(vec3(0.5,1.0,0.8)))) * 0.6 + 0.4;

            vec3  baseCol = phaseColor(phase, density);
            // Alpha proporcional al exceso sobre el umbral
            float excess  = (density - uThresh) / (1.0 - uThresh + 0.001);
            float alpha   = smoothstep(0.0, 0.4, excess) * 0.4;

            col.rgb += baseCol * diff * alpha * (1.0-col.a);
            col.a   += alpha * (1.0-col.a);
        }

        // ── Núcleo brillante — densidades muy altas ───────────
        if(density > uThresh * 1.6){
            float core  = smoothstep(uThresh*1.6, 1.0, density);
            float phase = samplePhase(p);
            col.rgb += phaseColor(phase, 1.0) * core * 0.15 * (1.0-col.a);
            col.a   += core * 0.1 * (1.0-col.a);
        }
    }

    if(col.a < 0.002) discard;
    gl_FragColor = col;
}
`;

const BOX_SIZE = 2.5;
const uniforms = {
    uCameraPos:   { value: new THREE.Vector3() },
    uCameraLocal: { value: new THREE.Vector3() },
    uBoxSize:     { value: BOX_SIZE }, // cámara en espacio local del box
    uTime:        { value: 0.0 },
    uThresh:      { value: THRESH },
    uEnergy:      { value: 0.0 },
    uVolume:      { value: texture3D },
    uPhase:       { value: texturePhase },
};

const material = new THREE.ShaderMaterial({
    uniforms, vertexShader, fragmentShader,
    transparent:true, side:THREE.DoubleSide,
    depthWrite:false, blending:THREE.NormalBlending
});
const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(BOX_SIZE*2, BOX_SIZE*2, BOX_SIZE*2),
    material
);
scene.add(mesh);

const starGeo = new THREE.BufferGeometry();
const sp = new Float32Array(600*3);
for(let i=0;i<600*3;i++) sp[i]=(Math.random()-0.5)*30;
starGeo.setAttribute('position', new THREE.BufferAttribute(sp,3));
scene.add(new THREE.Points(starGeo,
    new THREE.PointsMaterial({color:0x0a0a1a, size:0.04, sizeAttenuation:true})));

document.getElementById('btn-perturb').onclick = () => {
    injectPerturbation();
};

document.getElementById('btn-helical').onclick = () => {
    injectHelical(N/2, N/2, N/2, 0.9, 3.0);
    document.getElementById('btn-helical').classList.add('active-state');
    setTimeout(()=>document.getElementById('btn-helical').classList.remove('active-state'), 2000);
};

document.getElementById('btn-pause').onclick = function(){
    paused = !paused;
    this.textContent = paused ? '▶ Reanudar' : '‖ Pausar';
};

document.getElementById('btn-noise').onclick = () => {
    initNoise(0.12);
};

document.getElementById('btn-reset').onclick = () => {
    initNoise(0.12);
    injectHelical(N/2, N/2, N/2, 0.8, 3.0);
    frameCount = 0;
};

document.getElementById('sEta').oninput = e => {
    ETA = +e.target.value;
    document.getElementById('vEta').textContent = ETA.toFixed(2);
};
document.getElementById('sLambda').oninput = e => {
    LAMBDA = +e.target.value;
    document.getElementById('vLambda').textContent = LAMBDA.toFixed(3);
};
document.getElementById('sThresh').oninput = e => {
    THRESH = +e.target.value;
    uniforms.uThresh.value = THRESH;
    document.getElementById('vThresh').textContent = THRESH.toFixed(2);
};

const TEXTURE_UPDATE_INTERVAL = 2;
let lastT = 0;

function animate(t){
    requestAnimationFrame(animate);
    const dt = Math.min((t-lastT)/1000, 0.05);
    lastT = t;

    uniforms.uTime.value += dt;
    uniforms.uCameraPos.value.copy(camera.position);

    // Cámara en espacio local del box — sin inverse() en shader
    // El box no tiene rotación, solo escala uniforme BOX_SIZE
    // Por eso la transformación es simplemente dividir por la escala
    uniforms.uCameraLocal.value.copy(camera.position)
        .divideScalar(BOX_SIZE);

    if(!paused){
        computeCurl();
        
        // Calculamos la energía ANTES de manipular la textura
        const energy = computeEnergy(); 
        
        applySnap();
        frameCount++;

        if(frameCount % TEXTURE_UPDATE_INTERVAL === 0){
            updateTextures();
            uniforms.uThresh.value = THRESH;
            uniforms.uEnergy.value = energy;

            const curlMax  = Math.max(...Array.from(curlMag).slice(0,100)); 
            const vortices = countVortices();

            if(energy > maxEnergy) maxEnergy = energy;
            document.getElementById('s-frame').textContent  = frameCount;
            document.getElementById('s-energy').textContent = energy.toFixed(4);
            document.getElementById('s-curl').textContent   = curlMax.toFixed(3);
            document.getElementById('s-vortex').textContent = vortices;
            document.getElementById('energy-fill').style.width =
                Math.min(100, (energy/maxEnergy)*100).toFixed(1)+'%';

            const label = energy < 0.01  ? 'vacío cuántico'  :
                          energy < 0.5   ? 'nucleando vórtices' :
                          energy < 2.0   ? 'campo activo'     : 'alta energía ⚡';
            document.getElementById('field-display').textContent =
                `ψ emergente — ${label}`;
        }
    }

    const d = camera.position.length();
    document.getElementById('s-zoom').textContent =
        d > 8 ? 'cosmos' : d > 4 ? 'campo' : d > 2 ? 'vórtice' : 'núcleo';

    ctrl.update();
    composer.render();
}

initNoise(0.12);
injectHelical(N/2, N/2, N/2, 1.2, 3.0);
computeCurl();
updateTextures();

animate(0);

window.addEventListener('resize', ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
});
</script>
