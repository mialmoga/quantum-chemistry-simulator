<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AtOhmEter V2.4 — Shell Geometry Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }

        #ui {
            position: absolute; top: 0; left: 0; right: 0;
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 18px 20px; pointer-events: none; z-index: 10;
        }

        #identity h1 {
            font-size: 13px; letter-spacing: 0.25em; color: rgba(255,255,255,0.18);
            text-transform: uppercase;
        }
        #element-display {
            margin-top: 6px;
            font-size: 11px; letter-spacing: 0.1em; color: rgba(255,200,100,0.6);
        }

        #stats {
            text-align: right; pointer-events: none;
            font-size: 10px; line-height: 2.0; letter-spacing: 0.06em;
            color: rgba(255,255,255,0.3);
        }
        #stats span { color: rgba(255,255,255,0.7); }
        #stats .accent { color: #44ddcc; }

        #controls {
            position: absolute; bottom: 0; left: 0; right: 0;
            display: flex; justify-content: center; align-items: center;
            gap: 8px; padding: 20px; z-index: 10;
            flex-wrap: wrap;
        }

        .btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.55);
            font-family: 'Courier New', monospace;
            font-size: 11px; letter-spacing: 0.1em;
            padding: 8px 16px; cursor: pointer;
            border-radius: 2px; transition: all 0.12s;
            user-select: none; -webkit-user-select: none;
        }
        .btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.3);
            color: rgba(255,255,255,0.9);
        }
        .btn.danger { border-color: rgba(255,80,80,0.3); color: rgba(255,80,80,0.5); }
        .btn.accent { border-color: rgba(68,221,204,0.3); color: rgba(68,221,204,0.5); }
        .btn.special { border-color: rgba(255,255,255,0.6); color: #fff; background: rgba(255,255,255,0.1); }

        #bloom {
            position: absolute; top: 18px; right: 20px;
            background: rgba(0,0,0,0.6);
            border-left: 1px solid rgba(255,255,255,0.08);
            padding: 12px 14px;
            z-index: 10;
            pointer-events: auto;
        }
        #bloom label { display: block; font-size: 8px; color: rgba(255,200,80,0.45); margin-top: 8px; }
        #bloom input { width: 110px; display: block; accent-color: #ff5555; }

        #zoom-hint {
            position: absolute; bottom: 85px; right: 20px;
            font-size: 9px; color: rgba(255,255,255,0.15);
            text-align: right; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="ui">
    <div id="identity">
        <h1>AtOhmEter // V2.4</h1>
        <div id="element-display">— vacío cuántico —</div>
    </div>
    <div id="stats">
        <div>protones &nbsp;<span id="s-p">0</span></div>
        <div>neutrones <span id="s-n">0</span></div>
        <div>nucleones <span id="s-a">0</span></div>
        <div>zoom &nbsp;&nbsp;&nbsp;&nbsp;<span class="accent" id="s-z">núcleo</span></div>
    </div>
</div>

<div id="zoom-hint">
    scroll/pinch → zoom<br>
    drag → órbita<br>
    geometría: shell-based
</div>

<div id="bloom">
    <label>BLOOM STR</label><input type="range" id="bStr" min="0" max="5" step="0.05" value="2.2">
    <label>BLOOM RAD</label><input type="range" id="bRad" min="0" max="1" step="0.01" value="0.5">
    <label>THRESHOLD</label><input type="range" id="bThr" min="0" max="0.5" step="0.005" value="0.06">
    <label>EXPOSURE</label><input type="range" id="bExp" min="0.2" max="3" step="0.05" value="1.4">
</div>

<div id="controls">
    <button class="btn special" id="btn-nextZ">+ PRÓXIMO Z</button>
    <button class="btn" id="btn-addP">+ P</button>
    <button class="btn" id="btn-addN">+ N</button>
    <button class="btn danger" id="btn-remP">− P</button>
    <button class="btn danger" id="btn-remN">− N</button>
    <button class="btn accent" id="btn-shells">Capas ON</button>
    <button class="btn" id="btn-reset">Reset</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "/lib/three/build/three.module.js",
    "three/addons/": "/lib/three/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls }  from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }     from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }     from 'three/addons/postprocessing/OutputPass.js';

const ELEMENTS = ['—','H','He','Li','Be','B','C','N','O','F','Ne','Na','Mg','Al','Si','P','S','Cl','Ar','K','Ca','Sc','Ti','V','Cr','Mn','Fe','Co','Ni','Cu','Zn'];
const STABLE_N = [0, 0, 2, 4, 5, 6, 6, 7, 8, 10, 10, 12, 12, 14, 14, 16, 16, 18, 22, 20, 20, 24, 26, 28, 28, 30, 30, 32, 30, 34, 34];

function getStableN(z) {
    return z < STABLE_N.length ? STABLE_N[z] : Math.round(z * 1.25);
}

function nucleonPositions(count) {
    if (count === 0) return [];
    const positions = [];
    const shells = [
        { max: 2,  r: 0.15 },
        { max: 8,  r: 0.35 },
        { max: 20, r: 0.55 },
        { max: 40, r: 0.75 },
        { max: 70, r: 0.95 }
    ];
    let remaining = count;
    const golden = Math.PI * (3.0 - Math.sqrt(5.0));
    for (const shell of shells) {
        if (remaining <= 0) break;
        const inShell = Math.min(remaining, shell.max);
        const R = shell.r * Math.pow(count, 0.2);
        for (let i = 0; i < inShell; i++) {
            const y = 1.0 - (i / Math.max(inShell - 1, 1)) * 2.0;
            const r = Math.sqrt(Math.max(0, 1.0 - y * y));
            const theta = golden * i;
            positions.push(new THREE.Vector3(R * r * Math.cos(theta), R * y, R * r * Math.sin(theta)));
        }
        remaining -= inShell;
    }
    return positions;
}

let Z = 1, N = 0;
const MAX_SOURCES = 64;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.4;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.001, 1000);
camera.position.set(0, 0, 8);

const orbitCtrl = new OrbitControls(camera, renderer.domElement);
orbitCtrl.enableDamping = true;
orbitCtrl.minDistance = 0.01;

const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.2, 0.5, 0.06);
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

const uSources  = new Array(MAX_SOURCES).fill(null).map(() => new THREE.Vector3());
const uIsProton = new Float32Array(MAX_SOURCES);

const uniforms = {
    uTime:        { value: 0 },
    uCameraPos:   { value: new THREE.Vector3() },
    uBoxSize:     { value: 4.0 },
    uOmega:       { value: 1.0 },
    uZ:           { value: 1.0 },
    uA:           { value: 1.0 },
    uNucRadius:   { value: 0.3 },
    uShowShells:  { value: 1.0 },
    uZoomLevel:   { value: 0.0 },
    uOrbRadius:   { value: 2.5 },
    uNShells:     { value: 1.0 },
    uSources:     { value: uSources },
    uIsProton:    { value: uIsProton },
    uSourceCount: { value: 1 },
};

const vertexShader = /* glsl */`
    varying vec3 vWorldPos;
    void main() {
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vWorldPos = wp.xyz;
        gl_Position = projectionMatrix * viewMatrix * wp;
    }
`;

const fragmentShader = /* glsl */`
precision highp float;

varying vec3 vWorldPos;
uniform vec3  uCameraPos;
uniform float uTime, uOmega, uZ, uA, uNucRadius;
uniform float uShowShells, uZoomLevel, uOrbRadius, uNShells, uBoxSize;
uniform vec3  uSources[64];
uniform float uIsProton[64];
uniform int   uSourceCount;

// ── Box exit: cuánto puede viajar el rayo dentro del box ─────
float boxExit(vec3 ro, vec3 rd, float bs) {
    vec3 tMax = (sign(rd) * bs - ro) / rd;
    return min(min(tMax.x, tMax.y), tMax.z);
}

// ── Orbital esférico con nodos radiales ──────────────────────
float orbitalField(vec3 p, float R_orb, float nShells) {
    float r = length(p);
    if (r < 0.001 || R_orb < 0.01) return 0.0;
    float width    = R_orb * (0.25 + nShells * 0.08);
    float envelope = exp(-pow(max(0.0, r - R_orb) / width, 2.0))
                   * (1.0 - exp(-r * r / (R_orb * 0.3)));
    float nodeFreq = nShells * 3.14159 / R_orb;
    float standing = sin(nodeFreq * r);
    float globalMod = 0.6 + 0.4 * sin(r * 3.14159 * nShells / R_orb + 0.5);
    return envelope * standing * standing * globalMod;
}

void main() {
    // ── Rayo desde la cámara, entrando al box por vWorldPos ──
    vec3 rayDir = normalize(vWorldPos - uCameraPos);
    vec3 rayPos = vWorldPos;                     // punto de entrada al box

    float tMax    = boxExit(rayPos, rayDir, uBoxSize - 0.001);
    int   steps   = uSourceCount > 16 ? 28 : (uSourceCount > 6 ? 38 : 48);
    float stepSize = tMax / float(steps);

    vec4 col = vec4(0.0);

    for (int i = 0; i < 64; i++) {
        if (float(i) * stepSize > tMax) break;
        if (col.a >= 0.97) break;

        vec3 p = rayPos + rayDir * (float(i) * stepSize + stepSize * 0.5);

        // ── Campo nuclear ─────────────────────────────────────
        float nucField = 0.0;
        for (int s = 0; s < 64; s++) {
            if (s >= uSourceCount) break;
            float d = distance(p, uSources[s]);
            if (d > 2.2) continue;
            // decay 2.2 (probado en V2.2) — no 30
            float wave = cos(uOmega * 12.0 * d - uTime * uOmega * 3.14159)
                       * exp(-d * d * 2.2);
            nucField += wave * (uIsProton[s] > 0.5 ? 1.0 : -1.0);
        }

        float af = abs(nucField);
        if (af > 0.12) {
            vec3 posCol = vec3(2.2, 0.12, 0.45);
            vec3 negCol = vec3(0.12, 1.4, 2.2);
            vec3 baseCol = mix(negCol, posCol, step(0.0, nucField));
            baseCol += vec3(3.0, 1.8, 0.3) * smoothstep(0.45, 0.88, af);
            float alpha = clamp((af - 0.12) * 0.14 * stepSize / 0.1, 0.0, 0.05);
            col.rgb += baseCol * alpha * (1.0 - col.a);
            col.a   += alpha * (1.0 - col.a);
        }

        // ── Orbital ───────────────────────────────────────────
        if (uShowShells > 0.5 && uZ > 0.0) {
            float orb = orbitalField(p, uOrbRadius, uNShells);
            if (orb > 0.02) {
                float breathe = 0.7 + 0.3 * sin(uTime * uOmega * 0.5);
                float oa = clamp(orb * 0.06 * breathe, 0.0, 0.04);
                col.rgb += vec3(0.3, 2.0, 1.4) * oa * (1.0 - col.a);
                col.a   += oa * (1.0 - col.a);
            }
        }
    }

    if (col.a < 0.004) discard;
    gl_FragColor = col;
}
`;

const BOX = 4.0;
const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(BOX*2, BOX*2, BOX*2),
    new THREE.ShaderMaterial({
        uniforms, vertexShader, fragmentShader,
        transparent: true, depthWrite: false,
        side: THREE.FrontSide, blending: THREE.NormalBlending
    })
);
scene.add(mesh);

// Estrellas de fondo
const sg = new THREE.BufferGeometry();
const sp = new Float32Array(800 * 3);
for (let i = 0; i < 800 * 3; i++) sp[i] = (Math.random() - 0.5) * 120;
sg.setAttribute('position', new THREE.BufferAttribute(sp, 3));
scene.add(new THREE.Points(sg, new THREE.PointsMaterial({ color: 0x112233, size: 0.06, sizeAttenuation: true })));

function smoothstep(e0, e1, x) {
    const t = Math.max(0, Math.min(1, (x - e0) / (e1 - e0)));
    return t * t * (3 - 2 * t);
}

function syncNucleus() {
    const A = Z + N;
    const period = Z <= 2 ? 1 : Z <= 10 ? 2 : Z <= 18 ? 3 : 4;

    uniforms.uOmega.value     = 1.0 + Z * 0.1;
    uniforms.uZ.value         = Z;
    uniforms.uA.value         = A;
    uniforms.uSourceCount.value = Math.min(A, MAX_SOURCES);
    uniforms.uNShells.value   = period;
    uniforms.uOrbRadius.value = 1.2 + period * 0.5;
    uniforms.uNucRadius.value = 0.3 * Math.pow(Math.max(A, 1), 1/3);

    // Ajustar box al radio orbital
    const boxSize = Math.max(4.0, uniforms.uOrbRadius.value * 2.5);
    uniforms.uBoxSize.value = boxSize;
    mesh.scale.setScalar(boxSize / BOX);

    const pos = nucleonPositions(A);
    pos.forEach((v, i) => {
        if (i < MAX_SOURCES) { uSources[i].copy(v); uIsProton[i] = i < Z ? 1.0 : 0.0; }
    });

    document.getElementById('element-display').textContent =
        A === 0 ? '— vacío cuántico —' : `${ELEMENTS[Z] || 'Z'+Z} · Z=${Z} N=${N} A=${A}`;
    document.getElementById('s-p').textContent = Z;
    document.getElementById('s-n').textContent = N;
    document.getElementById('s-a').textContent = A;
}

function updateZoom() {
    const dist = camera.position.length();
    const R = Math.max(uniforms.uNucRadius.value, 0.3);
    uniforms.uZoomLevel.value = 1.0 - smoothstep(R * 0.8, R * 3.0, dist);
    uniforms.uCameraPos.value.copy(camera.position);
    document.getElementById('s-z').textContent =
        dist > R * 8 ? 'orbital' : dist > R * 2 ? 'núcleo' : 'quarks ⚡';
}

document.getElementById('btn-nextZ').onclick = () => { Z++; N = getStableN(Z); syncNucleus(); };
document.getElementById('btn-addP').onclick  = () => { Z++; syncNucleus(); };
document.getElementById('btn-addN').onclick  = () => { N++; syncNucleus(); };
document.getElementById('btn-remP').onclick  = () => { if (Z > 0) Z--; syncNucleus(); };
document.getElementById('btn-remN').onclick  = () => { if (N > 0) N--; syncNucleus(); };
document.getElementById('btn-reset').onclick = () => { Z = 1; N = 0; syncNucleus(); };
document.getElementById('btn-shells').onclick = function() {
    uniforms.uShowShells.value = uniforms.uShowShells.value > 0.5 ? 0.0 : 1.0;
    this.textContent = uniforms.uShowShells.value > 0.5 ? 'Capas ON' : 'Capas OFF';
};

document.getElementById('bStr').oninput = e => bloomPass.strength  = +e.target.value;
document.getElementById('bRad').oninput = e => bloomPass.radius    = +e.target.value;
document.getElementById('bThr').oninput = e => bloomPass.threshold = +e.target.value;
document.getElementById('bExp').oninput = e => renderer.toneMappingExposure = +e.target.value;

let lastT = 0;
function animate(t) {
    requestAnimationFrame(animate);
    uniforms.uTime.value += Math.min((t - lastT) / 1000, 0.05);
    lastT = t;
    updateZoom();
    orbitCtrl.update();
    composer.render();
}

syncNucleus();
animate(0);

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
    bloomPass.resolution.set(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
