<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QSim — Nuclear Layer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #04060f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        /* ── HUD ─────────────────────────────────────── */
        #hud {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            line-height: 1.8;
            pointer-events: none;
            letter-spacing: 0.05em;
        }

        #hud .stat {
            display: flex;
            gap: 8px;
        }

        #hud span {
            color: rgba(255, 255, 255, 0.9);
            font-weight: bold;
            min-width: 30px;
        }

        #hud .accent-blue  { color: #5588ff; }
        #hud .accent-grey  { color: #aaaaaa; }
        #hud .accent-red   { color: #ff5555; }

        /* ── Title ───────────────────────────────────── */
        #title {
            position: fixed;
            top: 20px;
            right: 20px;
            text-align: right;
            pointer-events: none;
        }

        #title h1 {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: normal;
            color: rgba(255,255,255,0.25);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        #title p {
            font-size: 10px;
            color: rgba(255,255,255,0.12);
            margin-top: 4px;
            letter-spacing: 0.1em;
        }

        /* ── Controls ────────────────────────────────── */
        #controls {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }

        button {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.7);
            font-family: 'Courier New', monospace;
            font-size: 11px;
            letter-spacing: 0.08em;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.15s ease;
        }

        button:hover {
            background: rgba(255,255,255,0.09);
            border-color: rgba(255,255,255,0.3);
            color: rgba(255,255,255,0.95);
        }

        /* ── Legend ──────────────────────────────────── */
        #legend {
            position: fixed;
            bottom: 80px;
            right: 20px;
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            line-height: 2;
            letter-spacing: 0.05em;
            pointer-events: none;
        }

        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .dot-r { background: #ff3a3a; }
        .dot-g { background: #3aff6e; }
        .dot-b { background: #3a8fff; }
        .dot-h { background: rgba(136, 170, 255, 0.3);
                  border: 1px solid rgba(136, 170, 255, 0.4); }
    </style>
</head>
<body>

    <div id="hud"></div>

    <div id="title">
        <h1>QSim · Nuclear</h1>
        <p>1 wu = 1 pm · Three.js r128</p>
    </div>

    <div id="legend">
        <div><span class="dot dot-r"></span>Red quark</div>
        <div><span class="dot dot-g"></span>Green quark</div>
        <div><span class="dot dot-b"></span>Blue quark</div>
        <div><span class="dot dot-h"></span>Hadron boundary</div>
        <div style="margin-top:6px; color: rgba(255,255,255,0.15)">
            Glow = tension · R+G+B → confinement
        </div>
    </div>

    <div id="controls">
        <button id="btn-proton">+ Proton (uud)</button>
        <button id="btn-neutron">+ Neutron (udd)</button>
        <button id="btn-pause">⏸ Pause</button>
        <button id="btn-clear">Clear</button>
    </div>
    
    <!-- Import Map — Three.js local (r182) -->
    <script type="importmap">
    {
      "imports": {
        "three":          "/lib/three/build/three.module.js",
        "three/addons/":  "/lib/three/examples/jsm/",
        "three/webgpu":   "/lib/three/build/three.webgpu.js",
        "three/tsl":      "/lib/three/build/three.tsl.js"
      }
    }
    </script>


    <!-- Note: in production this uses Three.js r183.
         CDN only has r128, so we use that for the demo.
         The module paths in main.js should point to your local r183. -->
    <script type="module" src="main.js"></script>

</body>
</html>
