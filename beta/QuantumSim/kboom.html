<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>QCS V3.6 — Control Total & Probabilidad</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #fff; }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 10; }
        #element-display { font-size: 18px; color: #44ddcc; text-shadow: 0 0 10px #44ddcc; }
        
        #panel-control { 
            position: absolute; top: 20px; right: 20px; 
            background: rgba(0,0,0,0.8); border-left: 2px solid #44ddcc; 
            padding: 15px; z-index: 20; pointer-events: auto; backdrop-filter: blur(10px);
        }
        #panel-control label { display: block; font-size: 8px; color: #44ddcc; margin-bottom: 4px; }
        #panel-control input { width: 110px; margin-bottom: 10px; accent-color: #44ddcc; display: block; cursor: pointer; }

        #controls { position: absolute; bottom: 20px; left: 0; right: 0; display: flex; justify-content: center; gap: 8px; z-index: 10; flex-wrap: wrap; }
        .btn { background: rgba(0,0,0,0.7); border: 1px solid #44ddcc; color: #44ddcc; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-size: 10px; }
    </style>
</head>
<body>

<div id="ui">
    <div id="element-display">HIDRÓGENO</div>
    <div style="font-size: 9px; opacity: 0.6;">CASA CLUB — MODO LABORATORIO V3.6</div>
</div>

<div id="panel-control">
    <label>NUBE DE PROBABILIDAD</label>
    <input type="range" id="oDens" min="0" max="2" step="0.1" value="0.8">
    <label>INTENSIDAD BLOOM</label>
    <input type="range" id="bStr" min="0" max="5" step="0.1" value="2.0">
    <label>EXPOSICIÓN</label>
    <input type="range" id="exp" min="0.1" max="3" step="0.1" value="1.2">
</div>

<div id="controls">
    <button class="btn" id="btn-nextZ">+ SIGUIENTE Z</button>
    <button class="btn" id="btn-addP">+P</button>
    <button class="btn" id="btn-addN">+N</button>
    <button class="btn" style="border-color: #ff5577; color: #ff5577;" id="btn-reset">RESET</button>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

let Z = 1, N = 0;
const MAX_U = 64;
const BOX_SIZE = 5.0;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ReinhardToneMapping;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 8);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.0, 0.4, 0.1);
composer.addPass(bloom);
composer.addPass(new OutputPass());

const uSources = new Array(MAX_U).fill(null).map(() => new THREE.Vector3());
const uIsP = new Float32Array(MAX_U);
const uStress = new Float32Array(MAX_U);

const uniforms = {
    uTime: { value: 0 },
    uCameraPos: { value: new THREE.Vector3() },
    uSources: { value: uSources },
    uIsP: { value: uIsP },
    uStress: { value: uStress },
    uCount: { value: 1 },
    uBoxSize: { value: BOX_SIZE },
    uOrbitalDens: { value: 0.8 }
};

const fragmentShader = `
precision highp float;
varying vec3 vWorldPos;
uniform vec3 uCameraPos, uSources[64];
uniform float uTime, uIsP[64], uStress[64], uBoxSize, uOrbitalDens;
uniform int uCount;

float boxExit(vec3 ro, vec3 rd, float size) {
    vec3 m = 1.0 / rd;
    vec3 n = m * ro;
    vec3 k = abs(m) * size;
    vec3 t2 = k - n;
    return min(min(t2.x, t2.y), t2.z);
}

void main() {
    vec3 rd = normalize(vWorldPos - uCameraPos);
    float tMax = boxExit(vWorldPos, rd, uBoxSize);
    vec4 finalCol = vec4(0.0);
    
    for(int i=0; i<38; i++) {
        if(finalCol.a > 0.98) break;
        vec3 p = vWorldPos + rd * (float(i) * (tMax/38.0) + 0.01);
        float dCore = length(p);
        
        // NÚCLEO (Cimática)
        float nucleusField = 0.0;
        if(dCore < 2.2) {
            for(int s=0; s<64; s++) {
                if(s >= uCount) break;
                float distS = distance(p, uSources[s]);
                float omega = 10.0 + (uStress[s] * 11.0);
                nucleusField += cos(omega * distS - uTime * 6.0) * exp(-distS * distS * 2.5);
            }
        }
        
        // NUBE ELECTRÓNICA (Probabilidad)
        float orbitalDens = exp(-dCore * 0.7) * (uOrbitalDens * (float(uCount) * 0.1));
        
        // Composición de capas
        if(abs(nucleusField) > 0.08) {
            vec3 cCore = nucleusField > 0.0 ? vec3(0.0, 0.9, 1.0) : vec3(1.0, 0.2, 0.5);
            float aCore = abs(nucleusField) * 0.28 * (1.0 - finalCol.a);
            finalCol.rgb += cCore * aCore;
            finalCol.a += aCore;
        }
        
        if(orbitalDens > 0.01) {
            vec3 cOrb = vec3(0.2, 0.4, 1.0); 
            float aOrb = orbitalDens * 0.06 * (1.0 - finalCol.a);
            finalCol.rgb += cOrb * aOrb;
            finalCol.a += aOrb;
        }
    }
    if(finalCol.a < 0.01) discard;
    gl_FragColor = finalCol;
}
`;

const mesh = new THREE.Mesh(new THREE.BoxGeometry(BOX_SIZE*2, BOX_SIZE*2, BOX_SIZE*2), new THREE.ShaderMaterial({
    uniforms,
    vertexShader: `varying vec3 vWorldPos; void main(){ vWorldPos=(modelMatrix*vec4(position,1.0)).xyz; gl_Position=projectionMatrix*viewMatrix*modelMatrix*vec4(position,1.0); }`,
    fragmentShader, transparent: true, depthWrite: false
}));
scene.add(mesh);

const ELEMENTS = ['Vacío','Hidrógeno','Helio','Litio','Berilio','Boro','Carbono','Nitrógeno','Oxígeno','Flúor','Neón','Sodio','Magnesio','Aluminio','Silicio','Fósforo','Azufre','Cloro','Argón','Potasio','Calcio'];

function sync() {
    const A = Math.min(Z + N, MAX_U);
    uniforms.uCount.value = A;
    const pos = [];
    const shells = [{c:2, r:0.4}, {c:8, r:0.9}, {c:20, r:1.6}];
    let rem = A;
    const phi = Math.PI * (3.0 - Math.sqrt(5.0));
    for (let s=0; s<shells.length && rem>0; s++) {
        let n = Math.min(rem, shells[s].c);
        for (let i=0; i<n; i++) {
            let y = 1.0 - (i/(n-1||1))*2.0;
            let rad = Math.sqrt(1.0-y*y)*shells[s].r;
            let th = i*phi;
            pos.push(new THREE.Vector3(Math.cos(th)*rad, y*shells[s].r, Math.sin(th)*rad));
        }
        rem -= n;
    }
    for(let i=0; i<A; i++) {
        uSources[i].copy(pos[i]);
        uIsP[i] = i < Z ? 1.0 : 0.0;
        let stress = 0.0;
        for(let j=0; j<A; j++) {
            if(i === j) continue;
            let d = pos[i].distanceTo(pos[j]);
            if(d < 1.2) stress += (1.2 - d);
        }
        uStress[i] = stress * 0.4;
    }
    document.getElementById('element-display').textContent = ELEMENTS[Z]?.toUpperCase() || 'ELEMENTO '+Z;
}

document.getElementById('btn-nextZ').onclick = () => { if(Z<20){ Z++; sync(); }};
document.getElementById('btn-addP').onclick = () => { if(Z<MAX_U){ Z++; sync(); }};
document.getElementById('btn-addN').onclick = () => { N++; sync(); };
document.getElementById('btn-reset').onclick = () => { Z=1; N=0; sync(); };

document.getElementById('bStr').oninput = (e) => bloom.strength = parseFloat(e.target.value);
document.getElementById('exp').oninput = (e) => renderer.toneMappingExposure = parseFloat(e.target.value);
document.getElementById('oDens').oninput = (e) => uniforms.uOrbitalDens.value = parseFloat(e.target.value);

function animate(t) {
    requestAnimationFrame(animate);
    uniforms.uTime.value = t / 1000;
    uniforms.uCameraPos.value.copy(camera.position);
    controls.update();
    composer.render();
}
sync(); animate(0);
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
