<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terrarium Lab Monitor v3.0</title>
    <script src="components/marked.min.js"></script>
    <link href="components/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="components/prism.min.js"></script>
    <script src="components/prism-markup.min.js"></script>
    <script src="components/prism-css.min.js"></script>
    <script src="components/prism-c.min.js"></script>
    <script src="components/prism-javascript.min.js"></script>
    <script src="components/prism-python.min.js"></script>
    <script src="components/prism-json.min.js"></script>
    <script src="components/prism-glsl.min.js"></script>
    <script src="components/prism-bash.min.js"></script>
    <style>
        /* ── Tailwind replacement — solo lo que se usa ────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #020617; color: #e2e8f0; min-height: 100vh; padding: 16px; font-family: system-ui, -apple-system, sans-serif; }
        @media (min-width: 768px) { body { padding: 32px; } }
        .hidden { display: none; }
        .font-sans { font-family: system-ui, -apple-system, sans-serif; }
        .font-mono { font-family: 'SF Mono', 'Fira Code', monospace; }
        .font-bold { font-weight: 700; }
        .font-black { font-weight: 900; }
        .italic { font-style: italic; }
        .text-xs { font-size: 12px; }
        .text-sm { font-size: 14px; }
        .text-4xl { font-size: 2.25rem; line-height: 2.5rem; }
        .text-\[10px\] { font-size: 10px; }
        .text-center { text-align: center; }
        .uppercase { text-transform: uppercase; }
        .tracking-tighter { letter-spacing: -0.05em; }
        .tracking-widest { letter-spacing: 0.1em; }
        .tracking-\[0\.3em\] { letter-spacing: 0.3em; }
        .text-cyan-500 { color: #06b6d4; }
        .text-red-500 { color: #ef4444; }
        .text-slate-200 { color: #e2e8f0; }
        .text-slate-300 { color: #cbd5e1; }
        .text-slate-500 { color: #64748b; }
        .text-slate-600 { color: #475569; }
        .text-slate-700 { color: #334155; }
        .text-slate-900 { color: #0f172a; }
        .bg-slate-800 { background: #1e293b; }
        .bg-slate-800\/50 { background: rgba(30,41,59,0.5); }
        .bg-slate-900 { background: #0f172a; }
        .bg-slate-950 { background: #020617; }
        .bg-cyan-600 { background: #0891b2; }
        .bg-red-950\/20 { background: rgba(69,10,10,0.2); }
        .bg-red-500\/50 { background: rgba(239,68,68,0.5); }
        .bg-yellow-500\/50 { background: rgba(234,179,8,0.5); }
        .bg-green-500\/50 { background: rgba(34,197,94,0.5); }
        .border { border: 1px solid; }
        .border-2 { border: 2px solid; }
        .border-b { border-bottom: 1px solid; }
        .border-dashed { border-style: dashed; }
        .border-slate-700 { border-color: #334155; }
        .border-slate-800 { border-color: #1e293b; }
        .border-slate-900 { border-color: #0f172a; }
        .border-red-900\/50 { border-color: rgba(127,29,29,0.5); }
        .rounded { border-radius: 4px; }
        .rounded-lg { border-radius: 8px; }
        .rounded-2xl { border-radius: 16px; }
        .rounded-3xl { border-radius: 24px; }
        .rounded-full { border-radius: 9999px; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .flex-grow { flex-grow: 1; }
        .items-center { align-items: center; }
        .items-start { align-items: flex-start; }
        .justify-between { justify-content: space-between; }
        .gap-1 { gap: 4px; }
        .gap-2 { gap: 8px; }
        .gap-3 { gap: 12px; }
        .gap-4 { gap: 16px; }
        .gap-6 { gap: 24px; }
        .p-4 { padding: 16px; }
        .p-6 { padding: 24px; }
        .px-3 { padding-left: 12px; padding-right: 12px; }
        .px-4 { padding-left: 16px; padding-right: 16px; }
        .px-5 { padding-left: 20px; padding-right: 20px; }
        .px-6 { padding-left: 24px; padding-right: 24px; }
        .py-1 { padding-top: 4px; padding-bottom: 4px; }
        .py-2 { padding-top: 8px; padding-bottom: 8px; }
        .py-32 { padding-top: 128px; padding-bottom: 128px; }
        .pb-8 { padding-bottom: 32px; }
        .mt-1 { margin-top: 4px; }
        .mt-20 { margin-top: 80px; }
        .mb-8 { margin-bottom: 32px; }
        .mx-auto { margin-left: auto; margin-right: auto; }
        .max-w-6xl { max-width: 1152px; }
        .max-h-\[600px\] { max-height: 600px; }
        .min-h-screen { min-height: 100vh; }
        .w-2 { width: 8px; }
        .h-2 { height: 8px; }
        .w-full { width: 100%; }
        .overflow-y-auto { overflow-y: auto; }
        .overflow-hidden { overflow: hidden; }
        .relative { position: relative; }
        .absolute { position: absolute; }
        .right-3 { right: 12px; }
        .top-2 { top: 8px; }
        .shadow-2xl { box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .transition { transition: all 0.15s ease; }
        .transition-all { transition: all 0.15s ease; }
        .transition-colors { transition: color 0.15s ease, background-color 0.15s ease, border-color 0.15s ease; }
        .space-y-8 > * + * { margin-top: 32px; }
        .hover\:bg-cyan-500:hover { background: #06b6d4; }
        .hover\:bg-slate-700:hover { background: #334155; }
        .hover\:text-red-400:hover { color: #f87171; }
        .hover\:text-red-500:hover { color: #ef4444; }
        .focus\:outline-none:focus { outline: none; }
        .focus\:border-cyan-600:focus { border-color: #0891b2; }
        @media (min-width: 768px) {
            .md\:flex-row { flex-direction: row; }
            .md\:p-8 { padding: 32px; }
        }
        button { cursor: pointer; font-family: inherit; }
        /* ── Markdown Body — estilo rico tipo documentación ────────── */
        .markdown-body { color: #cbd5e1; line-height: 1.75; font-size: 15px; }
        .markdown-body h1 { font-size: 1.9em; font-weight: 800; margin: 0 0 16px; padding-bottom: 10px; border-bottom: 2px solid rgba(34,211,238,0.2); color: #22d3ee; }
        .markdown-body h2 { font-size: 1.5em; font-weight: 700; margin: 28px 0 12px; padding-bottom: 6px; border-bottom: 1px solid rgba(148,163,184,0.15); color: #67e8f9; }
        .markdown-body h3 { font-size: 1.25em; font-weight: 600; margin: 22px 0 8px; color: #a5f3fc; }
        .markdown-body h4 { font-size: 1.1em; font-weight: 600; margin: 18px 0 6px; color: #e2e8f0; }
        .markdown-body p { margin-bottom: 14px; }
        .markdown-body strong { color: #f1f5f9; font-weight: 700; }
        .markdown-body em { color: #94a3b8; font-style: italic; }
        .markdown-body a { color: #38bdf8; text-decoration: underline; text-underline-offset: 3px; }
        .markdown-body a:hover { color: #7dd3fc; }

        /* Listas */
        .markdown-body ul { margin: 8px 0 14px 20px; list-style: disc; }
        .markdown-body ol { margin: 8px 0 14px 20px; list-style: decimal; }
        .markdown-body li { margin-bottom: 4px; }
        .markdown-body li > ul, .markdown-body li > ol { margin-top: 4px; margin-bottom: 4px; }

        /* Blockquote */
        .markdown-body blockquote {
            margin: 14px 0;
            padding: 10px 16px;
            border-left: 3px solid #22d3ee;
            background: rgba(34,211,238,0.05);
            border-radius: 0 8px 8px 0;
            color: #94a3b8;
            font-style: italic;
        }
        .markdown-body blockquote p { margin-bottom: 6px; }
        .markdown-body blockquote p:last-child { margin-bottom: 0; }

        /* Code inline */
        .markdown-body code:not([class*="language-"]) {
            background: rgba(30,41,59,0.8);
            border: 1px solid rgba(51,65,85,0.6);
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 0.88em;
            font-family: 'Fira Code', 'JetBrains Mono', 'SF Mono', monospace;
            color: #7dd3fc;
        }

        /* Code blocks */
        pre[class*="language-"] {
            border-radius: 10px !important;
            background: rgba(15,23,42,0.7) !important;
            border: 1px solid rgba(51,65,85,0.5) !important;
            margin: 12px 0 !important;
            padding: 16px !important;
            font-size: 13px !important;
            overflow-x: auto;
        }
        .markdown-body pre { margin: 12px 0; }

        /* Tablas */
        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 14px 0;
            font-size: 0.92em;
        }
        .markdown-body thead th {
            background: rgba(30,41,59,0.8);
            color: #67e8f9;
            font-weight: 700;
            text-align: left;
            padding: 8px 12px;
            border-bottom: 2px solid rgba(34,211,238,0.2);
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .markdown-body tbody td {
            padding: 7px 12px;
            border-bottom: 1px solid rgba(51,65,85,0.3);
            vertical-align: top;
        }
        .markdown-body tbody tr:hover { background: rgba(34,211,238,0.03); }
        .markdown-body tbody tr:nth-child(even) { background: rgba(15,23,42,0.3); }

        /* HR */
        .markdown-body hr {
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(34,211,238,0.2) 30%, rgba(34,211,238,0.2) 70%, transparent);
            margin: 28px 0;
        }

        /* Imágenes */
        .markdown-body img {
            max-width: 100%;
            border-radius: 10px;
            margin: 12px 0;
            border: 1px solid rgba(51,65,85,0.3);
        }

        /* Checkboxes en listas */
        .markdown-body input[type="checkbox"] {
            margin-right: 6px;
            accent-color: #22d3ee;
        }

        /* Badge-style para emojis al inicio de headers */
        .markdown-body h2 code, .markdown-body h3 code {
            background: rgba(34,211,238,0.1);
            border-color: rgba(34,211,238,0.2);
            color: #22d3ee;
        }

        /* Scrollbar para cards */
        .file-card.hidden-by-search { display: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen p-4 md:p-8 font-sans">

    <header class="max-w-6xl mx-auto mb-8 flex flex-col gap-6 border-b border-slate-800 pb-8">
        <div class="flex justify-between items-start">
            <div>
                <h1 class="text-4xl font-black text-cyan-500 tracking-tighter italic">LAB MONITOR</h1>
                <p class="text-slate-500 font-mono text-xs uppercase tracking-widest mt-1">Multi-Format Forensic Tool</p>
            </div>
            <button onclick="purgeAll()" class="text-xs font-bold text-red-500 hover:text-red-400 border border-red-900/50 px-3 py-1 rounded bg-red-950/20 transition-all uppercase tracking-tighter">
                ☢️ Purge All
            </button>
        </div>

        <div class="flex flex-col md:flex-row gap-4">
            <div class="relative flex-grow">
                <input type="text" id="searchInput" placeholder="Filtrar archivos por nombre..." 
                    class="w-full bg-slate-900 border border-slate-800 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-600 transition-colors">
                <span class="absolute right-3 top-2 text-slate-600">🔍</span>
            </div>
            
            <div class="flex gap-2">
                <input type="file" id="fileInput" class="hidden" accept=".md,.py,.txt,.trace,.json,.js,.css,.glsl,.html,.sh" multiple>
                <button onclick="triggerUpload('replace')" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 px-4 py-2 rounded-lg transition text-sm">
                    🔄 Replace
                </button>
                <button onclick="triggerUpload('append')" class="bg-cyan-600 hover:bg-cyan-500 px-6 py-2 rounded-lg transition text-sm font-black text-slate-900">
                    ➕ ADD DATA
                </button>
            </div>
        </div>
    </header>

    <main id="viewerContainer" class="max-w-6xl mx-auto space-y-8">
        <div id="welcomeMessage" class="py-32 border-2 border-dashed border-slate-900 rounded-3xl text-center">
            <p class="text-slate-700 font-mono text-sm uppercase tracking-widest">Awaiting signal...</p>
            <p class="text-slate-700 font-mono text-sm uppercase tracking-widest">upload forensic files to begin</p>
            <p class="text-slate-700 font-mono text-sm uppercase tracking-widest">(*.md | *.trace | *.txt | *.py)</p>
        </div>
    </main>

    <footer class="max-w-6xl mx-auto mt-20 text-center text-slate-700 text-[10px] font-mono uppercase tracking-[0.3em]">
        by Éter & Ámbar II & Brujo 🦍
    </footer>

    <script>
        const fileInput = document.getElementById('fileInput');
        const container = document.getElementById('viewerContainer');
        const welcomeMessage = document.getElementById('welcomeMessage');
        const searchInput = document.getElementById('searchInput');
        let mode = 'append';

        // Configurar marked con GFM (tablas, checkboxes, strikethrough)
        marked.setOptions({
            gfm: true,
            breaks: true,
            headerIds: false,
        });

        function triggerUpload(newMode) {
            mode = newMode;
            fileInput.click();
        }

        function purgeAll() {
            if (confirm("¿Confirmas la purga de todos los datos en pantalla?")) {
                container.innerHTML = '';
                container.appendChild(welcomeMessage);
                searchInput.value = '';
            }
        }

        // Lógica del Buscador
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.file-card');
            cards.forEach(card => {
                const fileName = card.getAttribute('data-filename').toLowerCase();
                card.classList.toggle('hidden-by-search', !fileName.includes(term));
            });
        });

        fileInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (files.length === 0) return;
            if (mode === 'replace') container.innerHTML = '';
            else if (welcomeMessage) welcomeMessage.remove();

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => createFileCard(file, event.target.result);
                reader.readAsText(file);
            });
            fileInput.value = '';
        });

        function createFileCard(file, content) {
            const ext = file.name.split('.').pop().toLowerCase();
            const card = document.createElement('div');
            card.className = "file-card bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-2xl transition-all duration-300";
            card.setAttribute('data-filename', file.name);
            
            let displayContent = "";
            let langClass = "language-none";

            if (ext === 'md') {
                displayContent = `<div class="markdown-body text-slate-300">${marked.parse(content)}</div>`;
            } else {
                const LANG_MAP = {
                    py: 'python', json: 'json', trace: 'json',
                    js: 'javascript', css: 'css', glsl: 'glsl',
                    html: 'markup', sh: 'bash', txt: 'none',
                };
                langClass = `language-${LANG_MAP[ext] || 'none'}`;
                if (ext === 'trace' || ext === 'json') {
                    try { content = JSON.stringify(JSON.parse(content), null, 4); } catch(e) {}
                }
                displayContent = `<pre class="${langClass}"><code class="${langClass}">${escapeHtml(content)}</code></pre>`;
            }

            card.innerHTML = `
                <div class="bg-slate-800/50 px-5 py-2 flex justify-between items-center border-b border-slate-800">
                    <div class="flex items-center gap-3">
                        <div class="flex gap-1">
                            <div class="w-2 h-2 rounded-full bg-red-500/50"></div>
                            <div class="w-2 h-2 rounded-full bg-yellow-500/50"></div>
                            <div class="w-2 h-2 rounded-full bg-green-500/50"></div>
                        </div>
                        <span class="text-[10px] font-mono font-bold text-cyan-500 tracking-widest">${file.name.toUpperCase()}</span>
                    </div>
                    <button onclick="this.closest('.file-card').remove()" class="text-slate-500 hover:text-red-500 transition-colors font-bold">&times;</button>
                </div>
                <div class="p-6 md:p-8 max-h-[600px] overflow-y-auto custom-scrollbar">${displayContent}</div>
            `;
            container.appendChild(card);
            if (ext !== 'md') Prism.highlightAllUnder(card);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</body>
</html>
