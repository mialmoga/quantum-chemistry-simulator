<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>QCS | Orbital Morphing PoC</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00ffcc; pointer-events: none; }
    </style>
    <script type="importmap">
    {
      "imports": {
        "three": "/lib/three/build/three.module.js",
        "three/addons/": "/lib/three/examples/jsm/",
        "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
      }
    }
    </script>
</head>
<body>

    <div id="ui">
        <h2>QCS | Morphing: Original Bin -> Hybrid</h2>
        <div id="status">Respetando topología del Atlas...</div>
    </div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GUI } from 'lil-gui';

const ATLAS_PATH = './src/orbital_cache/_atlas';

// --- SHADER DE TRANSFORMACIÓN (MORPH) ---
const morphVertex = `
    uniform float uTime;
    uniform float uMorph;    // 0: Original, 1: Híbrido total
    uniform float uType;     // 0:sp, 1:sp2, 2:sp3
    uniform vec3 uCenter;
    uniform vec3 uNeighbor;

    varying float vAlpha;
    varying float vGlow;

    void main() {
        vec3 p = position; 
        vec3 dir = normalize(p);
        float r = length(p);
        
        // 1. Calcular la influencia de la hibridación deseada
        float hybridMask = 0.0;
        if(uType < 0.5) { // sp
            hybridMask = pow(abs(dir.x), 4.0);
        } else if(uType < 1.5) { // sp2
            float angle = atan(dir.y, dir.x);
            hybridMask = pow(max(0.0, cos(3.0 * angle)), 3.0) * pow(1.0 - abs(dir.z), 2.0);
        } else { // sp3
            vec3 t[4];
            t[0]=normalize(vec3(1,1,1)); t[1]=normalize(vec3(-1,-1,1));
            t[2]=normalize(vec3(-1,1,-1)); t[3]=normalize(vec3(1,-1,-1));
            for(int i=0; i<4; i++) hybridMask = max(hybridMask, pow(max(0.0, dot(dir, t[i])), 5.0));
        }

        // 2. TRANSFORMACIÓN GEOMÉTRICA SUAVE
        // En lugar de forzar, desplazamos el punto original hacia la zona de probabilidad híbrida
        vec3 targetPos = dir * r * (1.0 + hybridMask * 1.5);
        vec3 finalPos = mix(p, targetPos, uMorph);

        // 3. ENLACE (Solo si están cerca y el morph está activo)
        vec3 toN = normalize(uNeighbor - uCenter);
        float dist = distance(uCenter, uNeighbor);
        float overlap = max(0.0, dot(normalize(finalPos), toN));
        if(uMorph > 0.5) {
            finalPos += toN * (exp(-dist * 0.1) * 5.0 * overlap * uMorph);
        }

        vec4 mvP = modelViewMatrix * vec4(finalPos, 1.0);
        
        // La visibilidad se apaga donde no hay hibridación según sube el uMorph
        vAlpha = mix(1.0, hybridMask, uMorph) * (1.2 - r * 0.005);
        vGlow = overlap * uMorph;

        gl_PointSize = (2.0 + vGlow * 3.0) * (400.0 / -mvP.z);
        gl_Position = projectionMatrix * mvP;
    }
`;

const morphFrag = `
    varying float vAlpha;
    varying float vGlow;
    uniform vec3 uColor;
    void main() {
        if(vAlpha < 0.1) discard;
        float d = distance(gl_PointCoord, vec2(0.5));
        if(d > 0.5) discard;
        vec3 col = mix(uColor, vec3(1.0), vGlow * 0.6);
        gl_FragColor = vec4(col, vAlpha * (1.0 - d * 2.0));
    }
`;

let scene, camera, renderer;
const pairs = [];
const settings = { morph: 0.0, distance: 20.0 };

async function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(40, 20, 40);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    new OrbitControls(camera, renderer.domElement);

    // Cargamos el orbital p original como base (el más maleable para hibridar)
    const res = await fetch(`${ATLAS_PATH}/2p_m+0.bin`);
    const raw = new Float32Array(await res.arrayBuffer(), 12);
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(raw, 3));

    const createPair = (type, y, color) => {
        const build = () => {
            const mat = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: {value:0}, uColor: {value: new THREE.Color(color)},
                    uMorph: {value: 0}, uType: {value: type},
                    uCenter: {value: new THREE.Vector3()}, uNeighbor: {value: new THREE.Vector3()}
                },
                vertexShader: morphVertex, fragmentShader: morphFrag,
                transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
            });
            const p = new THREE.Points(geo, mat);
            p.rotation.z = Math.PI/2; // Orientar binario original
            scene.add(p);
            return { p, mat };
        };
        pairs.push({ a1: build(), a2: build(), y, type });
    };

    createPair(0, 20, 0x00ffcc);  // sp
    createPair(1, 0, 0xff00ff);   // sp2
    createPair(2, -20, 0xffff00); // sp3

    const gui = new GUI();
    gui.add(settings, 'morph', 0, 1).name('Hibridación %');
    gui.add(settings, 'distance', 10, 30).name('Distancia');
    
    animate();
}

function animate() {
    requestAnimationFrame(animate);
    const t = performance.now() * 0.001;
    pairs.forEach(pair => {
        pair.a1.p.position.set(-settings.distance/2, pair.y, 0);
        pair.a2.p.position.set(settings.distance/2, pair.y, 0);
        
        [pair.a1, pair.a2].forEach((a, i) => {
            const other = (i === 0) ? pair.a2.p.position : pair.a1.p.position;
            a.mat.uniforms.uCenter.value.copy(a.p.position);
            a.mat.uniforms.uNeighbor.value.copy(other);
            a.mat.uniforms.uMorph.value = settings.morph;
            a.mat.uniforms.uTime.value = t;
        });
    });
    renderer.render(scene, camera);
}
init();
</script>
</body>
</html>
