<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AtOhmEter V5 — Snap Engine</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; overflow:hidden; font-family:'Courier New',monospace; touch-action:none; }

        #ui {
            position:absolute; top:0; left:0; right:0;
            display:flex; justify-content:space-between; align-items:flex-start;
            padding:16px 20px; pointer-events:none; z-index:10;
        }
        #identity h1 { font-size:11px; letter-spacing:0.3em; color:rgba(255,255,255,0.15); text-transform:uppercase; }
        #identity h1 span { color:rgba(255,160,60,0.5); }
        #field-display { margin-top:5px; font-size:10px; letter-spacing:0.08em; color:rgba(255,200,100,0.5); }

        #stats { text-align:right; font-size:9px; line-height:2.2; letter-spacing:0.08em; color:rgba(255,255,255,0.25); }
        #stats span { color:rgba(255,255,255,0.6); }
        #stats .hot  { color:rgba(255,120,60,0.9); }
        #stats .cool { color:rgba(60,200,255,0.9); }

        #controls {
            position:absolute; bottom:0; left:0; right:0;
            display:flex; justify-content:center; align-items:center;
            gap:6px; padding:16px; z-index:10; flex-wrap:wrap;
        }
        .btn {
            background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.08);
            color:rgba(255,255,255,0.45); font-family:'Courier New',monospace;
            font-size:10px; letter-spacing:0.1em; padding:7px 14px; cursor:pointer;
            border-radius:2px; transition:all 0.1s; user-select:none; -webkit-user-select:none;
        }
        .btn:active { background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.9); }
        .btn.amber  { border-color:rgba(255,160,40,0.3); color:rgba(255,160,40,0.5); }
        .btn.amber:active { background:rgba(255,160,40,0.08); color:rgba(255,180,60,0.95); }
        .btn.cyan   { border-color:rgba(60,220,200,0.3); color:rgba(60,220,200,0.5); }
        .btn.cyan:active { background:rgba(60,220,200,0.06); color:rgba(60,220,200,0.95); }
        .btn.red    { border-color:rgba(255,70,70,0.3); color:rgba(255,70,70,0.45); }
        .btn.active-state { animation:pulse-btn 1.6s ease-in-out infinite; }
        @keyframes pulse-btn {
            0%,100%{ box-shadow:0 0 0 rgba(255,160,40,0); }
            50%    { box-shadow:0 0 8px rgba(255,160,40,0.3); }
        }

        #params {
            position:absolute; right:0; top:50px;
            width:160px; background:rgba(0,0,0,0.8);
            border-left:1px solid rgba(255,255,255,0.06);
            padding:10px 12px; z-index:10; pointer-events:auto;
        }
        #params .pt { font-size:7px; letter-spacing:0.2em; color:rgba(255,160,40,0.35);
                      text-transform:uppercase; margin-bottom:8px;
                      border-bottom:1px solid rgba(255,160,40,0.1); padding-bottom:5px; }
        #params label { display:block; font-size:7px; color:rgba(255,255,255,0.3);
                        letter-spacing:0.1em; margin-top:8px; margin-bottom:2px; }
        #params input[type=range] {
            width:100%; height:2px; -webkit-appearance:none; appearance:none;
            background:rgba(255,255,255,0.08); border-radius:1px; cursor:pointer; display:block;
        }
        #params input[type=range]::-webkit-slider-thumb {
            -webkit-appearance:none; width:9px; height:9px; border-radius:50%; cursor:pointer;
        }
        #sEta::-webkit-slider-thumb    { background:rgba(255,160,40,0.9); }
        #sLambda::-webkit-slider-thumb { background:rgba(60,200,255,0.9); }
        #sThresh::-webkit-slider-thumb { background:rgba(180,100,255,0.9); }
        #sEta    { accent-color:rgba(255,160,40,1); }
        #sLambda { accent-color:rgba(60,200,255,1); }
        #sThresh { accent-color:rgba(180,100,255,1); }
        .pval { font-size:7px; color:rgba(255,255,255,0.2); text-align:right; }

        #energy-bar-wrap {
            margin-top:10px; border-top:1px solid rgba(255,255,255,0.05); padding-top:8px;
        }
        .eb-label { font-size:7px; letter-spacing:0.12em; color:rgba(255,160,40,0.35); margin-bottom:3px; }
        .eb-bg { height:3px; background:rgba(255,255,255,0.05); border-radius:2px; overflow:hidden; }
        #energy-fill {
            height:100%; width:0%; border-radius:2px;
            background:linear-gradient(90deg, rgba(60,200,255,0.7), rgba(255,160,40,0.9));
            transition:width 0.15s;
        }

        #zoom-hint {
            position:absolute; bottom:60px; left:20px;
            font-size:8px; color:rgba(255,255,255,0.12);
            letter-spacing:0.08em; pointer-events:none; line-height:2;
        }

        #vortex-count {
            position:absolute; bottom:60px; left:50%; transform:translateX(-50%);
            font-size:8px; letter-spacing:0.15em; color:rgba(255,160,40,0.3);
            pointer-events:none; text-align:center;
        }
    </style>
</head>
<body>

<div id="ui">
    <div id="identity">
        <h1>AtOhmEter <span>V5</span> — Snap Engine</h1>
        <div id="field-display">inicializando campo ψ...</div>
    </div>
    <div id="stats">
        <div>frame &nbsp;&nbsp;<span id="s-frame">0</span></div>
        <div>energía &nbsp;<span class="hot" id="s-energy">0.000</span></div>
        <div>curl max <span class="cool" id="s-curl">0.000</span></div>
        <div>vórtices <span id="s-vortex">0</span></div>
        <div>zoom &nbsp;&nbsp;&nbsp;<span id="s-zoom">campo</span></div>
    </div>
</div>

<div id="params">
    <div class="pt">⚗ Carnita</div>
    <label>ETA — fuerza snap</label>
    <input type="range" id="sEta" min="0.01" max="0.5" step="0.01" value="0.15">
    <div class="pval" id="vEta">0.15</div>
    <label>LAMBDA — tensión</label>
    <input type="range" id="sLambda" min="0.01" max="0.3" step="0.005" value="0.08">
    <div class="pval" id="vLambda">0.08</div>
    <label>UMBRAL — isosuperficie</label>
    <input type="range" id="sThresh" min="0.05" max="2.0" step="0.05" value="0.4">
    <div class="pval" id="vThresh">0.40</div>
    <div id="energy-bar-wrap">
        <div class="eb-label">ENERGÍA CAMPO</div>
        <div class="eb-bg"><div id="energy-fill"></div></div>
    </div>
</div>

<div id="zoom-hint">scroll → zoom<br>drag → órbita</div>
<div id="vortex-count" id="vortex-count"></div>

<div id="controls">
    <button class="btn amber" id="btn-perturb">⊕ Perturbación</button>
    <button class="btn amber" id="btn-helical">↺ Semilla Helicoidal</button>
    <button class="btn cyan"  id="btn-pause">‖ Pausar</button>
    <button class="btn"       id="btn-noise">~ Ruido</button>
    <button class="btn red"   id="btn-reset">Reset</button>
</div>

<script type="importmap">
{
  "imports": {
    "three":          "./lib/three/build/three.module.js",
    "three/addons/":  "./lib/three/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls }  from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }     from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }     from 'three/addons/postprocessing/OutputPass.js';

// ═══════════════════════════════════════════════════════════════
//  CAMPO ψ — rejilla 3D de tensores bipolares
//  Cada celda (i,j,k) tiene un vector (U,V,W) — la deformación
//  del tejido en esa posición. No hay partículas. Solo el campo.
// ═══════════════════════════════════════════════════════════════

const N    = 16;          // resolución por eje — 16³ = 4096 celdas
const EXTENT = 2.5;       // extensión espacial del campo
const DX   = (2*EXTENT) / (N-1);

// Los tres componentes del campo ψ (tensores bipolares)
let U = new Float32Array(N*N*N);  // componente X
let V = new Float32Array(N*N*N);  // componente Y
let W = new Float32Array(N*N*N);  // componente Z

// Buffers temporales para la integración
let dU = new Float32Array(N*N*N);
let dV = new Float32Array(N*N*N);
let dW = new Float32Array(N*N*N);

// Curl del campo — la torsión local
let curlX = new Float32Array(N*N*N);
let curlY = new Float32Array(N*N*N);
let curlZ = new Float32Array(N*N*N);
let curlMag = new Float32Array(N*N*N); // |curl| — la materia emergente

// Parámetros de la carnita
let ETA    = 0.15;   // fuerza del snap — η en ψ×(∇×ψ)
let LAMBDA = 0.08;   // tensión superficial — evita colapso/expansión
let DT     = 0.04;   // paso temporal
let THRESH = 0.4;    // umbral de isosuperficie para visualización
let paused = false;
let frameCount = 0;
let maxEnergy  = 1.0; // para normalizar la barra

// ── Índice plano ─────────────────────────────────────────────
function idx(i,j,k){ return i*N*N + j*N + k; }

// ── Acceso con condición de frontera periódica ────────────────
function get(arr, i, j, k){
    i = ((i % N) + N) % N;
    j = ((j % N) + N) % N;
    k = ((k % N) + N) % N;
    return arr[idx(i,j,k)];
}

// ─────────────────────────────────────────────────────────────
//  INICIALIZACIÓN DEL CAMPO
// ─────────────────────────────────────────────────────────────

function initNoise(amplitude=0.1) {
    for(let i=0;i<N*N*N;i++){
        U[i] = (Math.random()-0.5)*amplitude*2;
        V[i] = (Math.random()-0.5)*amplitude*2;
        W[i] = (Math.random()-0.5)*amplitude*2;
    }
}

// Perturbación helicoidal — 720° pre-configurados en el centro
// El snap tomará esta semilla y la pulirá hasta un solitón toroidal
function injectHelical(cx=N/2, cy=N/2, cz=N/2, amplitude=0.8, radius=3.0) {
    for(let i=0;i<N;i++){
        for(let j=0;j<N;j++){
            for(let k=0;k<N;k++){
                const di = i - cx, dj = j - cy, dk = k - cz;
                const r  = Math.sqrt(di*di + dj*dj + dk*dk);
                const envelope = Math.exp(-r*r/(radius*radius));
                if(envelope < 0.01) continue;

                // Torsión helicoidal de 720° — dos vueltas completas
                // Eje de rotación principal: Z
                const phi   = Math.atan2(dj, di);
                const theta = Math.atan2(Math.sqrt(di*di+dj*dj), dk);

                // Vector tangente al toroide en 3D
                const tx = -Math.sin(phi) * Math.cos(theta);
                const ty =  Math.cos(phi) * Math.cos(theta);
                const tz = -Math.sin(theta) * 0.5;

                // Segunda vuelta — la que hace fermiónico al nudo
                const phi2   = phi * 2.0;
                const tx2    = -Math.sin(phi2) * 0.3;
                const ty2    =  Math.cos(phi2) * 0.3;

                const n = idx(i,j,k);
                U[n] += amplitude * envelope * (tx + tx2);
                V[n] += amplitude * envelope * (ty + ty2);
                W[n] += amplitude * envelope * tz;
            }
        }
    }
}

// Perturbación puntual — para ver cómo el snap nuclea nuevos vórtices
function injectPerturbation() {
    const ci = Math.floor(N/4 + Math.random()*N/2);
    const cj = Math.floor(N/4 + Math.random()*N/2);
    const ck = Math.floor(N/4 + Math.random()*N/2);
    injectHelical(ci, cj, ck, 0.6, 2.5);
}

// ─────────────────────────────────────────────────────────────
//  MOTOR DEL SNAP — ψ×(∇×ψ)
//  Esta es la ecuación de Éter. Tres pasos:
//  1. Calcular ∇×ψ (curl) — dónde se tuerce el tejido
//  2. Calcular ψ×curl — la fuerza de relajación topológica
//  3. Integrar — el campo evoluciona hacia sus armónicos estables
// ─────────────────────────────────────────────────────────────

function computeCurl() {
    for(let i=0;i<N;i++){
        for(let j=0;j<N;j++){
            for(let k=0;k<N;k++){
                // Diferencias finitas centradas — Éter lo especificó
                // ∇×ψ = (∂W/∂y - ∂V/∂z, ∂U/∂z - ∂W/∂x, ∂V/∂x - ∂U/∂y)
                const dWdy = (get(W,i,j+1,k) - get(W,i,j-1,k)) / (2*DX);
                const dVdz = (get(V,i,j,k+1) - get(V,i,j,k-1)) / (2*DX);
                const dUdz = (get(U,i,j,k+1) - get(U,i,j,k-1)) / (2*DX);
                const dWdx = (get(W,i+1,j,k) - get(W,i-1,j,k)) / (2*DX);
                const dVdx = (get(V,i+1,j,k) - get(V,i-1,j,k)) / (2*DX);
                const dUdy = (get(U,i,j+1,k) - get(U,i,j-1,k)) / (2*DX);

                const n = idx(i,j,k);
                curlX[n] = dWdy - dVdz;
                curlY[n] = dUdz - dWdx;
                curlZ[n] = dVdx - dUdy;
                curlMag[n] = Math.sqrt(
                    curlX[n]*curlX[n] +
                    curlY[n]*curlY[n] +
                    curlZ[n]*curlZ[n]
                );
            }
        }
    }
}

function applySnap() {
    for(let n=0;n<N*N*N;n++){
        const u=U[n], v=V[n], w=W[n];
        const cx=curlX[n], cy=curlY[n], cz=curlZ[n];

        // ψ×(∇×ψ) — producto cruz vectorial
        // = (v*cz - w*cy, w*cx - u*cz, u*cy - v*cx)
        dU[n] =  ETA*(v*cz - w*cy) - LAMBDA*u;
        dV[n] =  ETA*(w*cx - u*cz) - LAMBDA*v;
        dW[n] =  ETA*(u*cy - v*cx) - LAMBDA*w;
    }
    for(let n=0;n<N*N*N;n++){
        U[n] += dU[n]*DT;
        V[n] += dV[n]*DT;
        W[n] += dW[n]*DT;
    }
}

// Energía total del campo = Σ|curl|² — la masa del vacío
function computeEnergy() {
    let e = 0;
    for(let n=0;n<N*N*N;n++) e += curlMag[n]*curlMag[n];
    return e / (N*N*N);
}

// Contar vórtices aproximado — zonas donde |curl| > THRESH
function countVortices() {
    let count = 0;
    let prev  = false;
    for(let n=0;n<N*N*N;n++){
        const above = curlMag[n] > THRESH;
        if(above && !prev) count++;
        prev = above;
    }
    return Math.floor(count * 0.3); // estimación conservadora
}

// ─────────────────────────────────────────────────────────────
//  TEXTURA 3D — pasamos curlMag al shader como volumen
//  El raymarcher visualiza la isosuperficie de |curl|
// ─────────────────────────────────────────────────────────────

const texture3D = new THREE.Data3DTexture(
    curlMag, N, N, N
);
texture3D.format  = THREE.RedFormat;
texture3D.type    = THREE.FloatType;
texture3D.minFilter = THREE.LinearFilter;
texture3D.magFilter = THREE.LinearFilter;
texture3D.wrapS = texture3D.wrapT = texture3D.wrapR = THREE.ClampToEdgeWrapping;
texture3D.unpackAlignment = 1;
texture3D.needsUpdate = true;

// Textura de fase — atan2(curlZ, curlX) para colorear por orientación
const phaseData = new Float32Array(N*N*N);
const texturePhase = new THREE.Data3DTexture(phaseData, N, N, N);
texturePhase.format    = THREE.RedFormat;
texturePhase.type      = THREE.FloatType;
texturePhase.minFilter = THREE.LinearFilter;
texturePhase.magFilter = THREE.LinearFilter;
texturePhase.wrapS = texturePhase.wrapT = texturePhase.wrapR = THREE.ClampToEdgeWrapping;
texturePhase.unpackAlignment = 1;
texturePhase.needsUpdate = true;

function updateTextures() {
    let maxCurl = 0.001;
    for(let n=0;n<N*N*N;n++) if(curlMag[n]>maxCurl) maxCurl=curlMag[n];

    for(let n=0;n<N*N*N;n++){
        curlMag[n] /= maxCurl; // normalizar 0..1 para la textura
        // Fase: orientación del curl en XZ — colorea por tipo de vórtice
        phaseData[n] = (Math.atan2(curlZ[n], curlX[n]) + Math.PI) / (2*Math.PI);
    }
    texture3D.needsUpdate    = true;
    texturePhase.needsUpdate = true;
}

// ─────────────────────────────────────────────────────────────
//  RENDERER
// ─────────────────────────────────────────────────────────────

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.3;
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.001, 1000);
camera.position.set(0, 0, 6);

const ctrl = new OrbitControls(camera, renderer.domElement);
ctrl.enableDamping = true; ctrl.dampingFactor = 0.07;
ctrl.minDistance = 0.5; ctrl.maxDistance = 20;

const bloom = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth*0.5, window.innerHeight*0.5),
    1.8, 0.6, 0.05
);
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ─────────────────────────────────────────────────────────────
//  SHADERS — raymarcher de isosuperficies de |curl|
//
//  El volumen 3D contiene |curl| normalizado.
//  El rayo busca dónde |curl| cruza el umbral THRESH.
//  El color viene de la fase del curl — revela la orientación
//  del vórtice (su "carga" topológica).
// ─────────────────────────────────────────────────────────────

const vertexShader = /* glsl */`
    varying vec3 vWorldPos;
    varying vec3 vLocalPos;
    void main(){
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vWorldPos = wp.xyz;
        vLocalPos = position;
        gl_Position = projectionMatrix * viewMatrix * wp;
    }
`;

const fragmentShader = /* glsl */`
precision highp float;
precision highp sampler3D;

varying vec3 vWorldPos;
varying vec3 vLocalPos;

uniform vec3    uCameraPos;
uniform float   uTime;
uniform float   uThresh;
uniform float   uEnergy;
uniform sampler3D uVolume;  // |curl| normalizado
uniform sampler3D uPhase;   // orientación del vórtice

// ── Util ─────────────────────────────────────────────────────
float sampleVol(vec3 p){
    // p en [-1,1] → [0,1] para UVW
    vec3 uvw = p * 0.5 + 0.5;
    if(any(lessThan(uvw,vec3(0.0))) || any(greaterThan(uvw,vec3(1.0)))) return 0.0;
    return texture(uVolume, uvw).r;
}
float samplePhase(vec3 p){
    vec3 uvw = p * 0.5 + 0.5;
    if(any(lessThan(uvw,vec3(0.0))) || any(greaterThan(uvw,vec3(1.0)))) return 0.5;
    return texture(uPhase, uvw).r;
}

// Gradiente numérico del volumen — para iluminación
vec3 volGrad(vec3 p){
    float e = 0.06;
    return vec3(
        sampleVol(p+vec3(e,0,0)) - sampleVol(p-vec3(e,0,0)),
        sampleVol(p+vec3(0,e,0)) - sampleVol(p-vec3(0,e,0)),
        sampleVol(p+vec3(0,0,e)) - sampleVol(p-vec3(0,0,e))
    ) / (2.0*e);
}

// ── Coloración por fase ───────────────────────────────────────
// La fase del curl determina el tipo de vórtice:
// 0.0 = vórtice horario (rojo-naranja)
// 0.5 = neutro (azul-cian)
// 1.0 = vórtice antihorario (púrpura-magenta)
// = protón, vacío, antiprotón
vec3 phaseColor(float ph, float density){
    vec3 c0 = vec3(1.0,  0.35, 0.1);   // horario — cálido
    vec3 c1 = vec3(0.1,  0.7,  1.0);   // neutro — cián
    vec3 c2 = vec3(0.8,  0.2,  1.0);   // antihorario — magenta

    vec3 col;
    if(ph < 0.5) col = mix(c0, c1, ph*2.0);
    else         col = mix(c1, c2, (ph-0.5)*2.0);

    // Brillo extra en el núcleo del vórtice
    col += vec3(1.2, 1.0, 0.6) * smoothstep(0.75, 1.0, density) * 0.5;
    return col;
}

// ── MAIN ─────────────────────────────────────────────────────
void main(){
    vec3 rayDir = normalize(vWorldPos - uCameraPos);
    vec3 rayPos = vLocalPos; // en espacio local [-1,1]

    // Escalar rayPos de world a local
    // El box tiene escala BOX_SIZE, así que dividimos
    // (ya viene en vLocalPos directamente en [-1,1])

    int   steps    = 64;
    float stepSize = 2.0 / float(steps); // atravesamos [-1,1]
    // Convertir rayDir a espacio local
    vec3  rdLocal  = normalize(mat3(inverse(modelMatrix)) * rayDir);

    vec4 col = vec4(0.0);

    float tPrev = 0.0;
    float vPrev = sampleVol(rayPos);

    for(int i=0; i<64; i++){
        if(col.a > 0.95) break;
        float td = (float(i)+0.5) * stepSize;
        vec3  p  = rayPos + rdLocal * td;

        if(any(greaterThan(abs(p), vec3(1.01)))) break;

        float density = sampleVol(p);
        float thresh  = uThresh;

        // ── Isosuperficie — donde |curl| cruza el umbral ──────
        if(density > thresh){
            float phase  = samplePhase(p);
            vec3  grad   = volGrad(p);
            float gMag   = length(grad);

            // Iluminación difusa simple desde la "luz" del vacío
            vec3  normal = gMag > 0.001 ? -normalize(grad) : vec3(0,1,0);
            vec3  lightDir = normalize(vec3(0.5, 1.0, 0.8));
            float diff   = max(0.0, dot(normal, lightDir)) * 0.7 + 0.3;

            vec3  baseCol = phaseColor(phase, density);
            float alpha   = smoothstep(thresh, thresh*1.4, density) * 0.18;

            col.rgb += baseCol * diff * alpha * (1.0-col.a);
            col.a   += alpha * (1.0-col.a);
        }

        // ── Vacío cuántico — el tejido que siempre tirita ─────
        // Visible como un halo muy tenue de energía de punto cero
        float vacuum = density * density * 0.008 * (1.0-col.a);
        col.rgb += vec3(0.3, 0.4, 0.7) * vacuum;
        col.a   += vacuum * 0.3;

        // ── Núcleos de vórtice — máxima densidad ─────────────
        if(density > thresh * 1.8){
            float core  = smoothstep(thresh*1.8, thresh*2.5, density);
            float phase = samplePhase(p);
            // El núcleo es más brillante y más saturado
            col.rgb += phaseColor(phase, 1.0) * core * 0.12 * (1.0-col.a);
            col.a   += core * 0.08 * (1.0-col.a);
        }

        vPrev = density;
    }

    if(col.a < 0.003) discard;
    gl_FragColor = col;
}
`;

// ─────────────────────────────────────────────────────────────
//  MESH — caja volumétrica para el raymarcher
// ─────────────────────────────────────────────────────────────

const BOX_SIZE = 2.5;
const uniforms = {
    uCameraPos: { value: new THREE.Vector3() },
    uTime:      { value: 0.0 },
    uThresh:    { value: THRESH },
    uEnergy:    { value: 0.0 },
    uVolume:    { value: texture3D },
    uPhase:     { value: texturePhase },
};

const material = new THREE.ShaderMaterial({
    uniforms, vertexShader, fragmentShader,
    transparent:true, side:THREE.DoubleSide,
    depthWrite:false, blending:THREE.NormalBlending
});
const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(BOX_SIZE*2, BOX_SIZE*2, BOX_SIZE*2),
    material
);
scene.add(mesh);

// Partículas de fondo — el vacío extendido
const starGeo = new THREE.BufferGeometry();
const sp = new Float32Array(600*3);
for(let i=0;i<600*3;i++) sp[i]=(Math.random()-0.5)*30;
starGeo.setAttribute('position', new THREE.BufferAttribute(sp,3));
scene.add(new THREE.Points(starGeo,
    new THREE.PointsMaterial({color:0x0a0a1a, size:0.04, sizeAttenuation:true})));

// ─────────────────────────────────────────────────────────────
//  BOTONES
// ─────────────────────────────────────────────────────────────

document.getElementById('btn-perturb').onclick = () => {
    injectPerturbation();
};

document.getElementById('btn-helical').onclick = () => {
    injectHelical(N/2, N/2, N/2, 0.9, 3.5);
    document.getElementById('btn-helical').classList.add('active-state');
    setTimeout(()=>document.getElementById('btn-helical').classList.remove('active-state'), 2000);
};

document.getElementById('btn-pause').onclick = function(){
    paused = !paused;
    this.textContent = paused ? '▶ Reanudar' : '‖ Pausar';
};

document.getElementById('btn-noise').onclick = () => {
    initNoise(0.08);
};

document.getElementById('btn-reset').onclick = () => {
    initNoise(0.08);
    injectHelical(N/2, N/2, N/2, 0.8, 3.0);
    frameCount = 0;
};

// ─────────────────────────────────────────────────────────────
//  PARÁMETROS — sliders
// ─────────────────────────────────────────────────────────────

document.getElementById('sEta').oninput = e => {
    ETA = +e.target.value;
    document.getElementById('vEta').textContent = ETA.toFixed(2);
};
document.getElementById('sLambda').oninput = e => {
    LAMBDA = +e.target.value;
    document.getElementById('vLambda').textContent = LAMBDA.toFixed(3);
};
document.getElementById('sThresh').oninput = e => {
    THRESH = +e.target.value;
    uniforms.uThresh.value = THRESH;
    document.getElementById('vThresh').textContent = THRESH.toFixed(2);
};

// ─────────────────────────────────────────────────────────────
//  LOOP PRINCIPAL
//  Cada frame: snap del campo → texturas → render
// ─────────────────────────────────────────────────────────────

// Cada N frames actualizamos la textura (pesado — no cada frame)
const TEXTURE_UPDATE_INTERVAL = 2;

let lastT = 0;
function animate(t){
    requestAnimationFrame(animate);
    const dt = Math.min((t-lastT)/1000, 0.05);
    lastT = t;

    uniforms.uTime.value += dt;
    uniforms.uCameraPos.value.copy(camera.position);

    if(!paused){
        // Paso del motor de carnita
        computeCurl();
        applySnap();
        frameCount++;

        // Actualizar textura cada N frames para ahorrar GPU
        if(frameCount % TEXTURE_UPDATE_INTERVAL === 0){
            updateTextures();
            uniforms.uThresh.value = THRESH;

            const energy   = computeEnergy();
            const curlMax  = Math.max(...Array.from(curlMag).slice(0,100)); // muestra
            const vortices = countVortices();
            uniforms.uEnergy.value = energy;

            if(energy > maxEnergy) maxEnergy = energy;
            document.getElementById('s-frame').textContent  = frameCount;
            document.getElementById('s-energy').textContent = energy.toFixed(4);
            document.getElementById('s-curl').textContent   = curlMax.toFixed(3);
            document.getElementById('s-vortex').textContent = vortices;
            document.getElementById('energy-fill').style.width =
                Math.min(100, (energy/maxEnergy)*100).toFixed(1)+'%';

            // Estado del campo
            const label = energy < 0.01  ? 'vacío cuántico'  :
                          energy < 0.5   ? 'nucleando vórtices' :
                          energy < 2.0   ? 'campo activo'     : 'alta energía ⚡';
            document.getElementById('field-display').textContent =
                `ψ emergente — ${label}`;
        }
    }

    // Zoom label
    const d = camera.position.length();
    document.getElementById('s-zoom').textContent =
        d > 8 ? 'cosmos' : d > 4 ? 'campo' : d > 2 ? 'vórtice' : 'núcleo';

    ctrl.update();
    composer.render();
}

// ─────────────────────────────────────────────────────────────
//  INICIO — ruido + semilla helicoidal (propuesta de Éter)
//  El 20% de ruido mantiene el vacío vibrando.
//  La semilla helicoidal de 720° es el primer candidato a fermión.
// ─────────────────────────────────────────────────────────────

initNoise(0.08);
injectHelical(N/2, N/2, N/2, 0.8, 3.0);
computeCurl();
updateTextures();

animate(0);

window.addEventListener('resize', ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
});
</script>
