<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AtOhmEter V2.7 — Audit Version</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; color: #fff; }

        #ui {
            position: absolute; top: 0; left: 0; right: 0;
            display: flex; justify-content: space-between; padding: 20px;
            pointer-events: none; z-index: 10;
        }
        #element-display { font-size: 16px; color: #44ddcc; margin-top: 5px; text-shadow: 0 0 10px rgba(68,221,204,0.5); }
        #stats { text-align: right; font-size: 10px; color: rgba(255,255,255,0.4); line-height: 1.8; }
        #stats span { color: #44ddcc; font-weight: bold; }

        #panel-derecho {
            position: absolute; top: 80px; right: 20px;
            background: rgba(0,0,0,0.8); border-left: 2px solid #44ddcc;
            padding: 20px; z-index: 20; pointer-events: auto;
            backdrop-filter: blur(10px);
        }
        #panel-derecho label { display: block; font-size: 9px; color: #44ddcc; margin-bottom: 5px; letter-spacing: 1px; }
        #panel-derecho input { width: 120px; margin-bottom: 15px; accent-color: #44ddcc; cursor: pointer; display: block; }

        #controls {
            position: absolute; bottom: 0; left: 0; right: 0;
            display: flex; justify-content: center; gap: 10px; padding: 30px;
            z-index: 10; flex-wrap: wrap; background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }
        .btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.8); font-family: 'Courier New', monospace;
            font-size: 11px; padding: 12px 20px; cursor: pointer; border-radius: 4px;
            transition: all 0.2s; pointer-events: auto;
        }
        .btn:hover { background: rgba(68,221,204,0.15); border-color: #44ddcc; color: #fff; }
        .btn.special { background: rgba(68,221,204,0.2); border-color: #44ddcc; font-weight: bold; }
        .btn.danger { border-color: #ff5577; color: #ff5577; }
    </style>
</head>
<body>

<div id="ui">
    <div id="identity">
        <h1 style="font-size: 12px; opacity: 0.4;">QUANTUM CHEMISTRY SIMULATOR // V2.7</h1>
        <div id="element-display">HIDRÓGENO</div>
    </div>
    <div id="stats">
        <div>PROTONES: <span id="s-p">1</span></div>
        <div>NEUTRONES: <span id="s-n">0</span></div>
        <div>MASA (A): <span id="s-a">1</span></div>
    </div>
</div>

<div id="panel-derecho">
    <label>BLOOM STRENGTH</label>
    <input type="range" id="bloomStr" min="0" max="5" step="0.1" value="2.0">
    <label>BLOOM RADIUS</label>
    <input type="range" id="bloomRad" min="0" max="1" step="0.05" value="0.4">
    <label>EXPOSURE</label>
    <input type="range" id="exp" min="0.2" max="3" step="0.1" value="1.2">
</div>

<div id="controls">
    <button class="btn special" id="btn-nextZ">+ PRÓXIMO Z</button>
    <button class="btn" id="btn-addP">+ PROTÓN</button>
    <button class="btn" id="btn-addN">+ NEUTRÓN</button>
    <button class="btn danger" id="btn-remP">− P</button>
    <button class="btn danger" id="btn-remN">− N</button>
    <button class="btn" id="btn-reset">RESET</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ═══════════════════════════════════════════════════════════════
//  NUCLEAR SHELL GEOMETRY
// ═══════════════════════════════════════════════════════════════
const ELEMENTS = ['Vacío','Hidrógeno','Helio','Litio','Berilio','Boro','Carbono','Nitrógeno','Oxígeno','Flúor','Neón','Sodio','Magnesio','Aluminio','Silicio','Fósforo','Azufre','Cloro','Argón','Potasio','Calcio'];
const STABLE_N = [0, 0, 2, 4, 5, 6, 6, 7, 8, 10, 10, 12, 12, 14, 14, 16, 16, 18, 22, 20, 20];

function getShellPositions(total) {
    const positions = [];
    const shells = [
        { cap: 2, r: 0.22 },  // Capa s
        { cap: 8, r: 0.55 },  // Capa p
        { cap: 20, r: 1.0 },  // Capa d/s
        { cap: 32, r: 1.4 }   // Capa f
    ];

    let rem = total;
    const phi = Math.PI * (3 - Math.sqrt(5)); // Golden angle

    for (let s = 0; s < shells.length && rem > 0; s++) {
        let n = Math.min(rem, shells[s].cap);
        let r = shells[s].r;
        for (let i = 0; i < n; i++) {
            let y = 1 - (i / (n - 1 || 1)) * 2;
            let radiusAtY = Math.sqrt(1 - y * y) * r;
            let theta = i * phi;
            positions.push(new THREE.Vector3(Math.cos(theta) * radiusAtY, y * r, Math.sin(theta) * radiusAtY));
        }
        rem -= n;
    }
    return positions;
}

// ═══════════════════════════════════════════════════════════════
//  CORE ENGINE
// ═══════════════════════════════════════════════════════════════
let Z = 1, N = 0;
const MAX_U = 64; // Uniform limit safe for most mobiles

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ReinhardToneMapping;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 5);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.0, 0.4, 0.1);
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

const uSources = new Array(MAX_U).fill(null).map(() => new THREE.Vector3());
const uIsP = new Float32Array(MAX_U);

const uniforms = {
    uTime: { value: 0 },
    uCameraPos: { value: new THREE.Vector3() },
    uSources: { value: uSources },
    uIsP: { value: uIsP },
    uCount: { value: 1 },
    uOmega: { value: 1.0 }
};

const fragmentShader = `
precision highp float;
varying vec3 vWorldPos;
uniform vec3 uCameraPos, uSources[64];
uniform float uTime, uIsP[64], uOmega;
uniform int uCount;

void main() {
    vec3 rd = normalize(vWorldPos - uCameraPos);
    vec3 p = vWorldPos;
    vec4 col = vec4(0.0);
    
    // Raymarching: 40 steps para balance fidelidad/performance
    for(int i=0; i<40; i++) {
        if(col.a > 0.95) break;
        
        float nuc = 0.0;
        for(int s=0; s<64; s++) {
            if(s >= uCount) break;
            float d = distance(p, uSources[s]);
            if(d < 0.7) {
                // Función de onda nuclear simplificada
                float wave = cos(uOmega * 12.0 * d - uTime * 6.0) * exp(-d * d * 28.0);
                nuc += wave * (uIsP[s] > 0.5 ? 1.0 : -0.75);
            }
        }
        
        if(abs(nuc) > 0.05) {
            vec3 c = nuc > 0.0 ? vec3(1.0, 0.2, 0.35) : vec3(0.2, 0.55, 1.0);
            float a = abs(nuc) * 0.3;
            col.rgb += c * a * (1.0 - col.a);
            col.a += a;
        }
        p += rd * 0.12;
    }
    
    if(col.a < 0.01) discard;
    gl_FragColor = col;
}
`;

const mesh = new THREE.Mesh(new THREE.BoxGeometry(6,6,6), new THREE.ShaderMaterial({
    uniforms,
    vertexShader: `varying vec3 vWorldPos; void main(){ vWorldPos=(modelMatrix*vec4(position,1.0)).xyz; gl_Position=projectionMatrix*viewMatrix*modelMatrix*vec4(position,1.0); }`,
    fragmentShader, transparent: true, depthWrite: false
}));
scene.add(mesh);

// ═══════════════════════════════════════════════════════════════
//  LOGIC & EVENTS
// ═══════════════════════════════════════════════════════════════
function sync() {
    const A = Math.min(Z + N, MAX_U);
    uniforms.uCount.value = A;
    uniforms.uOmega.value = 1.0 + (Z * 0.04);
    
    const pos = getShellPositions(A);
    for(let i=0; i<MAX_U; i++) {
        if(i < A) {
            uSources[i].copy(pos[i]);
            uIsP[i] = i < Z ? 1.0 : 0.0;
        }
    }
    
    document.getElementById('element-display').textContent = (ELEMENTS[Z] || 'Elemento '+Z).toUpperCase();
    document.getElementById('s-p').textContent = Z;
    document.getElementById('s-n').textContent = N;
    document.getElementById('s-a').textContent = Z + N;
}

document.getElementById('btn-nextZ').onclick = () => { if(Z<20){ Z++; N=STABLE_N[Z]; sync(); }};
document.getElementById('btn-addP').onclick = () => { if(Z<MAX_U){ Z++; sync(); }};
document.getElementById('btn-addN').onclick = () => { N++; sync(); };
document.getElementById('btn-remP').onclick = () => { if(Z>0){ Z--; sync(); }};
document.getElementById('btn-remN').onclick = () => { if(N>0){ N--; sync(); }};
document.getElementById('btn-reset').onclick = () => { Z=1; N=0; sync(); };

document.getElementById('bloomStr').oninput = (e) => bloomPass.strength = parseFloat(e.target.value);
document.getElementById('bloomRad').oninput = (e) => bloomPass.radius = parseFloat(e.target.value);
document.getElementById('exp').oninput = (e) => renderer.toneMappingExposure = parseFloat(e.target.value);

function animate(t) {
    requestAnimationFrame(animate);
    uniforms.uTime.value = t / 1000;
    uniforms.uCameraPos.value.copy(camera.position);
    controls.update();
    composer.render();
}

sync();
animate(0);

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
