<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>QCS | GPU Bonding Engine Ultra-LOD</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00ffcc; pointer-events: none; }
        .stats { font-size: 0.9em; color: #0088ff; }
    </style>
    
    <script type="importmap">
    {
      "imports": {
        "three":          "/lib/three/build/three.module.js",
        "three/addons/":  "/lib/three/examples/jsm/",
        "lil-gui":        "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
      }
    }
    </script>
</head>
<body>

    <div id="ui">
        <h2>Quantum Chemistry Simulator</h2>
        <div id="atom-info">GPU Acceleration: ON</div>
        <div class="stats">Single Draw Call | Vertex Deformation</div>
    </div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GUI } from 'lil-gui';

// --- SHADERS OPTIMIZADOS (Todo el cálculo de enlace a la GPU) ---
const vertexShader = `
    uniform float uTime;
    uniform float uPointSize;
    uniform vec3 uCenter;
    uniform vec3 uNeighborPos;
    uniform float uBondState;
    uniform float uBondStrength;
    
    attribute float aLayer;
    varying float vAlpha;

    void main() {
        vec3 pos = position; // Posición relativa al centro del átomo
        vec3 worldPos = uCenter + pos;
        
        // Vector hacia el vecino
        vec3 toNeighbor = uNeighborPos - worldPos;
        float dist = length(toNeighbor);
        vec3 dir = normalize(toNeighbor);

        // Deformación de enlace (Estado 3: Intercambio)
        if(uBondState > 2.5) {
            float pull = exp(-dist * 0.5) * uBondStrength;
            pos += dir * pull * (sin(uTime * 2.0 + length(pos)) * 0.5 + 0.5);
        }

        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
        
        // vAlpha para el fade en el fragment
        vAlpha = 1.0 - (length(pos) * 0.1); 
        
        gl_PointSize = uPointSize * (300.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;
    }
`;

const fragmentShader = `
    varying float vAlpha;
    uniform vec3 uColor;

    void main() {
        // Círculos suaves en lugar de cuadrados
        float d = distance(gl_PointCoord, vec2(0.5));
        if (d > 0.5) discard;
        
        float glow = 1.0 - smoothstep(0.0, 0.5, d);
        gl_FragColor = vec4(uColor, glow * vAlpha);
    }
`;

// --- MOTOR PRINCIPAL ---
let scene, camera, renderer, controls;
let matA, matB;
const groupA = new THREE.Group();
const groupB = new THREE.Group();

const settings = {
    distance: 8.0,
    pointSize: 4.0,
    bondState: 3,
    bondStrength: 1.5,
    symbol: 'Gd'
};

const ATLAS_PATH = './src/orbital_cache/_atlas';

async function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 10, 20);

    renderer = new THREE.WebGLRenderer({ antialias: false }); // Falso para ganar FPS
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    controls = new OrbitControls(camera, renderer.domElement);
    scene.add(groupA, groupB);

    // Cargar ambos átomos
    await Promise.all([
        createAtom('Gd', groupA, (m) => matA = m),
        createAtom('Gd', groupB, (m) => matB = m)
    ]);

    setupGUI();
    updateWorld();
    animate();
}

async function createAtom(symbol, group, setMat) {
    let positions;
    
    try {
        // Intento de carga real del atlas
        const res = await fetch(`${ATLAS_PATH}/1s_m+0.bin`);
        if(!res.ok) throw new Error();
        const buffer = await res.arrayBuffer();
        positions = new Float32Array(buffer, 12, 30000 * 3);
    } catch (e) {
        // Fallback procedural ultra-rápido si falla el atlas
        const n = 20000;
        positions = new Float32Array(n * 3);
        for(let i=0; i<n*3; i++) positions[i] = (Math.random() - 0.5) * 10;
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    const mat = new THREE.ShaderMaterial({
        uniforms: {
            uTime: { value: 0 },
            uColor: { value: new THREE.Color(0x00ffcc) },
            uPointSize: { value: settings.pointSize },
            uCenter: { value: new THREE.Vector3() },
            uNeighborPos: { value: new THREE.Vector3() },
            uBondState: { value: settings.bondState },
            uBondStrength: { value: settings.bondStrength }
        },
        vertexShader,
        fragmentShader,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });

    setMat(mat);
    group.add(new THREE.Points(geo, mat));
    
    // Núcleo simple
    const nucGeo = new THREE.SphereGeometry(0.2, 8, 8);
    const nucMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    group.add(new THREE.Mesh(nucGeo, nucMat));
}

function updateWorld() {
    groupA.position.x = -settings.distance / 2;
    groupB.position.x = settings.distance / 2;

    [ {m:matA, g:groupA, n:groupB}, {m:matB, g:groupB, n:groupA} ].forEach(p => {
        if(!p.m) return;
        p.m.uniforms.uCenter.value.copy(p.g.position);
        p.m.uniforms.uNeighborPos.value.copy(p.n.position);
        p.m.uniforms.uPointSize.value = settings.pointSize;
        p.m.uniforms.uBondState.value = settings.bondState;
    });
}

function setupGUI() {
    const gui = new GUI();
    gui.add(settings, 'distance', 2, 20).onChange(updateWorld);
    gui.add(settings, 'pointSize', 1, 20).onChange(updateWorld);
    gui.add(settings, 'bondState', { 'Libre': 0, 'Enlace': 3 }).onChange(updateWorld);
}

function animate() {
    requestAnimationFrame(animate);
    const t = performance.now() * 0.001;
    if(matA) matA.uniforms.uTime.value = t;
    if(matB) matB.uniforms.uTime.value = t;
    renderer.render(scene, camera);
}

init();
</script>
</body>
</html>
