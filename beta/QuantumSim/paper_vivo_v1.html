<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QCS - Paper Vivo: La Fórmula Interactiva</title>
    <style>
        :root {
            --bg-color: #0a0a0f;
            --panel-bg: #14141c;
            --text-main: #e0e0e0;
            --cyan: #00f0ff;
            --magenta: #ff003c;
            --green: #00ff66;
            --yellow: #ffcc00;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        h1 {
            color: var(--cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.5rem;
            text-align: center;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        /* Contenedor de la Fórmula Viva */
        .formula-container {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 30px 20px;
            margin: 20px 0;
            width: 100%;
            max-width: 800px;
            text-align: center;
            font-size: 1.8rem;
            font-style: italic;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Términos matemáticos interactivos */
        .term {
            padding: 5px 10px;
            border-radius: 5px;
            transition: all 0.1s ease-out;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .term-time { color: #fff; }
        .term-bohm { color: var(--cyan); }
        .term-snap { color: var(--magenta); }
        
        /* Efectos de Resplandor Dinámico */
        .glow-bohm {
            text-shadow: 0 0 20px var(--cyan), 0 0 40px var(--cyan);
            transform: scale(1.05);
            border-color: rgba(0, 240, 255, 0.3);
            background: rgba(0, 240, 255, 0.05);
        }

        .glow-snap {
            text-shadow: 0 0 20px var(--magenta), 0 0 40px var(--magenta);
            transform: scale(1.1);
            border-color: rgba(255, 0, 60, 0.3);
            background: rgba(255, 0, 60, 0.05);
        }

        /* Panel de Control */
        .control-panel {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 10px;
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: #aaa;
            display: flex;
            justify-content: space-between;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--cyan);
        }

        input[type="range"].snap-slider {
            accent-color: var(--magenta);
        }

        /* Telemetría */
        .telemetry {
            margin-top: 20px;
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }

        .metric span {
            font-weight: bold;
        }

        #energy-val { color: var(--yellow); }
        #vortex-val { color: var(--green); }
        
        .status-box {
            grid-column: span 2;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
            border-left: 3px solid var(--green);
            font-size: 0.85rem;
            min-height: 40px;
        }

        @media (max-width: 600px) {
            .formula-container { font-size: 1.2rem; padding: 20px 10px; }
            .control-panel { grid-template-columns: 1fr; }
            .status-box { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <h1>AtOhmEter: Inspector de Fase (V1.0)</h1>

    <div class="formula-container" id="formula-display">
        <div class="term term-time" id="term-dt">∂ψ/∂t</div>
        <div>=</div>
        <div class="term term-bohm" id="term-dif">iλΔψ - iγψ</div>
        <div>+</div>
        <div class="term term-snap" id="term-snap">η ∇×[ψ×(∇×ψ)]</div>
    </div>

    <div class="control-panel">
        <div class="control-group">
            <label>Tensión del Sustrato (λ) <span id="val-lam">0.8</span></label>
            <input type="range" id="slider-lam" min="0" max="2" step="0.01" value="0.8">
        </div>
        
        <div class="control-group">
            <label>Operador Snap / Torsión (η) <span id="val-eta">0.5</span></label>
            <input type="range" id="slider-eta" class="snap-slider" min="0" max="1.5" step="0.01" value="0.5">
        </div>

        <div class="status-box" id="narrative-box">
            Estado de la Carnita: Esperando perturbación...
        </div>
    </div>

    <div class="telemetry">
        <div class="metric">Energía Basal (E₀): <span id="energy-val">9.00</span></div>
        <div class="metric">Dominancia: <span id="dom-val">Equilibrio</span></div>
        <div class="metric">Estabilidad de Fase: <span id="vortex-val">Alta</span></div>
    </div>

    <script>
        // Elementos del DOM
        const termBohm = document.getElementById('term-dif');
        const termSnap = document.getElementById('term-snap');
        
        const sliderLam = document.getElementById('slider-lam');
        const sliderEta = document.getElementById('slider-eta');
        const valLam = document.getElementById('val-lam');
        const valEta = document.getElementById('val-eta');
        
        const energyVal = document.getElementById('energy-val');
        const domVal = document.getElementById('dom-val');
        const vortexVal = document.getElementById('vortex-val');
        const narrativeBox = document.getElementById('narrative-box');

        // Estado interno simulado
        let energy = 9.0;
        let isColapsing = false;

        // Bucle Principal de la "Fórmula Viva"
        function stepPhysicsMockup() {
            // Leer variables de la UI
            const lambda = parseFloat(sliderLam.value); // Tensión
            const eta = parseFloat(sliderEta.value);   // Torsión

            // Actualizar etiquetas numéricas
            valLam.innerText = lambda.toFixed(2);
            valEta.innerText = eta.toFixed(2);

            // Calcular tensiones locales (Mockup)
            // Añadimos ruido para que la fórmula "respire"
            const noise = (Math.random() - 0.5) * 0.1; 
            const bohmForce = lambda + noise;
            const snapForce = eta * 1.5 + (Math.random() - 0.5) * 0.2;

            // Lógica de reacción de la Fórmula
            termBohm.classList.remove('glow-bohm');
            termSnap.classList.remove('glow-snap');

            if (snapForce > bohmForce * 1.2) {
                // Torsión domina
                termSnap.classList.add('glow-snap');
                domVal.innerText = "Snap (Torsión)";
                domVal.style.color = "var(--magenta)";
                
                if (eta > 1.0 && !isColapsing) {
                    narrativeBox.innerText = "¡Alerta! Ruptura espontánea de simetría detectada. El campo se fragmenta en solitones.";
                    narrativeBox.style.borderLeftColor = "var(--magenta)";
                    vortexVal.innerText = "Fragmentación";
                    vortexVal.style.color = "var(--magenta)";
                    isColapsing = true;
                }
                
                // La energía sube con torsión alta
                energy += (eta - 0.5) * 0.1;
            } 
            else if (bohmForce > snapForce * 1.2) {
                // Tensión/Difusión domina
                termBohm.classList.add('glow-bohm');
                domVal.innerText = "Bohm (Difusión)";
                domVal.style.color = "var(--cyan)";
                
                if(isColapsing) {
                    narrativeBox.innerText = "El sustrato disipa la energía. Los vórtices pierden cohesión topológica.";
                    narrativeBox.style.borderLeftColor = "var(--cyan)";
                    vortexVal.innerText = "Disipación";
                    vortexVal.style.color = "var(--cyan)";
                    isColapsing = false;
                }

                // La energía baja hacia E0
                energy -= (energy - 8.5) * 0.05;
            } 
            else {
                // Equilibrio
                domVal.innerText = "Equilibrio Acoplado";
                domVal.style.color = "var(--text-main)";
                narrativeBox.innerText = "Estado estacionario. La 'Donita' mantiene su memoria de fase intacta.";
                narrativeBox.style.borderLeftColor = "var(--green)";
                vortexVal.innerText = "Coherente";
                vortexVal.style.color = "var(--green)";
                isColapsing = false;
                
                // Retorna suavemente al basal (E0 ≈ 9.0)
                energy += (9.0 - energy) * 0.1; 
            }

            // Evitar que la energía baje de 0
            if(energy < 0) energy = 0;

            // Actualizar telemetría visual
            energyVal.innerText = energy.toFixed(2);
            
            // Si la energía truena
            if(energy > 20) {
                energyVal.innerText = "OOM / INF (Colapso)";
                energyVal.style.color = "red";
                narrativeBox.innerText = "Sobrecarga térmica del hardware. El operador Snap rompió el entramado.";
            } else {
                energyVal.style.color = "var(--yellow)";
            }

            // Loop a 15 fps (suave para el celular)
            setTimeout(stepPhysicsMockup, 1000 / 15);
        }

        // Iniciar la Fórmula Viva
        stepPhysicsMockup();

    </script>
</body>
</html>
