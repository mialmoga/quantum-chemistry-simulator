<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quantum Chemistry Simulator — Auditoría V2.4</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #fff; }

        #ui {
            position: absolute; top: 0; left: 0; right: 0;
            display: flex; justify-content: space-between; padding: 20px;
            pointer-events: none; z-index: 10;
        }
        #element-display { font-size: 18px; color: #44ddcc; text-shadow: 0 0 15px #44ddcc; }
        #stats { text-align: right; font-size: 11px; opacity: 0.7; }

        #panel-control {
            position: absolute; top: 80px; right: 20px;
            background: rgba(0,0,0,0.85); border-left: 2px solid #44ddcc;
            padding: 20px; z-index: 20; pointer-events: auto;
            backdrop-filter: blur(15px);
        }
        #panel-control label { display: block; font-size: 9px; color: #44ddcc; margin-bottom: 5px; }
        #panel-control input { width: 130px; margin-bottom: 15px; accent-color: #44ddcc; display: block; }

        #controls {
            position: absolute; bottom: 0; left: 0; right: 0;
            display: flex; justify-content: center; gap: 10px; padding: 30px;
            z-index: 10; flex-wrap: wrap; background: linear-gradient(transparent, #000);
        }
        .btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; font-family: 'Courier New', monospace;
            font-size: 11px; padding: 12px 24px; cursor: pointer; border-radius: 4px;
            transition: 0.3s; pointer-events: auto;
        }
        .btn:hover { background: #44ddcc; color: #000; border-color: #44ddcc; }
        .btn.special { border-color: #44ddcc; box-shadow: 0 0 10px rgba(68,221,204,0.3); }
        .btn.danger { border-color: #ff5577; color: #ff5577; }
    </style>
</head>
<body>

<div id="ui">
    <div id="identity">
        <h1 style="font-size: 12px; opacity: 0.5;">ATOHMETER // V2.4 UNFILTERED</h1>
        <div id="element-display">HIDRÓGENO</div>
    </div>
    <div id="stats">
        <div>Z: <span id="s-p">1</span></div>
        <div>N: <span id="s-n">0</span></div>
        <div style="color:#44ddcc">A: <span id="s-a">1</span></div>
    </div>
</div>

<div id="panel-control">
    <label>INTENSIDAD BLOOM</label>
    <input type="range" id="bStr" min="0" max="5" step="0.1" value="2.5">
    <label>RADIO BLOOM</label>
    <input type="range" id="bRad" min="0" max="1" step="0.05" value="0.5">
    <label>EXPOSICIÓN</label>
    <input type="range" id="exp" min="0.1" max="4" step="0.1" value="1.5">
</div>

<div id="controls">
    <button class="btn special" id="btn-nextZ">+ SIGUIENTE ELEMENTO</button>
    <button class="btn" id="btn-addP">+P</button>
    <button class="btn" id="btn-addN">+N</button>
    <button class="btn danger" id="btn-remP">−P</button>
    <button class="btn danger" id="btn-remN">−N</button>
    <button class="btn" id="btn-reset">RESET</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ═══════════════════════════════════════════════════════════════
//  MODELO DE CAPAS NUCLEAR (REGLA DE OCUPACIÓN)
// ═══════════════════════════════════════════════════════════════
const ELEMENTS = ['Vacío','Hidrógeno','Helio','Litio','Berilio','Boro','Carbono','Nitrógeno','Oxígeno','Flúor','Neón','Sodio','Magnesio','Aluminio','Silicio','Fósforo','Azufre','Cloro','Argón','Potasio','Calcio'];
const STABLE_N = [0, 0, 2, 4, 5, 6, 6, 7, 8, 10, 10, 12, 12, 14, 14, 16, 16, 18, 22, 20, 20];

function generateNucleonMap(total) {
    const points = [];
    const config = [{c:2, r:0.25}, {c:8, r:0.6}, {c:20, r:1.1}, {c:32, r:1.6}];
    let rem = total;
    const phi = Math.PI * (3 - Math.sqrt(5));

    for (let s = 0; s < config.length && rem > 0; s++) {
        let n = Math.min(rem, config[s].c);
        for (let i = 0; i < n; i++) {
            let y = 1 - (i / (n - 1 || 1)) * 2;
            let radius = Math.sqrt(1 - y * y) * config[s].r;
            let theta = i * phi;
            points.push(new THREE.Vector3(Math.cos(theta) * radius, y * config[s].r, Math.sin(theta) * radius));
        }
        rem -= n;
    }
    return points;
}

// ═══════════════════════════════════════════════════════════════
//  CORE ENGINE (MODO SIN RESTRICCIONES)
// ═══════════════════════════════════════════════════════════════
let Z = 1, N = 0;
const MAX_SOURCES = 64;

const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ReinhardToneMapping;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.z = 6;

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.5, 0.5, 0.1);
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

const uSources = new Array(MAX_SOURCES).fill(null).map(() => new THREE.Vector3());
const uIsP = new Float32Array(MAX_SOURCES);

const uniforms = {
    uTime: { value: 0 },
    uCameraPos: { value: new THREE.Vector3() },
    uSources: { value: uSources },
    uIsP: { value: uIsP },
    uCount: { value: 1 },
    uOmega: { value: 1.0 }
};

const fragmentShader = `
precision highp float;
varying vec3 vWorldPos;
uniform vec3 uCameraPos, uSources[64];
uniform float uTime, uIsP[64], uOmega;
uniform int uCount;

void main() {
    vec3 rd = normalize(vWorldPos - uCameraPos);
    vec3 p = vWorldPos;
    vec4 finalCol = vec4(0.0);
    
    // RAYMARCHING DE ALTA FIDELIDAD (64 pasos)
    for(int i=0; i<64; i++) {
        if(finalCol.a > 0.98) break;
        
        float field = 0.0;
        for(int s=0; s<64; s++) {
            if(s >= uCount) break;
            
            float d = distance(p, uSources[s]);
            // Sin culling agresivo: cálculo de onda pura
            float wave = cos(uOmega * 16.0 * d - uTime * 7.0) * exp(-d * d * 32.0);
            field += wave * (uIsP[s] > 0.5 ? 1.1 : -0.8);
        }
        
        if(abs(field) > 0.02) {
            vec3 c = field > 0.0 ? vec3(1.0, 0.2, 0.3) : vec3(0.1, 0.4, 1.0);
            float alpha = abs(field) * 0.4 * (1.0 - finalCol.a);
            finalCol.rgb += c * alpha;
            finalCol.a += alpha * 0.5;
        }
        p += rd * 0.1; 
    }
    
    if(finalCol.a < 0.01) discard;
    gl_FragColor = vec4(finalCol.rgb, finalCol.a);
}
`;

const mesh = new THREE.Mesh(new THREE.BoxGeometry(8, 8, 8), new THREE.ShaderMaterial({
    uniforms,
    vertexShader: `varying vec3 vWorldPos; void main(){ vWorldPos=(modelMatrix*vec4(position,1.0)).xyz; gl_Position=projectionMatrix*viewMatrix*modelMatrix*vec4(position,1.0); }`,
    fragmentShader, transparent: true, depthWrite: false
}));
scene.add(mesh);

// ═══════════════════════════════════════════════════════════════
//  SISTEMA DE SINCRONIZACIÓN
// ═══════════════════════════════════════════════════════════════
function sync() {
    const A = Math.min(Z + N, MAX_SOURCES);
    uniforms.uCount.value = A;
    uniforms.uOmega.value = 0.8 + (Z * 0.06);
    
    const positions = generateNucleonMap(A);
    for(let i=0; i<MAX_SOURCES; i++) {
        if(i < A) {
            uSources[i].copy(positions[i]);
            uIsP[i] = i < Z ? 1.0 : 0.0;
        }
    }
    
    document.getElementById('element-display').textContent = (ELEMENTS[Z] || 'Transuránico '+Z).toUpperCase();
    document.getElementById('s-p').textContent = Z;
    document.getElementById('s-n').textContent = N;
    document.getElementById('s-a').textContent = Z + N;
}

document.getElementById('btn-nextZ').onclick = () => { if(Z<20){ Z++; N=STABLE_N[Z]; sync(); }};
document.getElementById('btn-addP').onclick = () => { if(Z<MAX_SOURCES){ Z++; sync(); }};
document.getElementById('btn-addN').onclick = () => { N++; sync(); };
document.getElementById('btn-remP').onclick = () => { if(Z>0){ Z--; sync(); }};
document.getElementById('btn-remN').onclick = () => { if(N>0){ N--; sync(); }};
document.getElementById('btn-reset').onclick = () => { Z=1; N=0; sync(); };

document.getElementById('bStr').oninput = (e) => bloomPass.strength = parseFloat(e.target.value);
document.getElementById('bRad').oninput = (e) => bloomPass.radius = parseFloat(e.target.value);
document.getElementById('exp').oninput = (e) => renderer.toneMappingExposure = parseFloat(e.target.value);

function animate(t) {
    requestAnimationFrame(animate);
    uniforms.uTime.value = t / 1000;
    uniforms.uCameraPos.value.copy(camera.position);
    controls.update();
    composer.render();
}

sync();
animate(0);

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
