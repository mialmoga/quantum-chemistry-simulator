<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quantum Chemistry Simulator — Shell Structure V2.5</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        #ui {
            position: absolute; top: 0; left: 0; right: 0;
            display: flex; justify-content: space-between; padding: 18px 20px;
            pointer-events: none; z-index: 10;
        }
        #identity h1 { font-size: 13px; letter-spacing: 0.2em; color: rgba(255,255,255,0.2); }
        #element-display { margin-top: 4px; font-size: 12px; color: #44ddcc; text-shadow: 0 0 10px rgba(68,221,204,0.3); }
        #stats { text-align: right; font-size: 10px; color: rgba(255,255,255,0.4); line-height: 1.6; }
        #stats span { color: #fff; }
        #controls {
            position: absolute; bottom: 0; left: 0; right: 0;
            display: flex; justify-content: center; gap: 8px; padding: 20px;
            z-index: 10; flex-wrap: wrap;
        }
        .btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.7); font-family: 'Courier New', monospace;
            font-size: 11px; padding: 10px 14px; cursor: pointer; border-radius: 3px;
            transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); background: rgba(255,255,255,0.2); }
        .btn.special { border-color: #44ddcc; color: #44ddcc; background: rgba(68,221,204,0.05); }
        .btn.danger { border-color: #ff5577; color: #ff5577; }
    </style>
</head>
<body>

<div id="ui">
    <div id="identity">
        <h1>QUANTUM SIMULATOR // V2.5</h1>
        <div id="element-display">HIDRÓGENO</div>
    </div>
    <div id="stats">
        <div>Z: <span id="s-p">1</span> (Protones)</div>
        <div>N: <span id="s-n">0</span> (Neutrones)</div>
        <div>A: <span id="s-a">1</span> (Masa)</div>
    </div>
</div>

<div id="controls">
    <button class="btn special" id="btn-nextZ">+ PRÓXIMO Z</button>
    <button class="btn" id="btn-addP">+ P</button>
    <button class="btn" id="btn-addN">+ N</button>
    <button class="btn danger" id="btn-remP">− P</button>
    <button class="btn danger" id="btn-remN">− N</button>
    <button class="btn" id="btn-reset">Reset</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ═══════════════════════════════════════════════════════════════
//  LÓGICA GEOMÉTRICA DE NÚCLEO (MAGIC NUMBERS)
// ═══════════════════════════════════════════════════════════════
const ELEMENTS = ['Vacío','Hidrógeno','Helio','Litio','Berilio','Boro','Carbono','Nitrógeno','Oxígeno','Flúor','Neón','Sodio','Magnesio','Aluminio','Silicio','Fósforo','Azufre','Cloro','Argón','Potasio','Calcio'];
const STABLE_N = [0, 0, 2, 4, 5, 6, 6, 7, 8, 10, 10, 12, 12, 14, 14, 16, 16, 18, 22, 20, 20];

// Estaciones geométricas predefinidas para las capas nucleares
const SHELL_MAP = [
    // Capa 1: Par central (s)
    new THREE.Vector3(0.12, 0, 0), new THREE.Vector3(-0.12, 0, 0),
    // Capa 2: Octaedro (p)
    new THREE.Vector3(0, 0.4, 0), new THREE.Vector3(0, -0.4, 0),
    new THREE.Vector3(0.4, 0, 0), new THREE.Vector3(-0.4, 0, 0),
    new THREE.Vector3(0, 0, 0.4), new THREE.Vector3(0, 0, -0.4),
    // Capa 3: Icosaedro (d/s)
    new THREE.Vector3(0, 0.7, 0.3), new THREE.Vector3(0, 0.7, -0.3),
    new THREE.Vector3(0, -0.7, 0.3), new THREE.Vector3(0, -0.7, -0.3),
    new THREE.Vector3(0.3, 0, 0.7), new THREE.Vector3(0.3, 0, -0.7),
    new THREE.Vector3(-0.3, 0, 0.7), new THREE.Vector3(-0.3, 0, -0.7),
    new THREE.Vector3(0.7, 0.3, 0), new THREE.Vector3(0.7, -0.3, 0),
    new THREE.Vector3(-0.7, 0.3, 0), new THREE.Vector3(-0.7, -0.3, 0)
];

function getNucleonPos(index) {
    if (index < SHELL_MAP.length) return SHELL_MAP[index];
    // Relleno procedimental si excede las capas definidas (espiral de seguridad)
    const phi = Math.acos(-1 + (2 * index) / 40);
    const theta = Math.sqrt(40 * Math.PI) * phi;
    return new THREE.Vector3(
        0.9 * Math.cos(theta) * Math.sin(phi),
        0.9 * Math.sin(theta) * Math.sin(phi),
        0.9 * Math.cos(phi)
    );
}

// ═══════════════════════════════════════════════════════════════
//  ENGINE & SHADERS
// ═══════════════════════════════════════════════════════════════
let Z = 1, N = 0;
const MAX_NUC = 32;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(1);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

const uSources = new Array(MAX_NUC).fill(null).map(() => new THREE.Vector3());
const uIsP = new Float32Array(MAX_NUC);

const uniforms = {
    uTime: { value: 0 },
    uCameraPos: { value: new THREE.Vector3() },
    uSources: { value: uSources },
    uIsP: { value: uIsP },
    uCount: { value: 1 },
    uOmega: { value: 1.0 }
};

const fragmentShader = `
precision highp float;
varying vec3 vWorldPos;
uniform vec3 uCameraPos, uSources[32];
uniform float uTime, uIsP[32], uOmega;
uniform int uCount;

void main() {
    vec3 rd = normalize(vWorldPos - uCameraPos);
    vec3 p = vWorldPos;
    vec4 col = vec4(0.0);
    
    for(int i=0; i<25; i++) {
        if(col.a > 0.85) break;
        float dCore = length(p);
        if(dCore < 2.5) {
            float field = 0.0;
            for(int s=0; s<32; s++) {
                if(s >= uCount) break;
                float d = distance(p, uSources[s]);
                if(d < 0.7) {
                    float wave = cos(uOmega * 12.0 * d - uTime * 5.0) * exp(-d * d * 25.0);
                    field += wave * (uIsP[s] > 0.5 ? 1.0 : -0.8);
                }
            }
            if(abs(field) > 0.1) {
                vec3 c = field > 0.0 ? vec3(1.0, 0.2, 0.3) : vec3(0.2, 0.5, 1.0);
                float a = abs(field) * 0.3;
                col.rgb += c * a * (1.0 - col.a);
                col.a += a;
            }
        }
        p += rd * 0.18;
    }
    if(col.a < 0.05) discard;
    gl_FragColor = col;
}
`;

const mesh = new THREE.Mesh(new THREE.BoxGeometry(5,5,5), new THREE.ShaderMaterial({
    uniforms,
    vertexShader: `varying vec3 vWorldPos; void main(){ vWorldPos=(modelMatrix*vec4(position,1.0)).xyz; gl_Position=projectionMatrix*viewMatrix*modelMatrix*vec4(position,1.0); }`,
    fragmentShader, transparent: true, depthWrite: false
}));
scene.add(mesh);

// ═══════════════════════════════════════════════════════════════
//  SISTEMA DE CONTROL
// ═══════════════════════════════════════════════════════════════
function sync() {
    const A = Math.min(Z + N, MAX_NUC);
    uniforms.uCount.value = A;
    uniforms.uOmega.value = 1.0 + (Z * 0.04);
    
    // Asignar posiciones siguiendo el orden de las capas
    for(let i=0; i<MAX_NUC; i++) {
        if(i < A) {
            uSources[i].copy(getNucleonPos(i));
            uIsP[i] = i < Z ? 1.0 : 0.0;
        }
    }
    
    document.getElementById('element-display').textContent = (ELEMENTS[Z] || 'Elemento '+Z).toUpperCase();
    document.getElementById('s-p').textContent = Z;
    document.getElementById('s-n').textContent = N;
    document.getElementById('s-a').textContent = Z + N;
}

document.getElementById('btn-nextZ').onclick = () => { if(Z < 20) { Z++; N = STABLE_N[Z]; sync(); } };
document.getElementById('btn-addP').onclick = () => { if(Z < 20) { Z++; sync(); } };
document.getElementById('btn-addN').onclick = () => { N++; sync(); };
document.getElementById('btn-remP').onclick = () => { if(Z > 0) { Z--; sync(); } };
document.getElementById('btn-remN').onclick = () => { if(N > 0) { N--; sync(); } };
document.getElementById('btn-reset').onclick = () => { Z = 1; N = 0; sync(); };

function animate(t) {
    requestAnimationFrame(animate);
    uniforms.uTime.value = t / 1000;
    uniforms.uCameraPos.value.copy(camera.position);
    controls.update();
    renderer.render(scene, camera);
}

sync();
animate(0);

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
