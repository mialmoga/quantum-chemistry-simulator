<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AtOhmEter V2.4.1 — Optimized Shells</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }

        #ui {
            position: absolute; top: 0; left: 0; right: 0;
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 18px 20px; pointer-events: none; z-index: 10;
        }

        #identity h1 {
            font-size: 13px; letter-spacing: 0.25em; color: rgba(255,255,255,0.18);
            text-transform: uppercase;
        }
        #element-display {
            margin-top: 6px; font-size: 11px; letter-spacing: 0.1em; color: rgba(255,200,100,0.6);
        }

        #stats {
            text-align: right; pointer-events: none; font-size: 10px; line-height: 2.0; color: rgba(255,255,255,0.3);
        }
        #stats span { color: rgba(255,255,255,0.7); }
        .accent { color: #44ddcc; }

        #controls {
            position: absolute; bottom: 0; left: 0; right: 0;
            display: flex; justify-content: center; align-items: center;
            gap: 6px; padding: 15px; z-index: 10; flex-wrap: wrap;
        }

        .btn {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.55); font-family: 'Courier New', monospace;
            font-size: 10px; padding: 8px 12px; cursor: pointer; border-radius: 2px;
        }
        .btn.special { border-color: rgba(255,255,255,0.6); color: #fff; background: rgba(255,255,255,0.1); }
        .btn.danger { border-color: rgba(255,80,80,0.3); }

        #bloom {
            position: absolute; top: 18px; right: 20px; background: rgba(0,0,0,0.6);
            padding: 10px; z-index: 10; border-left: 1px solid rgba(255,255,255,0.1);
        }
        #bloom label { display: block; font-size: 7px; color: rgba(255,200,80,0.5); }
        #bloom input { width: 80px; display: block; accent-color: #ff5555; }
    </style>
</head>
<body>

<div id="ui">
    <div id="identity">
        <h1>AtOhmEter // V2.4.1</h1>
        <div id="element-display">— vacío —</div>
    </div>
    <div id="stats">
        <div>Z <span id="s-p">0</span> | N <span id="s-n">0</span></div>
        <div>A <span id="s-a">0</span></div>
        <div class="accent" id="s-z">núcleo</div>
    </div>
</div>

<div id="bloom">
    <label>BLOOM</label><input type="range" id="bStr" min="0" max="4" step="0.1" value="1.8">
    <label>EXP</label><input type="range" id="bExp" min="0.5" max="2.5" step="0.1" value="1.2">
</div>

<div id="controls">
    <button class="btn special" id="btn-nextZ">+ PRÓXIMO Z</button>
    <button class="btn" id="btn-addP">+P</button>
    <button class="btn" id="btn-addN">+N</button>
    <button class="btn danger" id="btn-remP">−P</button>
    <button class="btn danger" id="btn-remN">−N</button>
    <button class="btn" id="btn-reset">Reset</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "/lib/three/build/three.module.js",
    "three/addons/": "/lib/three/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls }  from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }     from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }     from 'three/addons/postprocessing/OutputPass.js';

// ═══════════════════════════════════════════════════════════════
//  ESTABILIDAD & GEOMETRÍA
// ═══════════════════════════════════════════════════════════════
const ELEMENTS = ['—','H','He','Li','Be','B','C','N','O','F','Ne','Na','Mg','Al','Si','P','S','Cl','Ar','K','Ca','Sc','Ti','V','Cr','Mn','Fe','Co','Ni','Cu','Zn'];
const STABLE_N = [0, 0, 2, 4, 5, 6, 6, 7, 8, 10, 10, 12, 12, 14, 14, 16, 16, 18, 22, 20, 20, 24, 26, 28, 28, 30, 30, 32, 30, 34, 34];

function nucleonPositions(count) {
    if (count === 0) return [];
    const positions = [];
    const shells = [{m:2, r:0.18}, {m:8, r:0.42}, {m:20, r:0.72}, {m:34, r:1.05}];
    let rem = count;
    const golden = 2.399963; // rad

    for (const s of shells) {
        if (rem <= 0) break;
        const n = Math.min(rem, s.m);
        const R = s.r * Math.pow(count, 0.15);
        for (let i = 0; i < n; i++) {
            const y = 1.0 - (i / Math.max(n - 1, 1)) * 2.0;
            const rad = Math.sqrt(Math.max(0, 1.0 - y * y));
            const t = golden * i;
            positions.push(new THREE.Vector3(R * rad * Math.cos(t), R * y, R * rad * Math.sin(t)));
        }
        rem -= n;
    }
    return positions;
}

// ═══════════════════════════════════════════════════════════════
//  THREE ENGINE
// ═══════════════════════════════════════════════════════════════
let Z = 1, N = 0;
const MAX_SOURCES = 32; // Límite para estabilidad en móvil

const renderer = new THREE.WebGLRenderer({ antialias: false }); // Antialias off para ganar FPS
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(1); // Forzar 1:1 en móvil
renderer.toneMapping = THREE.ReinhardToneMapping;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.z = 6;

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.8, 0.4, 0.1);
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

const uSources = new Array(MAX_SOURCES).fill(null).map(() => new THREE.Vector3());
const uIsP = new Float32Array(MAX_SOURCES);

const uniforms = {
    uTime: { value: 0 },
    uCameraPos: { value: new THREE.Vector3() },
    uOmega: { value: 1.0 },
    uOrbRadius: { value: 2.0 },
    uNShells: { value: 1.0 },
    uSources: { value: uSources },
    uIsP: { value: uIsP },
    uCount: { value: 1 },
};

const fragmentShader = `
precision highp float;
varying vec3 vWorldPos;
uniform vec3 uCameraPos, uSources[32];
uniform float uTime, uOmega, uOrbRadius, uNShells, uIsP[32];
uniform int uCount;

void main() {
    vec3 rd = normalize(vWorldPos - uCameraPos);
    vec3 p = vWorldPos;
    vec4 col = vec4(0.0);
    
    // Raymarching optimizado: 30 pasos son suficientes para móvil
    for(int i=0; i<30; i++) {
        if(col.a > 0.9) break;
        
        float dCore = length(p);
        if(dCore < 3.0) {
            float nuc = 0.0;
            for(int s=0; s<32; s++) {
                if(s >= uCount) break;
                float d = distance(p, uSources[s]);
                if(d > 0.8) continue; // Culling de proximidad
                float wave = cos(uOmega * 15.0 * d - uTime * 6.0) * exp(-d * d * 35.0);
                nuc += wave * (uIsP[s] > 0.5 ? 1.0 : -1.0);
            }
            if(abs(nuc) > 0.1) {
                vec3 c = nuc > 0.0 ? vec3(1.0, 0.3, 0.4) : vec3(0.3, 0.6, 1.0);
                float a = abs(nuc) * 0.25;
                col.rgb += c * a * (1.0 - col.a);
                col.a += a;
            }
        }

        // Orbital simplificado (sin pow)
        float r = length(p);
        float env = exp(-(r-uOrbRadius)*(r-uOrbRadius)*4.0);
        if(env > 0.01) {
            float orb = env * sin(uNShells * 3.14 * r / uOrbRadius);
            float a = orb * orb * 0.04;
            col.rgb += vec3(0.2, 1.0, 0.8) * a * (1.0 - col.a);
            col.a += a;
        }
        p += rd * 0.15;
    }
    if(col.a < 0.02) discard;
    gl_FragColor = col;
}
`;

const mesh = new THREE.Mesh(new THREE.BoxGeometry(6, 6, 6), new THREE.ShaderMaterial({
    uniforms, vertexShader: `varying vec3 vWorldPos; void main(){ vWorldPos=(modelMatrix*vec4(position,1.0)).xyz; gl_Position=projectionMatrix*viewMatrix*modelMatrix*vec4(position,1.0); }`,
    fragmentShader, transparent: true, depthWrite: false
}));
scene.add(mesh);

function sync() {
    const A = Math.min(Z + N, MAX_SOURCES);
    const period = Z <= 2 ? 1 : Z <= 10 ? 2 : Z <= 18 ? 3 : 4;
    uniforms.uOmega.value = 1.0 + (Z * 0.05);
    uniforms.uCount.value = A;
    uniforms.uNShells.value = period;
    uniforms.uOrbRadius.value = 1.0 + period * 0.6;
    const pos = nucleonPositions(A);
    pos.forEach((v, i) => { if(i < MAX_SOURCES) { uSources[i].copy(v); uIsP[i] = i < Z ? 1.0 : 0.0; } });
    
    document.getElementById('element-display').textContent = `${ELEMENTS[Z] || 'Z'+Z}`;
    document.getElementById('s-p').textContent = Z; document.getElementById('s-n').textContent = N;
    document.getElementById('s-a').textContent = A;
}

document.getElementById('btn-nextZ').onclick = () => { if(Z<30){ Z++; N=STABLE_N[Z]; sync(); }};
document.getElementById('btn-addP').onclick = () => { if(Z<30){ Z++; sync(); }};
document.getElementById('btn-addN').onclick = () => { N++; sync(); };
document.getElementById('btn-reset').onclick = () => { Z=1; N=0; sync(); };
document.getElementById('bStr').oninput = e => bloomPass.strength = e.target.value;
document.getElementById('bExp').oninput = e => renderer.toneMappingExposure = e.target.value;

function animate(t) {
    requestAnimationFrame(animate);
    uniforms.uTime.value = t / 1000;
    uniforms.uCameraPos.value.copy(camera.position);
    controls.update();
    composer.render();
}
sync(); animate(0);
</script>
</body>
</html>
