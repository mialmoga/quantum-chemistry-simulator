<script type="module">
import * as THREE from 'three';
import { OrbitControls }  from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }     from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }     from 'three/addons/postprocessing/OutputPass.js';

// ═══════════════════════════════════════════════════════════
//  CAMPO COMPLEJO ψ ∈ ℂ³ — port de core.py (Éter)
//  6 arrays Float32: partes real e imaginaria de cada componente
//  Ur,Ui = Re(ψ_x), Im(ψ_x)   etc.
// ═══════════════════════════════════════════════════════════
const N    = 32;
const EXTENT = 1.0;               // coordenadas en [-1,1] como en core.py
const DX   = (2*EXTENT) / (N-1);
const TOTAL_CELLS = N*N*N;
const EPS_RHO = 1e-12;            // piso de densidad (core.py usa 1e-12)

// Campo complejo — partes real e imaginaria
let Ur = new Float32Array(TOTAL_CELLS);  // Re(ψ_x)
let Ui = new Float32Array(TOTAL_CELLS);  // Im(ψ_x)
let Vr = new Float32Array(TOTAL_CELLS);  // Re(ψ_y)
let Vi = new Float32Array(TOTAL_CELLS);  // Im(ψ_y)
let Wr = new Float32Array(TOTAL_CELLS);  // Re(ψ_z)
let Wi = new Float32Array(TOTAL_CELLS);  // Im(ψ_z)

// Buffers intermedios (reales — derivadas del campo)
let curlXr = new Float32Array(TOTAL_CELLS); let curlXi = new Float32Array(TOTAL_CELLS);
let curlYr = new Float32Array(TOTAL_CELLS); let curlYi = new Float32Array(TOTAL_CELLS);
let curlZr = new Float32Array(TOTAL_CELLS); let curlZi = new Float32Array(TOTAL_CELLS);
let curlMag = new Float32Array(TOTAL_CELLS);

// Cross ψ×(∇×ψ) — complejo
let crossXr = new Float32Array(TOTAL_CELLS); let crossXi = new Float32Array(TOTAL_CELLS);
let crossYr = new Float32Array(TOTAL_CELLS); let crossYi = new Float32Array(TOTAL_CELLS);
let crossZr = new Float32Array(TOTAL_CELLS); let crossZi = new Float32Array(TOTAL_CELLS);

// Snap ∇×[ψ×(∇×ψ)] — complejo
let snapXr = new Float32Array(TOTAL_CELLS); let snapXi = new Float32Array(TOTAL_CELLS);
let snapYr = new Float32Array(TOTAL_CELLS); let snapYi = new Float32Array(TOTAL_CELLS);
let snapZr = new Float32Array(TOTAL_CELLS); let snapZi = new Float32Array(TOTAL_CELLS);

// Bohm via log(ρ) — Éter's approach, más estable
let logRho    = new Float32Array(TOTAL_CELLS);
let bohmScalar= new Float32Array(TOTAL_CELLS);  // Q escalar

// Payload para el render (export_for_atohmeter de Éter)
let renderVolume = new Float32Array(TOTAL_CELLS);  // density_alpha
const phaseHue   = new Float32Array(TOTAL_CELLS);  // phase_hue
const torsionGlow= new Float32Array(TOTAL_CELLS);  // torsion_glow

// ── Parámetros (core.py defaults) ────────────────────────────
let ETA    = 0.5;   // eta  — fuerza del snap
let LAMBDA = 0.8;   // lambda — potencial Higgs-like
let PHI0   = 1.0;   // phi0 — densidad de equilibrio
let GAMMA  = 0.15;  // gamma — acoplamiento de fase del sustrato
let THETA0 = 0.0;   // theta_vac_0 — fase de referencia del vacío
let BOHM_C = 1.0;   // bohm_coeff
let DT     = 0.005; // dt — igual que core.py
let THRESH = 0.15;
let paused = false;
let frameCount = 0;
let maxEnergy  = 1.0;
let helicityJS = 0.0;
let psiMaxJS   = 0.0;

// ── Índice plano ─────────────────────────────────────────────
function idx(i,j,k){ return i*N*N + j*N + k; }

// ── Acceso periódico ──────────────────────────────────────────
function getC(arr, i, j, k){
    i=((i%N)+N)%N; j=((j%N)+N)%N; k=((k%N)+N)%N;
    return arr[idx(i,j,k)];
}

// ═══════════════════════════════════════════════════════════
//  OPERADORES DIFERENCIALES — port de core.py (Éter)
//  Trabajamos con campo complejo: cada función opera sobre
//  pares (real, imag) de arrays Float32
// ═══════════════════════════════════════════════════════════

// ── Gradiente central de un campo real ───────────────────────
function gradX_r(arr,i,j,k){ return (getC(arr,i+1,j,k)-getC(arr,i-1,j,k))/(2*DX); }
function gradY_r(arr,i,j,k){ return (getC(arr,i,j+1,k)-getC(arr,i,j-1,k))/(2*DX); }
function gradZ_r(arr,i,j,k){ return (getC(arr,i,j,k+1)-getC(arr,i,j,k-1))/(2*DX); }

// ── Laplaciano de campo real ──────────────────────────────────
function laplacian_r(arr,i,j,k){
    const v=getC(arr,i,j,k), idx2=1/(DX*DX);
    return ((getC(arr,i+1,j,k)-2*v+getC(arr,i-1,j,k))+
            (getC(arr,i,j+1,k)-2*v+getC(arr,i,j-1,k))+
            (getC(arr,i,j,k+1)-2*v+getC(arr,i,j,k-1)))*idx2;
}

// ── Curl del campo complejo ψ ─────────────────────────────────
// curl_x = ∂ψ_z/∂y - ∂ψ_y/∂z  (para parte real e imaginaria)
function computeCurl(){
    for(let i=0;i<N;i++) for(let j=0;j<N;j++) for(let k=0;k<N;k++){
        const n=idx(i,j,k);
        // curl_x = dWr/dy - dVr/dz  (real)
        curlXr[n] = gradY_r(Wr,i,j,k) - gradZ_r(Vr,i,j,k);
        curlXi[n] = gradY_r(Wi,i,j,k) - gradZ_r(Vi,i,j,k);
        // curl_y = dUr/dz - dWr/dx
        curlYr[n] = gradZ_r(Ur,i,j,k) - gradX_r(Wr,i,j,k);
        curlYi[n] = gradZ_r(Ui,i,j,k) - gradX_r(Wi,i,j,k);
        // curl_z = dVr/dx - dUr/dy
        curlZr[n] = gradX_r(Vr,i,j,k) - gradY_r(Ur,i,j,k);
        curlZi[n] = gradX_r(Vi,i,j,k) - gradY_r(Ui,i,j,k);
        curlMag[n]=Math.sqrt(curlXr[n]**2+curlXi[n]**2+curlYr[n]**2+
                             curlYi[n]**2+curlZr[n]**2+curlZi[n]**2);
    }
}

// ── Cross product complejo ψ×(∇×ψ) ───────────────────────────
// (a+ib)×(c+id) = (a×c - b×d) + i(a×d + b×c)
function computeCross(){
    for(let n=0;n<TOTAL_CELLS;n++){
        const ur=Ur[n],ui=Ui[n], vr=Vr[n],vi=Vi[n], wr=Wr[n],wi=Wi[n];
        const cxr=curlXr[n],cxi=curlXi[n];
        const cyr=curlYr[n],cyi=curlYi[n];
        const czr=curlZr[n],czi=curlZi[n];
        // cross_x = ψ_y*curl_z - ψ_z*curl_y
        crossXr[n]=(vr*czr-vi*czi)-(wr*cyr-wi*cyi);
        crossXi[n]=(vr*czi+vi*czr)-(wr*cyi+wi*cyr);
        // cross_y = ψ_z*curl_x - ψ_x*curl_z
        crossYr[n]=(wr*cxr-wi*cxi)-(ur*czr-ui*czi);
        crossYi[n]=(wr*cxi+wi*cxr)-(ur*czi+ui*czr);
        // cross_z = ψ_x*curl_y - ψ_y*curl_x
        crossZr[n]=(ur*cyr-ui*cyi)-(vr*cxr-vi*cxi);
        crossZi[n]=(ur*cyi+ui*cyr)-(vr*cxi+vi*cxr);
    }
}

// ── Snap = ∇×[ψ×(∇×ψ)] ───────────────────────────────────────
function computeSnap(){
    for(let i=0;i<N;i++) for(let j=0;j<N;j++) for(let k=0;k<N;k++){
        const n=idx(i,j,k);
        // snap_x = d(crossZ)/dy - d(crossY)/dz
        snapXr[n]=gradY_r(crossZr,i,j,k)-gradZ_r(crossYr,i,j,k);
        snapXi[n]=gradY_r(crossZi,i,j,k)-gradZ_r(crossYi,i,j,k);
        // snap_y = d(crossX)/dz - d(crossZ)/dx
        snapYr[n]=gradZ_r(crossXr,i,j,k)-gradX_r(crossZr,i,j,k);
        snapYi[n]=gradZ_r(crossXi,i,j,k)-gradX_r(crossZi,i,j,k);
        // snap_z = d(crossY)/dx - d(crossX)/dy
        snapZr[n]=gradX_r(crossYr,i,j,k)-gradY_r(crossXr,i,j,k);
        snapZi[n]=gradX_r(crossYi,i,j,k)-gradY_r(crossXi,i,j,k);
    }
}

// ── Bohm pressure via log(ρ) — Éter's approach ───────────────
// Q = -(bohm_coeff/4)·(∇²log(ρ) + 0.5|∇log(ρ)|²)
function computeBohm(){
    for(let n=0;n<TOTAL_CELLS;n++){
        const rho=Math.max(Ur[n]**2+Ui[n]**2+Vr[n]**2+Vi[n]**2+Wr[n]**2+Wi[n]**2, EPS_RHO);
        logRho[n]=Math.log(rho);
    }
    for(let i=0;i<N;i++) for(let j=0;j<N;j++) for(let k=0;k<N;k++){
        const n=idx(i,j,k);
        const lap=laplacian_r(logRho,i,j,k);
        const glx=gradX_r(logRho,i,j,k);
        const gly=gradY_r(logRho,i,j,k);
        const glz=gradZ_r(logRho,i,j,k);
        bohmScalar[n]=-(BOHM_C/4.0)*(lap+0.5*(glx*glx+gly*gly+glz*glz));
    }
}

// ═══════════════════════════════════════════════════════════
//  EVOLUCIÓN — step_evolve_caceria (Éter)
//  dpsi/dt = -i·(
//    -0.5·∇²ψ             [inercia cinética]
//    + λ(ρ-φ₀²)·ψ        [potencial Higgs]
//    + γ·exp(-iθ₀)·ψ     [acoplamiento de fase del sustrato]
//    + snap               [torsión topológica]
//    + Q·ψ                [presión de Bohm]
//  )
// ═══════════════════════════════════════════════════════════
function stepEvolve(){
    computeCurl();
    computeCross();
    computeSnap();
    computeBohm();

    // Precomputar phase_coupling = γ·exp(-iθ₀)
    const pc_r = GAMMA * Math.cos(-THETA0);
    const pc_i = GAMMA * Math.sin(-THETA0);

    for(let i=0;i<N;i++) for(let j=0;j<N;j++) for(let k=0;k<N;k++){
        const n=idx(i,j,k);
        const ur=Ur[n],ui=Ui[n], vr=Vr[n],vi=Vi[n], wr=Wr[n],wi=Wi[n];

        // ρ y potencial Higgs V' = λ(ρ - φ₀²)
        const rho=Math.max(ur*ur+ui*ui+vr*vr+vi*vi+wr*wr+wi*wi, EPS_RHO);
        const vp = LAMBDA*(rho - PHI0*PHI0);

        // Laplacianos
        const lapUr=laplacian_r(Ur,i,j,k), lapUi=laplacian_r(Ui,i,j,k);
        const lapVr=laplacian_r(Vr,i,j,k), lapVi=laplacian_r(Vi,i,j,k);
        const lapWr=laplacian_r(Wr,i,j,k), lapWi=laplacian_r(Wi,i,j,k);

        // Phase coupling: (pc_r + i·pc_i)·(ur + i·ui) = (pc_r·ur - pc_i·ui) + i(pc_r·ui + pc_i·ur)
        const pcUr=pc_r*ur-pc_i*ui, pcUi=pc_r*ui+pc_i*ur;
        const pcVr=pc_r*vr-pc_i*vi, pcVi=pc_r*vi+pc_i*vr;
        const pcWr=pc_r*wr-pc_i*wi, pcWi=pc_r*wi+pc_i*wr;

        // Bohm: Q·ψ (Q es real → solo escala)
        const Q=bohmScalar[n];
        const bohmUr=Q*ur, bohmUi=Q*ui;
        const bohmVr=Q*vr, bohmVi=Q*vi;
        const bohmWr=Q*wr, bohmWi=Q*wi;

        // Suma de todos los términos (parte real del operador)
        const FUr = -0.5*lapUr + vp*ur + pcUr + ETA*snapXr[n] + bohmUr;
        const FUi = -0.5*lapUi + vp*ui + pcUi + ETA*snapXi[n] + bohmUi;
        const FVr = -0.5*lapVr + vp*vr + pcVr + ETA*snapYr[n] + bohmVr;
        const FVi = -0.5*lapVi + vp*vi + pcVi + ETA*snapYi[n] + bohmVi;
        const FWr = -0.5*lapWr + vp*wr + pcWr + ETA*snapZr[n] + bohmWr;
        const FWi = -0.5*lapWi + vp*wi + pcWi + ETA*snapZi[n] + bohmWi;

        // dpsi/dt = -i·F = (-i)(a+ib) = b - ia
        Ur[n] += DT * ( FUi);  Ui[n] += DT * (-FUr);
        Vr[n] += DT * ( FVi);  Vi[n] += DT * (-FVr);
        Wr[n] += DT * ( FWi);  Wi[n] += DT * (-FWr);
    }
}

// ── Observables — port de compute_observables ─────────────────
function computeEnergy(){
    let e=0;
    for(let n=0;n<TOTAL_CELLS;n++)
        e+=Ur[n]**2+Ui[n]**2+Vr[n]**2+Vi[n]**2+Wr[n]**2+Wi[n]**2;
    return e/TOTAL_CELLS;
}

function computeHelicity(){
    let h=0;
    for(let n=0;n<TOTAL_CELLS;n++){
        // H = Re(ψ* · curl(ψ)) = Σ Re(conj(ψ_k)·curl_k)
        // Re(conj(a+ib)·(c+id)) = ac+bd
        h+=(Ur[n]*curlXr[n]+Ui[n]*curlXi[n])
          +(Vr[n]*curlYr[n]+Vi[n]*curlYi[n])
          +(Wr[n]*curlZr[n]+Wi[n]*curlZi[n]);
    }
    return h/TOTAL_CELLS;
}

function computePsiMax(){
    let m=0;
    for(let n=0;n<TOTAL_CELLS;n++){
        const mag=Ur[n]**2+Ui[n]**2+Vr[n]**2+Vi[n]**2+Wr[n]**2+Wi[n]**2;
        if(mag>m) m=mag;
    }
    return Math.sqrt(m);
}

function countVortices(){
    let count=0, prev=false;
    for(let n=0;n<TOTAL_CELLS;n++){
        const above=curlMag[n]>THRESH;
        if(above&&!prev) count++;
        prev=above;
    }
    return Math.floor(count*0.3);
}

// ═══════════════════════════════════════════════════════════
//  INICIALIZACIÓN — port de init_grumo (Éter)
// ═══════════════════════════════════════════════════════════
function initGrumo(){
    for(let i=0;i<N;i++) for(let j=0;j<N;j++) for(let k=0;k<N;k++){
        const n=idx(i,j,k);
        const X=-1+i*2/(N-1), Y=-1+j*2/(N-1), Z=-1+k*2/(N-1);
        const r2=X*X+Y*Y+Z*Z;
        const env=Math.exp(-10*r2);
        Ur[n]=-Y*env; Ui[n]= X*0.3*env;
        Vr[n]= X*env; Vi[n]= Y*0.3*env;
        Wr[n]=0.5*Z*env; Wi[n]=0.1*env;
    }
}
function initNoise(amplitude=0.05){
    for(let n=0;n<TOTAL_CELLS;n++){
        Ur[n]+=(Math.random()-0.5)*amplitude; Ui[n]+=(Math.random()-0.5)*amplitude;
        Vr[n]+=(Math.random()-0.5)*amplitude; Vi[n]+=(Math.random()-0.5)*amplitude;
        Wr[n]+=(Math.random()-0.5)*amplitude; Wi[n]+=(Math.random()-0.5)*amplitude;
    }
}
function injectHelical(cx=N/2, cy=N/2, cz=N/2, amplitude=0.8, radius=3.0){
    for(let i=0;i<N;i++) for(let j=0;j<N;j++) for(let k=0;k<N;k++){
        const di=i-cx, dj=j-cy, dk=k-cz;
        const r=Math.sqrt(di*di+dj*dj+dk*dk);
        const env=Math.exp(-r*r/(radius*radius));
        if(env<0.01) continue;
        const phi=Math.atan2(dj,di), theta=Math.atan2(Math.sqrt(di*di+dj*dj),dk);
        const n=idx(i,j,k);
        Ur[n]+=amplitude*env*(-Math.sin(phi)*Math.cos(theta)-Math.sin(phi*2)*0.3);
        Ui[n]+=amplitude*env*0.1;
        Vr[n]+=amplitude*env*(Math.cos(phi)*Math.cos(theta)+Math.cos(phi*2)*0.3);
        Vi[n]+=amplitude*env*0.1;
        Wr[n]+=amplitude*env*(-Math.sin(theta)*0.5);
        Wi[n]+=amplitude*env*0.05;
    }
}
function injectPerturbation(){
    injectHelical(Math.floor(N/4+Math.random()*N/2),
                  Math.floor(N/4+Math.random()*N/2),
                  Math.floor(N/4+Math.random()*N/2), 0.4, 2.0);
}

const texture3D = new THREE.Data3DTexture(
    renderVolume, N, N, N
);
texture3D.format  = THREE.RedFormat;
texture3D.type    = THREE.FloatType;
texture3D.minFilter = THREE.LinearFilter;
texture3D.magFilter = THREE.LinearFilter;
texture3D.wrapS = texture3D.wrapT = texture3D.wrapR = THREE.ClampToEdgeWrapping;
texture3D.unpackAlignment = 1;
texture3D.needsUpdate = true;

const phaseData = new Float32Array(TOTAL_CELLS);
const texturePhase = new THREE.Data3DTexture(phaseData, N, N, N);
texturePhase.format    = THREE.RedFormat;
texturePhase.type      = THREE.FloatType;
texturePhase.minFilter = THREE.LinearFilter;
texturePhase.magFilter = THREE.LinearFilter;
texturePhase.wrapS = texturePhase.wrapT = texturePhase.wrapR = THREE.ClampToEdgeWrapping;
texturePhase.unpackAlignment = 1;
texturePhase.needsUpdate = true;

// ── Textura — port de export_for_atohmeter (Éter) ────────────
function updateTextures(){
    let maxRho=1e-9, minH=Infinity, maxH=-Infinity;
    for(let n=0;n<TOTAL_CELLS;n++){
        const rho=Ur[n]**2+Ui[n]**2+Vr[n]**2+Vi[n]**2+Wr[n]**2+Wi[n]**2;
        if(rho>maxRho) maxRho=rho;
        const hLocal=(Ur[n]*curlXr[n]+Ui[n]*curlXi[n])
                    +(Vr[n]*curlYr[n]+Vi[n]*curlYi[n])
                    +(Wr[n]*curlZr[n]+Wi[n]*curlZi[n]);
        torsionGlow[n]=hLocal;
        if(hLocal<minH) minH=hLocal;
        if(hLocal>maxH) maxH=hLocal;
    }
    const hRange=Math.max(maxH-minH, 1e-9);

    // Máscara de horizonte esférico (core.py: clip(1.5-r, 0, 1))
    for(let i=0;i<N;i++) for(let j=0;j<N;j++) for(let k=0;k<N;k++){
        const n=idx(i,j,k);
        const xi=-1+i*2/(N-1), yi=-1+j*2/(N-1), zi=-1+k*2/(N-1);
        const r=Math.sqrt(xi*xi+yi*yi+zi*zi);
        const horizon=Math.max(0, Math.min(1, 1.5-r));
        // density_alpha
        const rho=Ur[n]**2+Ui[n]**2+Vr[n]**2+Vi[n]**2+Wr[n]**2+Wi[n]**2;
        renderVolume[n]=Math.min(1, rho/maxRho)*horizon;
        // phase_hue (ángulo de ψ_x)
        phaseData[n]=(Math.atan2(Ui[n],Ur[n])+Math.PI)/(2*Math.PI);
        // torsion_glow normalizado
        torsionGlow[n]=Math.max(0,Math.min(1,(torsionGlow[n]-minH)/hRange));
    }
    texture3D.needsUpdate=true;
    texturePhase.needsUpdate=true;
}

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.3;
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.001, 1000);
camera.position.set(0, 0, 6);

const ctrl = new OrbitControls(camera, renderer.domElement);
ctrl.enableDamping = true; ctrl.dampingFactor = 0.07;
ctrl.minDistance = 0.5; ctrl.maxDistance = 20;

const bloom = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth*0.5, window.innerHeight*0.5),
    1.8, 0.6, 0.05
);
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(bloom);
composer.addPass(new OutputPass());

const vertexShader = /* glsl */`
    varying vec3 vWorldPos;
    varying vec3 vLocalPos;
    uniform float uBoxSize;
    void main(){
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vWorldPos = wp.xyz;
        // Normalizar a [-1,1] — el box tiene half-size uBoxSize
        vLocalPos = position / uBoxSize;
        gl_Position = projectionMatrix * viewMatrix * wp;
    }
`;

const fragmentShader = /* glsl */`
precision highp float;
precision highp sampler3D;

varying vec3 vWorldPos;
varying vec3 vLocalPos;

uniform vec3    uCameraPos;
uniform vec3    uCameraLocal;
uniform float   uTime;
uniform float   uThresh;
uniform float   uEnergy;
uniform sampler3D uVolume;
uniform sampler3D uPhase;   

float sampleVol(vec3 p){
    vec3 uvw = p * 0.5 + 0.5;
    if(any(lessThan(uvw,vec3(0.0))) || any(greaterThan(uvw,vec3(1.0)))) return 0.0;
    return texture(uVolume, uvw).r;
}
float samplePhase(vec3 p){
    vec3 uvw = p * 0.5 + 0.5;
    if(any(lessThan(uvw,vec3(0.0))) || any(greaterThan(uvw,vec3(1.0)))) return 0.5;
    return texture(uPhase, uvw).r;
}

vec3 volGrad(vec3 p){
    float e = 0.06;
    return vec3(
        sampleVol(p+vec3(e,0,0)) - sampleVol(p-vec3(e,0,0)),
        sampleVol(p+vec3(0,e,0)) - sampleVol(p-vec3(0,e,0)),
        sampleVol(p+vec3(0,0,e)) - sampleVol(p-vec3(0,0,e))
    ) / (2.0*e);
}

vec3 phaseColor(float ph, float density){
    vec3 c0 = vec3(1.0,  0.35, 0.1);   
    vec3 c1 = vec3(0.1,  0.7,  1.0);   
    vec3 c2 = vec3(0.8,  0.2,  1.0);   

    vec3 col;
    if(ph < 0.5) col = mix(c0, c1, ph*2.0);
    else         col = mix(c1, c2, (ph-0.5)*2.0);

    col += vec3(1.2, 1.0, 0.6) * smoothstep(0.75, 1.0, density) * 0.5;
    return col;
}

void main(){
    // Rayo en espacio local [-1,1]
    // uCameraLocal se calcula en JS — sin inverse() en shader
    vec3 rayDir = normalize(vLocalPos - uCameraLocal);
    vec3 rayPos = vLocalPos + rayDir * 0.002;

    int   STEPS    = 96;
    float stepSize = 3.46 / float(STEPS); // diagonal de [-1,1]³ = sqrt(3)*2

    vec4 col = vec4(0.0);

    for(int i=0; i<96; i++){
        if(col.a > 0.95) break;
        vec3 p = rayPos + rayDir * float(i) * stepSize;

        // Salir si estamos fuera del volumen
        if(any(greaterThan(abs(p), vec3(1.0)))) break;

        float density = sampleVol(p);

        // ── Vacío cuántico — siempre visible ─────────────────
        // El tejido nunca está en cero — siempre tirita
        // El vacío siempre visible — incluso sin vórtices
        // Vacío siempre visible — confirma que el rayo recorre el volumen
        float vacuum = density * 0.12 + density*density * 0.2;
        col.rgb += vec3(0.1, 0.2, 0.5) * vacuum * (1.0-col.a);
        col.a   += vacuum * 0.6 * (1.0-col.a);

        // ── Vórtices — donde |curl| supera el umbral ─────────
        if(density > uThresh){
            float phase  = samplePhase(p);
            vec3  grad   = volGrad(p);
            float gMag   = length(grad);
            vec3  normal = gMag > 0.001 ? -normalize(grad) : vec3(0,1,0);
            float diff   = max(0.0, dot(normal, normalize(vec3(0.5,1.0,0.8)))) * 0.6 + 0.4;

            vec3  baseCol = phaseColor(phase, density);
            // Alpha proporcional al exceso sobre el umbral
            float excess  = (density - uThresh) / (1.0 - uThresh + 0.001);
            float alpha   = smoothstep(0.0, 0.4, excess) * 0.4;

            col.rgb += baseCol * diff * alpha * (1.0-col.a);
            col.a   += alpha * (1.0-col.a);
        }

        // ── Núcleo brillante — densidades muy altas ───────────
        if(density > uThresh * 1.6){
            float core  = smoothstep(uThresh*1.6, 1.0, density);
            float phase = samplePhase(p);
            col.rgb += phaseColor(phase, 1.0) * core * 0.15 * (1.0-col.a);
            col.a   += core * 0.1 * (1.0-col.a);
        }
    }

    if(col.a < 0.002) discard;
    gl_FragColor = col;
}
`;

const BOX_SIZE = 2.5;
const uniforms = {
    uCameraPos:   { value: new THREE.Vector3() },
    uCameraLocal: { value: new THREE.Vector3() },
    uBoxSize:     { value: BOX_SIZE }, // cámara en espacio local del box
    uTime:        { value: 0.0 },
    uThresh:      { value: THRESH },
    uEnergy:      { value: 0.0 },
    uVolume:      { value: texture3D },
    uPhase:       { value: texturePhase },
};

const material = new THREE.ShaderMaterial({
    uniforms, vertexShader, fragmentShader,
    transparent:true, side:THREE.DoubleSide,
    depthWrite:false, blending:THREE.NormalBlending
});
const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(BOX_SIZE*2, BOX_SIZE*2, BOX_SIZE*2),
    material
);
scene.add(mesh);

const starGeo = new THREE.BufferGeometry();
const sp = new Float32Array(600*3);
for(let i=0;i<600*3;i++) sp[i]=(Math.random()-0.5)*30;
starGeo.setAttribute('position', new THREE.BufferAttribute(sp,3));
scene.add(new THREE.Points(starGeo,
    new THREE.PointsMaterial({color:0x0a0a1a, size:0.04, sizeAttenuation:true})));

document.getElementById('btn-perturb').onclick = () => {
    injectPerturbation();
};

document.getElementById('btn-helical').onclick = () => {
    injectHelical(N/2, N/2, N/2, 0.9, 3.0);
    document.getElementById('btn-helical').classList.add('active-state');
    setTimeout(()=>document.getElementById('btn-helical').classList.remove('active-state'), 2000);
};

document.getElementById('btn-pause').onclick = function(){
    paused = !paused;
    this.textContent = paused ? '▶ Reanudar' : '‖ Pausar';
};

document.getElementById('btn-noise').onclick = () => {
    initNoise(0.05);
};

document.getElementById('btn-reset').onclick = () => {
    for(let n=0;n<TOTAL_CELLS;n++) Ur[n]=Ui[n]=Vr[n]=Vi[n]=Wr[n]=Wi[n]=0;
    initGrumo();
    initNoise(0.01);
    frameCount=0;
    maxEnergy=1.0;
};

document.getElementById('sEta').oninput = e => { ETA=+e.target.value; document.getElementById('vEta').textContent=ETA.toFixed(2); };
document.getElementById('sLambda').oninput = e => { LAMBDA=+e.target.value; document.getElementById('vLambda').textContent=LAMBDA.toFixed(3); };
document.getElementById('sThresh').oninput = e => {
    THRESH = +e.target.value;
    uniforms.uThresh.value = THRESH;
    document.getElementById('vThresh').textContent = THRESH.toFixed(2);
};

const TEXTURE_UPDATE_INTERVAL = 2;
let lastT = 0;

function animate(t){
    requestAnimationFrame(animate);
    const dt = Math.min((t-lastT)/1000, 0.05);
    lastT = t;

    uniforms.uTime.value += dt;
    uniforms.uCameraPos.value.copy(camera.position);

    // Cámara en espacio local del box — sin inverse() en shader
    // El box no tiene rotación, solo escala uniforme BOX_SIZE
    // Por eso la transformación es simplemente dividir por la escala
    uniforms.uCameraLocal.value.copy(camera.position)
        .divideScalar(BOX_SIZE);

    if(!paused){
        stepEvolve();  // incluye computeCurl internamente
        const energy = computeEnergy();
        frameCount++;

        if(frameCount % TEXTURE_UPDATE_INTERVAL === 0){
            updateTextures();
            uniforms.uThresh.value = THRESH;
            uniforms.uEnergy.value = energy;

            let curlMax=0; for(let _i=0;_i<TOTAL_CELLS;_i++) if(curlMag[_i]>curlMax) curlMax=curlMag[_i];
            const vortices = countVortices();

            if(energy > maxEnergy) maxEnergy = energy;
            helicityJS = computeHelicity();
            psiMaxJS   = computePsiMax();
            document.getElementById('s-frame').textContent  = frameCount;
            document.getElementById('s-energy').textContent = energy.toFixed(4);
            document.getElementById('s-curl').textContent   = curlMax.toFixed(3);
            document.getElementById('s-vortex').textContent = vortices;
            document.getElementById('s-helic').textContent  = helicityJS.toFixed(4);
            document.getElementById('s-psimax').textContent = psiMaxJS.toFixed(3);
            document.getElementById('energy-fill').style.width =
                Math.min(100, (energy/maxEnergy)*100).toFixed(1)+'%';

            const label = energy < 0.01  ? 'vacío cuántico'  :
                          energy < 0.5   ? 'nucleando vórtices' :
                          energy < 2.0   ? 'campo activo'     : 'alta energía ⚡';
            document.getElementById('field-display').textContent =
                `ψ emergente — ${label}`;
        }
    }

    const d = camera.position.length();
    document.getElementById('s-zoom').textContent =
        d > 8 ? 'cosmos' : d > 4 ? 'campo' : d > 2 ? 'vórtice' : 'núcleo';

    ctrl.update();
    composer.render();
}

// Inicialización como core.py: grumo + ruido pequeño
initGrumo();
initNoise(0.01);
computeCurl();
updateTextures();

animate(0);

window.addEventListener('resize', ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
});
</script>
