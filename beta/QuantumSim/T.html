<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AtOhmEter FIX</title>
<style>
body { margin: 0; background: #000; overflow: hidden; }
</style>
</head>
<body>

<script type="importmap">
{
  "imports": {
    "three": "/lib/three/build/three.module.js",
    "three/addons/": "/lib/three/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.5;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(
    new THREE.Vector2(innerWidth, innerHeight),
    1.5, 0.4, 0.1
));

// ─── SHADER ─────────────────

const material = new THREE.ShaderMaterial({
uniforms: {
    uTime: { value: 0 },
    uCameraPos: { value: new THREE.Vector3() }
},
vertexShader: `
varying vec3 vWorldPos;
void main(){
    vec4 wp = modelMatrix * vec4(position,1.0);
    vWorldPos = wp.xyz;
    gl_Position = projectionMatrix * viewMatrix * wp;
}
`,
fragmentShader: `
precision highp float;

varying vec3 vWorldPos;
uniform vec3 uCameraPos;
uniform float uTime;

float map(vec3 p){
    float d1 = distance(p, vec3(0.6,0.0,0.0));
    float d2 = distance(p, vec3(-0.6,0.0,0.0));

    float w = cos(14.0*d1 - uTime*4.0)*exp(-d1*1.2);
    w += cos(14.0*d2 - uTime*4.0)*exp(-d2*1.2);

    return w;
}

void main(){

    vec3 rayDir = normalize(vWorldPos);
    vec3 rayPos = vWorldPos;

    vec4 col = vec4(0.0);

    for(int i=0;i<35;i++){

        if(length(rayPos) > 3.0) break;

        float f = map(rayPos);
        float a = abs(f);

        if(a > 0.3){
            vec3 c = (f>0.0)
                ? vec3(2.5,0.2,0.5)
                : vec3(0.2,1.5,2.5);

            float gold = smoothstep(0.5,0.9,a);
            c += vec3(3.0,2.0,0.5)*gold;

            float alpha = (a-0.3)*0.15;

            col.rgb += c*alpha*(1.0-col.a);
            col.a += alpha;
        }

        rayPos += rayDir * 0.15;

        if(col.a > 0.98) break;
    }

    gl_FragColor = col;
}
`,
transparent: true,
side: THREE.BackSide,
depthWrite: false,
blending: THREE.AdditiveBlending
});

const mesh = new THREE.Mesh(new THREE.BoxGeometry(6,6,6), material);
scene.add(mesh);

// ─── LOOP ─────────────────

function animate(t){
    requestAnimationFrame(animate);

    material.uniforms.uTime.value = t/1000;
    material.uniforms.uCameraPos.value.copy(camera.position);

    controls.update();
    composer.render();
}

animate();

onresize = ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
};
</script>

</body>
</html>
