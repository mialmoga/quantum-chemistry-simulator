        .type-d .sub-check { border-color:rgba(75,215,110,0.35); }
        .type-d .sub-check:checked { background:rgba(75,215,110,0.1); border-color:rgba(75,215,110,0.8); }

        .type-f .group-dot,.type-f .group-label { color:rgba(185,100,255,0.85); }

<script type="module">
import * as THREE from 'three';
import { OrbitControls }  from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }     from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }     from 'three/addons/postprocessing/OutputPass.js';

// ═══════════════════════════════════════════════════════════════
//  TABLA PERIÓDICA
// ═══════════════════════════════════════════════════════════════
const ELEMENTS = [
    '—','H','He','Li','Be','B','C','N','O','F','Ne',
    'Na','Mg','Al','Si','P','S','Cl','Ar','K','Ca',
    'Sc','Ti','V','Cr','Mn','Fe','Co','Ni','Cu','Zn',
    'Ga','Ge','As','Se','Br','Kr','Rb','Sr','Y','Zr',
    'Nb','Mo','Tc','Ru','Rh','Pd','Ag','Cd','In','Sn',
    'Sb','Te','I','Xe','Cs','Ba','La','Ce','Pr','Nd',
    'Pm','Sm','Eu','Gd','Tb','Dy','Ho','Er','Tm','Yb',
    'Lu','Hf','Ta','W','Re','Os','Ir','Pt','Au','Hg',
    'Tl','Pb','Bi','Po','At','Rn','Fr','Ra','Ac','Th',
    'Pa','U','Np','Pu','Am','Cm','Bk','Cf','Es','Fm',
    'Md','No','Lr','Rf','Db','Sg','Bh','Hs','Mt','Ds',
    'Rg','Cn','Nh','Fl','Mc','Lv','Ts','Og'
];
const ELEMENT_NAMES = {
    1:'Hidrógeno',2:'Helio',3:'Litio',4:'Berilio',5:'Boro',
    6:'Carbono',7:'Nitrógeno',8:'Oxígeno',9:'Flúor',10:'Neón',
    11:'Sodio',12:'Magnesio',13:'Aluminio',14:'Silicio',15:'Fósforo',
    16:'Azufre',17:'Cloro',18:'Argón',19:'Potasio',20:'Calcio',
    21:'Escandio',22:'Titanio',23:'Vanadio',24:'Cromo',25:'Manganeso',
    26:'Hierro',27:'Cobalto',28:'Níquel',29:'Cobre',30:'Zinc',
    36:'Kriptón',47:'Plata',54:'Xenón',79:'Oro',86:'Radón',
    92:'Uranio',112:'Copernicio'
};

// ═══════════════════════════════════════════════════════════════
//  AUFBAU — Secuencia de llenado de subcapas
//  Cada entrada: { n, l, label, capacity }
//  l: 0=s, 1=p, 2=d, 3=f
//  Orden real: 1s 2s 2p 3s 3p 4s 3d 4p 5s 4d 5p 6s 4f 5d 6p 7s 5f 6d 7p
// ═══════════════════════════════════════════════════════════════
const AUFBAU_ORDER = [
    {n:1,l:0},{n:2,l:0},{n:2,l:1},{n:3,l:0},{n:3,l:1},
    {n:4,l:0},{n:3,l:2},{n:4,l:1},{n:5,l:0},{n:4,l:2},
    {n:5,l:1},{n:6,l:0},{n:4,l:3},{n:5,l:2},{n:6,l:1},
    {n:7,l:0},{n:5,l:3},{n:6,l:2},{n:7,l:1}
];
const L_NAMES = ['s','p','d','f'];
const L_CAP   = [2, 6, 10, 14]; // capacidad máxima por tipo
const L_COLORS_GLSL = [
    [0.27,0.87,0.80], // s — teal
    [1.0, 0.61,0.20], // p — naranja
    [0.29,0.84,0.43], // d — verde
    [0.73,0.39,1.0]   // f — púrpura
];

// Calcula configuración electrónica para Z protones
// Retorna array de { n, l, electrons, label }
function elektronConfig(Z) {
    let remaining = Z;
    const filled = [];
    for (const sub of AUFBAU_ORDER) {
        if (remaining <= 0) break;
        const cap = L_CAP[sub.l];
        const e   = Math.min(remaining, cap);
        filled.push({ n:sub.n, l:sub.l, electrons:e, max:cap,
                      label:`${sub.n}${L_NAMES[sub.l]}` });
        remaining -= e;
    }
    return filled;
}

// Agrupa la configuración por tipo l
function groupByL(config) {
    const groups = { 0:[], 1:[], 2:[], 3:[] };
    for (const sub of config) groups[sub.l].push(sub);
    return groups;
}

// ═══════════════════════════════════════════════════════════════
//  ESTADO
// ═══════════════════════════════════════════════════════════════
let Z=0, N=0;
function getA()      { return Z+N; }
function getSymbol() { return ELEMENTS[Z]||`Z${Z}`; }
function getName()   { return ELEMENT_NAMES[Z]||getSymbol(); }

function atomicPeriod(Z) {
    return Z<=2?1:Z<=10?2:Z<=18?3:Z<=36?4:Z<=54?5:Z<=86?6:7;
}
function nuclearFrequency(Z,N) {
    if(Z===0) return 0.0;
    const A=Z+N, period=atomicPeriod(Z);
    const ω_base=Math.pow(2.0,period-1);
    const pStart=[0,1,3,11,19,37,55,87][period-1];
    const pSize=[0,2,8,8,18,18,32,32][period-1]||32;
    const t=(Z-pStart)/pSize;
    return ω_base*(1.0+t*0.618)*Math.sqrt(Z/A);
}
function nuclearRadius(A) {
    return A===0?0.3:0.3*Math.pow(A,1/3);
}
function nucleonPositions(count) {
    if(count===0) return [];
    const pos=[], g=Math.PI*(3-Math.sqrt(5)), R=nuclearRadius(count);
    for(let i=0;i<count;i++){
        const y=1-(i/Math.max(count-1,1))*2, r=Math.sqrt(Math.max(0,1-y*y)), th=g*i;
        pos.push(new THREE.Vector3(R*r*Math.cos(th),R*y,R*r*Math.sin(th)));
    }
    return pos;
}

// ═══════════════════════════════════════════════════════════════
//  ESTADO DE ORBITALES — mapa dinámico
//  orbState[label] = { visible:bool, amp:float, n, l }
// ═══════════════════════════════════════════════════════════════
let orbState = {}; // se reconstruye en syncShells()

// ═══════════════════════════════════════════════════════════════
//  UNIFORMS — shader recibe hasta 16 subcapas activas
//  Cada una: vec4(n, l, amp, visible)
//  + vec3 color por subcapa
// ═══════════════════════════════════════════════════════════════
const MAX_SOURCES = 32;
const MAX_SUBCAPS = 16; // máximo de subcapas simultáneas al shader

const uSources  = new Array(MAX_SOURCES).fill(null).map(()=>new THREE.Vector3());
const uIsProton = new Float32Array(MAX_SOURCES);

// Subcapas como arrays paralelos para GLSL
const uSubN   = new Float32Array(MAX_SUBCAPS); // n cuántico
const uSubL   = new Float32Array(MAX_SUBCAPS); // l (0=s,1=p,2=d,3=f)
const uSubAmp = new Float32Array(MAX_SUBCAPS); // intensidad
const uSubVis = new Float32Array(MAX_SUBCAPS); // 0 o 1
const uSubCol = new Array(MAX_SUBCAPS).fill(null).map(()=>new THREE.Vector3());

const uniforms = {
    uTime:        {value:0.0},
    uCameraPos:   {value:new THREE.Vector3()},
    uBoxSize:     {value:4.0},
    uOmega:       {value:1.0},
    uZ:           {value:0.0},
    uA:           {value:0.0},
    uNucRadius:   {value:0.3},
    uShowShells:  {value:1.0},
    uZoomLevel:   {value:0.0},
    uOrbRadius:   {value:2.5},
    uNShells:     {value:1.0},
    uSources:     {value:uSources},
    uIsProton:    {value:uIsProton},
    uSourceCount: {value:0},
    // Subcapas
    uSubN:        {value:uSubN},
    uSubL:        {value:uSubL},
    uSubAmp:      {value:uSubAmp},
    uSubVis:      {value:uSubVis},
    uSubCol:      {value:uSubCol},
    uSubCount:    {value:0},
};

// ═══════════════════════════════════════════════════════════════
//  RENDERER
// ═══════════════════════════════════════════════════════════════
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.toneMapping=THREE.ReinhardToneMapping;
renderer.toneMappingExposure=1.4;
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.001,10000);
camera.position.set(0,0,8);

const ctrl=new OrbitControls(camera,renderer.domElement);
ctrl.enableDamping=true; ctrl.dampingFactor=0.07;
ctrl.minDistance=0.002; ctrl.maxDistance=500;

const bloomPass=new UnrealBloomPass(new THREE.Vector2(window.innerWidth,window.innerHeight),2.2,0.5,0.06);
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

document.getElementById('bStr').oninput=e=>bloomPass.strength=+e.target.value;
document.getElementById('bRad').oninput=e=>bloomPass.radius=+e.target.value;
document.getElementById('bThr').oninput=e=>bloomPass.threshold=+e.target.value;
document.getElementById('bExp').oninput=e=>renderer.toneMappingExposure=+e.target.value;

// ═══════════════════════════════════════════════════════════════
//  FRAGMENT SHADER — recibe subcapas como arrays paralelos
// ═══════════════════════════════════════════════════════════════
const vertexShader=/* glsl */`
    varying vec3 vWorldPos;
    void main(){
        vec4 wp=modelMatrix*vec4(position,1.0);
        vWorldPos=wp.xyz;
        gl_Position=projectionMatrix*viewMatrix*wp;
    }
`;

const fragmentShader=/* glsl */`
precision highp float;

varying vec3 vWorldPos;
uniform vec3  uCameraPos;
uniform float uTime;
uniform float uBoxSize;
uniform float uOmega;
uniform float uZ;
uniform float uA;
uniform float uNucRadius;
uniform float uShowShells;
uniform float uZoomLevel;
uniform float uOrbRadius;
uniform float uNShells;

uniform vec3  uSources[32];
uniform float uIsProton[32];
uniform int   uSourceCount;

// Subcapas dinámicas
uniform float uSubN[16];
uniform float uSubL[16];
uniform float uSubAmp[16];
uniform float uSubVis[16];
uniform vec3  uSubCol[16];
uniform int   uSubCount;

// ── Utilidades ───────────────────────────────────────────────
float hash(vec3 p){p=fract(p*0.3183099+0.1);p*=17.0;return fract(p.x*p.y*p.z*(p.x+p.y+p.z));}
float noise3(vec3 x){
    vec3 i=floor(x);vec3 f=fract(x);f=f*f*(3.0-2.0*f);
    return mix(mix(mix(hash(i),hash(i+vec3(1,0,0)),f.x),mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
               mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z);
}
float colorTube(vec3 p,vec3 v1,vec3 v2){
    vec3 ab=v2-v1;float len=length(ab);if(len<0.001)return 0.0;
    float t=clamp(dot(p-v1,ab)/(len*len),0.0,1.0);
    return exp(-pow(distance(p,v1+t*ab),2.0)*18.0)*(0.4+len*1.2);
}
float quarkVortex(vec3 p,vec3 c,float phase){
    vec3 d=p-c;float r=length(d);if(r<0.0001)return 3.0;
    float pulse=pow(0.5+0.5*sin(uTime*uOmega*6.28318+phase),3.0);
    return exp(-r*r*22.0)*(1.0+sin(atan(d.y,d.x)*3.0+atan(length(d.xy),d.z)*2.0+uTime*uOmega*4.0+phase)*0.4)*(0.3+pulse*2.5);
}
float quarkyVacuum(vec3 p,float t){return noise3(p*5.8+t*0.3)*0.6+noise3(p*12.0-t*0.17+3.7)*0.4;}
float nucleonWave(vec3 p,vec3 src,float omega,float t,float isP){
    float d=distance(p,src);if(d<0.0001)return 1.0;
    return cos(omega*12.0*d-t*omega*3.14159)*exp(-d*d*2.2)*(isP>0.5?1.0:-1.0);
}

// ── Envolvente radial con nodos (función de Z del Hamiltoneano) ──
// La parte radial R_nl contiene (n-l-1) nodos radiales
// Simplificado: onda estacionaria con nShells nodos en [0, R_orb]
// Escala extra para subcapas internas (n pequeño → más compacto)
float radialPart(float r, float R_orb, float n) {
    if(r<0.001||R_orb<0.01) return 0.0;
    // Radio efectivo de la subcapa escala con n²/Z (aproximación hidrogénica)
    // Aquí usamos n como factor de escala relativo
    float R_n = R_orb * (n / uNShells);
    float width = R_n*(0.25+n*0.06);
    float env = exp(-pow(max(0.0,r-R_n)/width,2.0))*(1.0-exp(-r*r/(R_n*0.3)));
    // Nodos radiales: n-l-1 ceros en la función radial
    // Aproximamos con sin para producir (n-l) semiciclos visibles
    float nodeFreq = 3.14159*n/R_n;
    float standing = sin(nodeFreq*r);
    float globalMod = 0.6+0.4*sin(r*3.14159*n/R_n+0.5);
    return env*standing*standing*globalMod;
}

// ── Parte angular por tipo l ─────────────────────────────────
// Retorna densidad de probabilidad angular |Y_l^m|² sumado sobre m
// Cada m es identificable individualmente como modo de resonancia

float angularS(vec3 dir) {
    // l=0: Y_0^0 = const — esférico total
    return 1.0;
}

float angularP(vec3 dir, float t) {
    // l=1: suma sobre m=-1,0,+1 con modulación temporal
    float cosT=dir.z, sinT=length(dir.xy);
    float phi=atan(dir.y,dir.x);
    // m=0: cos²θ
    float P0=cosT*cosT;
    // m=+1: sin²θ·cos²φ
    float Pp=sinT*cos(phi); Pp*=Pp;
    // m=-1: sin²θ·sin²φ
    float Pm=sinT*sin(phi); Pm*=Pm;
    // Degenerate superposition — modulación lenta de la mezcla
    float a=t*0.28;
    return (0.5+0.5*sin(a))*P0 + (0.5+0.5*sin(a+2.094))*Pp + (0.5+0.5*sin(a+4.189))*Pm;
}

float angularD(vec3 dir, float t) {
    // l=2: suma sobre los 5 m con modulación
    float cosT=dir.z, sinT=length(dir.xy);
    float phi=atan(dir.y,dir.x);
    float c2=cosT*cosT;
    // d_z2: (3cos²θ-1)²
    float d0=(3.0*c2-1.0); d0*=d0;
    // d_xz, d_yz: sin·cos·cos/sin(φ)
    float d1=sinT*cosT*cos(phi); d1*=d1;
    float d2=sinT*cosT*sin(phi); d2*=d2;
    // d_x2-y2, d_xy: sin²·cos/sin(2φ)
    float d3=sinT*sinT*cos(2.0*phi); d3*=d3;
    float d4=sinT*sinT*sin(2.0*phi); d4*=d4;
    float a=t*0.19;
    return (d0+d1+d2+d3+d4)/5.0 + 0.3*sin(a)*d0 + 0.2*sin(a+1.257)*d3;
}

float angularF(vec3 dir, float t) {
    // l=3: suma sobre los 7 m
    float cosT=dir.z, sinT=length(dir.xy);
    float phi=atan(dir.y,dir.x);
    float c2=cosT*cosT; float s2=sinT*sinT;
    float f0=5.0*c2*cosT-3.0*cosT; f0*=f0;
    float f1=sinT*(5.0*c2-1.0)*cos(phi); f1*=f1;
    float f2=sinT*(5.0*c2-1.0)*sin(phi); f2*=f2;
    float f3=s2*cosT*sin(2.0*phi); f3*=f3;
    float f4=s2*cosT*cos(2.0*phi); f4*=f4;
    float f5=s2*sinT*cos(3.0*phi); f5*=f5;
    float f6=s2*sinT*sin(3.0*phi); f6*=f6;
    float a=t*0.13;
    return (f0+f1+f2+f3+f4+f5+f6)/7.0 + 0.25*sin(a)*f0 + 0.2*sin(a+0.9)*f5;
}

// ── Campo orbital de una subcapa nℓ ──────────────────────────
float subcapField(vec3 p, float n, float l, float t) {
    float r=length(p);
    if(r<0.001) return 0.0;
    vec3 dir=p/r;

    float radial = radialPart(r, uOrbRadius, n);

    float angular;
    if(l<0.5)      angular = angularS(dir);
    else if(l<1.5) angular = angularP(dir,t);
    else if(l<2.5) angular = angularD(dir,t);
    else           angular = angularF(dir,t);

    // Factor de amplificación por l para igualar visibilidad:
    // s más denso, f más difuso pero más extendido angularmente
    float lBoost = 1.0 + l*0.8;

    return radial * angular * lBoost;
}

// ── Box exit ─────────────────────────────────────────────────
float boxExit(vec3 ro,vec3 rd,float bs){vec3 t=(sign(rd)*bs-ro)/rd;return min(min(t.x,t.y),t.z);}

// ═══════════════════════════════════════════════════════════════
//  MAIN
// ═══════════════════════════════════════════════════════════════
void main(){
    if(uSourceCount==0){discard;}
    vec3 rayDir=normalize(vWorldPos-uCameraPos);
    vec3 rayPos=vWorldPos;
    float tMax=boxExit(rayPos,rayDir,uBoxSize-0.001);
    int   steps=uSourceCount>16?28:(uSourceCount>6?38:48);
    float stepSize=tMax/float(steps);

    vec4 col=vec4(0.0);
    float t=uTime;

    // Quarks del primer protón
    float qr=uNucRadius*0.38;
    vec3 s0=uSourceCount>0?uSources[0]:vec3(0.0);
    float qr2=t*uOmega*0.8;
    mat2 qrot=mat2(cos(qr2),-sin(qr2),sin(qr2),cos(qr2));
    vec3 q1=s0+vec3(0.0,qr,0.0);
    vec3 q2=s0+vec3(qr*0.866,-qr*0.5,0.0);
    vec3 q3=s0+vec3(-qr*0.866,-qr*0.5,0.0);
    q1.xy=qrot*(q1.xy-s0.xy)+s0.xy;
    q2.xy=qrot*(q2.xy-s0.xy)+s0.xy;
    q3.xy=qrot*(q3.xy-s0.xy)+s0.xy;

    for(int i=0;i<64;i++){
        if(float(i)*stepSize>tMax) break;
        if(col.a>=0.97) break;
        vec3 p=rayPos+rayDir*(float(i)*stepSize+stepSize*0.5);
        float dOrigin=length(p);

        // ── Nuclear ───────────────────────────────────────────
        float nucField=0.0;
        if(dOrigin<(uNucRadius*2.5+1.0/uOmega)*3.0){
            for(int s=0;s<32;s++){
                if(s>=uSourceCount) break;
                if(distance(p,uSources[s])>2.2) continue;
                nucField+=nucleonWave(p,uSources[s],uOmega,t,uIsProton[s]);
            }
        }
        float af=abs(nucField);
        if(af>0.12){
            vec3 posCol=vec3(2.2,0.12,0.45), negCol=vec3(0.12,1.4,2.2);
            vec3 bCol=mix(negCol,posCol,step(0.0,nucField));
            bCol+=vec3(3.0,1.8,0.3)*smoothstep(0.45,0.88,af);
            float alpha=clamp((af-0.12)*0.14*stepSize/0.1,0.0,0.05);
            col.rgb+=bCol*alpha*(1.0-col.a); col.a+=alpha*(1.0-col.a);
        }

        // ── Quarks ────────────────────────────────────────────
        float qVis=smoothstep(0.3,1.0,uZoomLevel);
        if(qVis>0.01){
            float qF=quarkVortex(p,q1,0.0)+quarkVortex(p,q2,2.0944)+quarkVortex(p,q3,4.1888);
            float tF=colorTube(p,q1,q2)+colorTube(p,q2,q3)+colorTube(p,q3,q1);
            if(qF>0.15){
                float qa=clamp(qF*0.12*qVis,0.0,0.08);
                col.rgb+=(vec3(2.8,2.2,1.4)*smoothstep(0.6,1.5,qF)+vec3(1.4,0.9,0.5)*smoothstep(0.15,0.6,qF))*qa*(1.0-col.a);
                col.a+=qa*(1.0-col.a);
            }
            if(tF>0.08){float ta=clamp(tF*0.15*qVis,0.0,0.1);col.rgb+=vec3(3.5,2.2,0.3)*ta*(1.0-col.a);col.a+=ta*(1.0-col.a);}
        }

        // ── Sea ───────────────────────────────────────────────
        if(dOrigin<uNucRadius*2.5){
            float sea=quarkyVacuum(p,t)*0.15*exp(-dOrigin/(uNucRadius*1.5));
            col.rgb+=vec3(0.6,0.7,0.9)*sea*sea*0.04*(1.0-col.a);
            col.a+=sea*0.04*(1.0-col.a);
        }

        // ── Orbitales emergentes — iterar subcapas activas ────
        if(uShowShells>0.5 && uZ>0.0 && uSubCount>0){
            for(int s=0;s<16;s++){
                if(s>=uSubCount) break;
                if(uSubVis[s]<0.5) continue;

                float field=subcapField(p, uSubN[s], uSubL[s], t);
                if(field>0.008){
                    // Respiración por subcapa (frecuencia única para cada nℓ)
                    float phase=uSubN[s]*1.1+uSubL[s]*0.7;
                    float breathe=0.6+0.4*sin(t*uOmega*0.4+phase);

                    float oa=clamp(field*0.055*breathe*uSubAmp[s],0.0,0.045);
                    col.rgb+=uSubCol[s]*oa*(1.0-col.a);
                    col.a+=oa*(1.0-col.a);
                }
            }
        }
    }

    if(col.a<0.004) discard;
    gl_FragColor=col;
}
`;

// ═══════════════════════════════════════════════════════════════
//  MESH
// ═══════════════════════════════════════════════════════════════
const BOX=4.0;
const material=new THREE.ShaderMaterial({
    uniforms,vertexShader,fragmentShader,
    transparent:true,side:THREE.FrontSide,depthWrite:false,blending:THREE.NormalBlending
});
const mesh=new THREE.Mesh(new THREE.BoxGeometry(BOX*2,BOX*2,BOX*2),material);
scene.add(mesh);

const starGeo=new THREE.BufferGeometry();
const sp=new Float32Array(800*3);
for(let i=0;i<800*3;i++) sp[i]=(Math.random()-0.5)*120;
starGeo.setAttribute('position',new THREE.BufferAttribute(sp,3));
scene.add(new THREE.Points(starGeo,new THREE.PointsMaterial({color:0x112233,size:0.06,sizeAttenuation:true})));

// ═══════════════════════════════════════════════════════════════
//  SYNC UNIFORMS DE SUBCAPAS — lee orbState y pasa al shader
// ═══════════════════════════════════════════════════════════════
function syncSubcapUniforms() {
    // Solo subcapas que existen para Z actual
    const config = elektronConfig(Z);
    let idx = 0;
    for (const sub of config) {
        if (idx >= MAX_SUBCAPS) break;
        const state = orbState[sub.label] || { visible:true, amp:1.0 };
        uSubN[idx]   = sub.n;
        uSubL[idx]   = sub.l;
        uSubAmp[idx] = state.amp;
        uSubVis[idx] = state.visible ? 1.0 : 0.0;
        const c = L_COLORS_GLSL[sub.l];
        uSubCol[idx].set(c[0], c[1], c[2]);
        idx++;
    }
    // Limpiar el resto
    for (let i = idx; i < MAX_SUBCAPS; i++) {
        uSubVis[i] = 0.0; uSubAmp[i] = 0.0;
    }
    uniforms.uSubCount.value = idx;
}

// ═══════════════════════════════════════════════════════════════
//  PANEL UI — construye el panel dinámicamente desde Z
// ═══════════════════════════════════════════════════════════════
function buildPanel(Z) {
    const panel = document.getElementById('orbital-panel');
    const hint  = document.getElementById('empty-hint');
    panel.innerHTML = '';
    panel.appendChild(hint);

    if (Z === 0) {
        hint.style.display = 'block';
        return;
    }
    hint.style.display = 'none';

    const config = elektronConfig(Z);
    const groups = groupByL(config);
    const lNames = ['s','p','d','f'];
    const typeClass = ['type-s','type-p','type-d','type-f'];

    for (let l = 0; l <= 3; l++) {
        if (groups[l].length === 0) continue;

        const groupEl = document.createElement('div');
        groupEl.className = `orb-group ${typeClass[l]}`;

        // Header del grupo (tipo l)
        const header = document.createElement('div');
        header.className = 'orb-group-header';

        const gchk = document.createElement('input');
        gchk.type = 'checkbox'; gchk.className = 'group-check'; gchk.checked = true;

        const dot  = document.createElement('span'); dot.className = 'group-dot';
        const lbl  = document.createElement('span'); lbl.className = 'group-label';
        lbl.textContent = lNames[l].toUpperCase() + ' — ' + groups[l].length + ' cap' + (groups[l].length>1?'as':'a');

        const arrow = document.createElement('span'); arrow.className = 'group-arrow open';
        arrow.textContent = '▶';

        header.append(gchk, dot, lbl, arrow);
        groupEl.appendChild(header);

        // Subgrupo expandible
        const subgroup = document.createElement('div');
        subgroup.className = 'orb-subgroup open';

        // Toggle grupo
        arrow.addEventListener('click', () => {
            const open = subgroup.classList.toggle('open');
            arrow.classList.toggle('open', open);
        });
        gchk.addEventListener('change', () => {
            groups[l].forEach(sub => {
                const st = orbState[sub.label];
                if (st) st.visible = gchk.checked;
                // Actualiza checkbox hijo
                const childChk = document.getElementById(`chk-${sub.label}`);
                if (childChk) childChk.checked = gchk.checked;
            });
            syncSubcapUniforms();
        });

        // Subcapas individuales
        for (const sub of groups[l]) {
            if (!orbState[sub.label]) {
                orbState[sub.label] = { visible:true, amp:1.0, n:sub.n, l:sub.l };
            }

            const row = document.createElement('div');
            row.className = 'subcap-row';

            // Header de la subcapa
            const subHdr = document.createElement('div');
            subHdr.className = 'subcap-header';

            const schk = document.createElement('input');
            schk.type = 'checkbox'; schk.className = 'sub-check';
            schk.id = `chk-${sub.label}`;
            schk.checked = orbState[sub.label].visible;

            const sLbl = document.createElement('span');
            sLbl.className = 'sub-label';
            sLbl.textContent = sub.label;

            const sFill = document.createElement('span');
            sFill.className = 'sub-fill';
            sFill.textContent = `${sub.electrons}/${sub.max}`;

            subHdr.append(schk, sLbl, sFill);
            row.appendChild(subHdr);

            // Sliders
            const sliders = document.createElement('div');
            sliders.className = 'subcap-sliders';

            // Slider de brillo
            const sRow = makeSliderRow('brillo', `sld-${sub.label}-amp`, 0, 2, 0.01,
                orbState[sub.label].amp, v => {
                    orbState[sub.label].amp = v;
                    syncSubcapUniforms();
                });
            sliders.appendChild(sRow);

            row.appendChild(sliders);
            subgroup.appendChild(row);

            // Checkbox toggle
            schk.addEventListener('change', () => {
                orbState[sub.label].visible = schk.checked;
                syncSubcapUniforms();
            });
        }

        groupEl.appendChild(subgroup);
        panel.appendChild(groupEl);
    }
}

function makeSliderRow(name, id, min, max, step, val, onChange) {
    const row = document.createElement('div');
    row.className = 'slider-row';
    const nm = document.createElement('span'); nm.className='slider-name'; nm.textContent=name;
    const sl = document.createElement('input');
    sl.type='range'; sl.className='orb-slider'; sl.id=id;
    sl.min=min; sl.max=max; sl.step=step; sl.value=val;
    const vl = document.createElement('span'); vl.className='slider-val';
    vl.textContent = parseFloat(val).toFixed(2);
    sl.oninput = () => { const v=parseFloat(sl.value); vl.textContent=v.toFixed(2); onChange(v); };
    row.append(nm, sl, vl);
    return row;
}

// ═══════════════════════════════════════════════════════════════
//  SYNC NUCLEUS
// ═══════════════════════════════════════════════════════════════
function syncNucleus() {
    const A=getA(), ω=nuclearFrequency(Z,N), R=nuclearRadius(A);
    uniforms.uOmega.value=Math.max(ω,0.001);
    uniforms.uZ.value=Z; uniforms.uA.value=A; uniforms.uNucRadius.value=R;
    uniforms.uSourceCount.value=Math.min(A,MAX_SOURCES);

    const boxSize=Math.max(4.0,R*3.5+2.0);
    uniforms.uBoxSize.value=boxSize;
    mesh.scale.setScalar(boxSize/BOX);

    nucleonPositions(A).forEach((pos,i)=>{
        if(i<MAX_SOURCES){uSources[i].copy(pos);uIsProton[i]=i<Z?1.0:0.0;}
    });

    const period=atomicPeriod(Z);
    uniforms.uOrbRadius.value=Math.max(R*1.8,1.2+period*0.35);
    uniforms.uNShells.value=period;

    // HUD
    document.getElementById('element-display').textContent =
        A===0?'— vacío cuántico —':`${getSymbol()} · ${getName()} · Z=${Z} N=${N} A=${A}`;
    document.getElementById('s-p').textContent=Z;
    document.getElementById('s-n').textContent=N;
    document.getElementById('s-a').textContent=A;

    // Configuración electrónica en HUD
    const config = elektronConfig(Z);
    document.getElementById('config-display').textContent =
        Z===0 ? '' : config.map(s=>`${s.label}${sup(s.electrons)}`).join(' ');

    // Reconstruir panel UI (conserva orbState existente)
    buildPanel(Z);
    syncSubcapUniforms();
}

// Superíndice unicode para config display
function sup(n){
    const map='⁰¹²³⁴⁵⁶⁷⁸⁹¹⁰¹¹¹²¹³¹⁴';
    return n<=9?map[n]:'⁺'; // simplificado
}

function smoothstep(a,b,x){const t=Math.max(0,Math.min(1,(x-a)/(b-a)));return t*t*(3-2*t);}

function updateZoom(){
    const d=camera.position.length(),R=Math.max(uniforms.uNucRadius.value,0.3);
    uniforms.uZoomLevel.value=1-smoothstep(R*0.8,R*3,d);
    uniforms.uCameraPos.value.copy(camera.position);
    document.getElementById('s-z').textContent=d>R*8?'orbital':d>R*2?'núcleo':'quarks ⚡';
}

// ═══════════════════════════════════════════════════════════════
//  BOTONES
// ═══════════════════════════════════════════════════════════════
document.getElementById('btn-addP').onclick=()=>{Z++;syncNucleus();};
document.getElementById('btn-addN').onclick=()=>{N++;syncNucleus();};
document.getElementById('btn-remP').onclick=()=>{if(Z>0){Z--;syncNucleus();}};
document.getElementById('btn-remN').onclick=()=>{if(N>0){N--;syncNucleus();}};
document.getElementById('btn-reset').onclick=()=>{Z=0;N=0;orbState={};syncNucleus();};

let shellsOn=true;
document.getElementById('btn-shells').onclick=function(){
    shellsOn=!shellsOn;
    uniforms.uShowShells.value=shellsOn?1.0:0.0;
    this.textContent=shellsOn?'Capas ON':'Capas OFF';
};

// ═══════════════════════════════════════════════════════════════
//  LOOP
// ═══════════════════════════════════════════════════════════════
let lastT=0;
function animate(t){
    requestAnimationFrame(animate);
    uniforms.uTime.value+=Math.min((t-lastT)/1000,0.05);
    lastT=t;
    updateZoom();
    ctrl.update();
    composer.render();
}

Z=1;N=0;
syncNucleus();
animate(0);

window.addEventListener('resize',()=>{
    const w=window.innerWidth,h=window.innerHeight;
    camera.aspect=w/h; camera.updateProjectionMatrix();
    renderer.setSize(w,h); composer.setSize(w,h); bloomPass.resolution.set(w,h);
});
</script>
