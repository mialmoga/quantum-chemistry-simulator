<script type="module">
import * as THREE from 'three';
import { OrbitControls }  from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }     from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }     from 'three/addons/postprocessing/OutputPass.js';

// ═══════════════════════════════════════════════════════════════
//  TABLA PERIÓDICA — nombres emergentes de Z
// ═══════════════════════════════════════════════════════════════
const ELEMENTS = [
    '—','H','He','Li','Be','B','C','N','O','F','Ne',
    'Na','Mg','Al','Si','P','S','Cl','Ar','K','Ca',
    'Sc','Ti','V','Cr','Mn','Fe','Co','Ni','Cu','Zn',
    'Ga','Ge','As','Se','Br','Kr','Rb','Sr','Y','Zr',
    'Nb','Mo','Tc','Ru','Rh','Pd','Ag','Cd','In','Sn',
    'Sb','Te','I','Xe','Cs','Ba','La','Ce','Pr','Nd',
    'Pm','Sm','Eu','Gd','Tb','Dy','Ho','Er','Tm','Yb',
    'Lu','Hf','Ta','W','Re','Os','Ir','Pt','Au','Hg',
    'Tl','Pb','Bi','Po','At','Rn','Fr','Ra','Ac','Th',
    'Pa','U','Np','Pu','Am','Cm','Bk','Cf','Es','Fm',
    'Md','No','Lr','Rf','Db','Sg','Bh','Hs','Mt','Ds',
    'Rg','Cn','Nh','Fl','Mc','Lv','Ts','Og'
];

const ELEMENT_NAMES = {
    1:'Hidrógeno',2:'Helio',3:'Litio',4:'Berilio',5:'Boro',
    6:'Carbono',7:'Nitrógeno',8:'Oxígeno',9:'Flúor',10:'Neón',
    11:'Sodio',12:'Magnesio',13:'Aluminio',14:'Silicio',15:'Fósforo',
    16:'Azufre',17:'Cloro',18:'Argón',19:'Potasio',20:'Calcio',
    26:'Hierro',29:'Cobre',47:'Plata',79:'Oro',92:'Uranio'
};

// ═══════════════════════════════════════════════════════════════
//  FRECUENCIA COHERENTE — Ley de octavas
//  Garantía: cada Z dobla la frecuencia base al cruzar una "octava"
//  (grupos de período de la tabla). Así los armónicos vuelven a
//  iniciar en cada período — coherencia entre oscilaciones.
// ═══════════════════════════════════════════════════════════════
function atomicPeriod(Z) {
    return Z <= 2  ? 1 : Z <= 10 ? 2 : Z <= 18 ? 3
         : Z <= 36 ? 4 : Z <= 54 ? 5 : Z <= 86 ? 6 : 7;
}

function nuclearFrequency(Z, N) {
    if (Z === 0) return 0.0;
    const A = Z + N; // número másico

    // Período de la tabla periódica (octava del sistema)
    // Z=1-2: período 1, Z=3-10: período 2, etc.
    const period = atomicPeriod(Z);

    // Frecuencia base: cada octava (período) duplica la frecuencia base.
    // Como las octavas musicales — la misma nota, una octava arriba.
    const ω_base = Math.pow(2.0, period - 1); // 1, 2, 4, 8, 16, 32, 64

    // Modulación dentro del período: Z dentro del período normalizado [0..1]
    const periodStart = [0,1,3,11,19,37,55,87][period - 1];
    const periodSize  = [0,2,8, 8,18,18,32,32][period - 1] || 32;
    const t = (Z - periodStart) / periodSize; // posición dentro de la octava

    // La frecuencia sube suavemente dentro del período (de como sube la EN)
    const ω_intra = 1.0 + t * 0.618; // razón áurea — coherente, no arbitraria

    // Corrección de masa: neutrones extra bajan la frecuencia (inercia)
    const massCorrection = Math.sqrt(Z / A); // → 1 para Z=A (sin neutrones)

    return ω_base * ω_intra * massCorrection;
}

// Radio nuclear emergente desde A (fm → wu, escala visual)
function nuclearRadius(A) {
    if (A === 0) return 0.3;
    return 0.3 * Math.pow(A, 1.0 / 3.0); // ley empírica: R ∝ A^(1/3)
}

// ═══════════════════════════════════════════════════════════════
//  ESTADO DEL NÚCLEO
// ═══════════════════════════════════════════════════════════════
let Z = 0; // protones
let N = 0; // neutrones

function getA()   { return Z + N; }
function getSymbol() { return ELEMENTS[Z] || `Z${Z}`; }
function getName()   { return ELEMENT_NAMES[Z] || getSymbol(); }

// Posiciones de los nucleones en Fibonacci sphere
function nucleonPositions(count) {
    if (count === 0) return [];
    const positions = [];
    const golden = Math.PI * (3.0 - Math.sqrt(5.0));
    const R = nuclearRadius(count);
    for (let i = 0; i < count; i++) {
        const y     = 1.0 - (i / Math.max(count - 1, 1)) * 2.0;
        const r     = Math.sqrt(Math.max(0, 1.0 - y * y));
        const theta = golden * i;
        positions.push(new THREE.Vector3(
            R * r * Math.cos(theta),
            R * y,
            R * r * Math.sin(theta)
        ));
    }
    return positions;
}

// ═══════════════════════════════════════════════════════════════
//  THREE.JS — RENDERER + POSTPROCESSING
// ═══════════════════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.4;
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.001, 10000);
camera.position.set(0, 0, 8);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping  = true;
controls.dampingFactor  = 0.07;
controls.minDistance    = 0.002; // podemos entrar hasta nivel quark
controls.maxDistance    = 500;

const bloomPass = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    2.2, 0.5, 0.06
);
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

// ── Bloom sliders ────────────────────────────────────────────────
document.getElementById('bStr').oninput = e => bloomPass.strength  = +e.target.value;
document.getElementById('bRad').oninput = e => bloomPass.radius    = +e.target.value;
document.getElementById('bThr').oninput = e => bloomPass.threshold = +e.target.value;
document.getElementById('bExp').oninput = e => renderer.toneMappingExposure = +e.target.value;

// ═══════════════════════════════════════════════════════════════
//  UNIFORMS — máximo 32 nucleones pasados al shader
// ═══════════════════════════════════════════════════════════════
const MAX_SOURCES = 32;

const uSources   = new Array(MAX_SOURCES).fill(null).map(() => new THREE.Vector3());
const uIsProton  = new Float32Array(MAX_SOURCES); // 1=protón, 0=neutrón

const uniforms = {
    uTime:       { value: 0.0 },
    uCameraPos:  { value: new THREE.Vector3() },
    uBoxSize:    { value: 4.0 },
    uOmega:      { value: 1.0 },     // frecuencia nuclear emergente
    uZ:          { value: 0.0 },     // protones
    uA:          { value: 0.0 },     // nucleones totales
    uNucRadius:  { value: 0.3 },     // radio nuclear en wu
    uShowShells: { value: 1.0 },     // toggle capas electrónicas
    uZoomLevel:  { value: 0.0 },
    uOrbRadius:  { value: 2.5 },   // radio orbital visual en wu
    uSources:    { value: uSources },
    uIsProton:   { value: uIsProton },
    uSourceCount:{ value: 0 },
};

// ═══════════════════════════════════════════════════════════════
//  SHADER — RAYMARCHING VOLUMÉTRICO
// ═══════════════════════════════════════════════════════════════
const vertexShader = /* glsl */`
    varying vec3 vWorldPos;
    void main() {
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vWorldPos = wp.xyz;
        gl_Position = projectionMatrix * viewMatrix * wp;
    }
`;

const fragmentShader = /* glsl */`
precision highp float;

varying vec3 vWorldPos;
uniform vec3  uCameraPos;
uniform float uTime;
uniform float uBoxSize;
uniform float uOmega;
uniform float uZ;
uniform float uA;
uniform float uNucRadius;
uniform float uShowShells;
uniform float uZoomLevel;
uniform float uOrbRadius;  // radio orbital en wu (calculado en JS)

uniform vec3  uSources[32];
uniform float uIsProton[32];
uniform int   uSourceCount;

// ── Hash / ruido 3D rápido ────────────────────────────────────
float hash(vec3 p) {
    p = fract(p * 0.3183099 + 0.1);
    p *= 17.0;
    return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
}
float noise3(vec3 x) {
    vec3 i = floor(x);
    vec3 f = fract(x);
    f = f*f*(3.0-2.0*f);
    return mix(mix(mix(hash(i),            hash(i+vec3(1,0,0)),f.x),
                   mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
               mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),
                   mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z);
}

// ── Tubo de flujo de color (gluón / confinamiento) ───────────
// Cuánta energía hay en el "tubo" entre dos quarks.
// Se estira → más brillante. Se comprime → apagado.
float colorTube(vec3 p, vec3 v1, vec3 v2) {
    vec3  ab  = v2 - v1;
    float len = length(ab);
    if (len < 0.001) return 0.0;
    float t   = clamp(dot(p - v1, ab) / (len*len), 0.0, 1.0);
    vec3  proj = v1 + t * ab;
    float d    = distance(p, proj);
    // Tubo exponencial — más brillante cuanto más cerca del eje
    // Amplitud escala con la separación (string tension)
    return exp(-d * d * 18.0) * (0.4 + len * 1.2);
}

// ── Vórtice de quark (no una esfera — un vórtice matemático) ─
// Campo toroidal centrado en el quark. Sin geometría sólida.
float quarkVortex(vec3 p, vec3 center, float phase) {
    vec3 d = p - center;
    float r = length(d);
    if (r < 0.0001) return 3.0;

    // Campo radial decreciente con modulación angular
    float radial = exp(-r * r * 22.0);

    // Componente toroidal: el "giro" del vórtice
    // Usa el ángulo azimutal como fase
    float azimuth = atan(d.y, d.x);
    float polar   = atan(length(d.xy), d.z);

    // Oscilación rotativa del vórtice (intercambio de color charge)
    float vortexOsc = sin(azimuth * 3.0 + polar * 2.0 + uTime * uOmega * 4.0 + phase);

    // Pulso HDR: cada quark tiene su fase desfasada 120° (rotación de color)
    // Esto garantiza que siempre haya exactamente uno "encendido" a la vez
    float pulse = 0.5 + 0.5 * sin(uTime * uOmega * 6.28318 + phase);
    pulse = pow(pulse, 3.0); // más dramático — apagado largo, pico corto

    return radial * (1.0 + vortexOsc * 0.4) * (0.3 + pulse * 2.5);
}

// ── Mar de quarks virtuales (vacío cuántico hirviente) ────────
// 2 octavas — suficiente para el efecto, 33% más rápido que 3
float quarkyVacuum(vec3 p, float t) {
    float n1 = noise3(p * 5.8 + t * 0.3);
    float n2 = noise3(p * 12.0 - t * 0.17 + 3.7);
    return n1 * 0.6 + n2 * 0.4;
}

// ── Onda de nucleón individual ────────────────────────────────
float nucleonWave(vec3 p, vec3 src, float omega, float t, float isP) {
    float d = distance(p, src);
    if (d < 0.0001) return 1.0;

    // Onda esférica propagándose desde el nucleón
    // Frecuencia base × omega nuclear (coherente con la octava)
    float wave = cos(omega * 12.0 * d - t * omega * 3.14159) * exp(-d * d * 2.2);

    // Protón vs neutrón: fase opuesta (isospín)
    // En física real: protón e isospín +1/2, neutrón isospín -1/2
    wave *= isP > 0.5 ? 1.0 : -1.0;

    return wave;
}

// ── Campo orbital (patrón de Chladni emergente) ───────────────
// uOrbRadius se pasa desde JS donde se calcula correctamente
// en wu visuales, no en función de omega (que diverge).
float orbitalField(vec3 p, float R_orb) {
    float r = length(p);
    if (r < 0.001) return 0.0;
    if (R_orb < 0.01) return 0.0;

    // Envolvente radial: pico en R_orb, ancho ~30% del radio
    float width    = R_orb * 0.35;
    float envelope = exp(-pow((r - R_orb) / width, 2.0));

    // Densidad de probabilidad estacionaria — |ψ|²
    // Nodos en r=0 y r=2·R_orb (orbital 1s simplificado)
    float standing = sin(3.14159 * r / R_orb);

    return envelope * standing * standing; // siempre ≥ 0
}

// ── INTERSECCIÓN RAYO-BOX ──────────────────────────────────────
float boxExit(vec3 ro, vec3 rd, float bs) {
    vec3 tMax = (sign(rd) * bs - ro) / rd;
    return min(min(tMax.x, tMax.y), tMax.z);
}

// ═══════════════════════════════════════════════════════════════
//  MAIN — RAYMARCHING
// ═══════════════════════════════════════════════════════════════
void main() {
    if (uSourceCount == 0) {
        discard;
    }

    vec3 rayDir = normalize(vWorldPos - uCameraPos);
    vec3 rayPos = vWorldPos;

    float tMax    = boxExit(rayPos, rayDir, uBoxSize - 0.001);
    // Pasos adaptativos: más nucleones → núcleo más compacto → menos pasos necesarios
    // Máximo 48, mínimo 24. Ahorra 25-50% en núcleos grandes.
    int   steps    = uSourceCount > 16 ? 28 : (uSourceCount > 6 ? 38 : 48);
    float stepSize = tMax / float(steps);

    vec4 col = vec4(0.0);

    float omega   = uOmega;
    float R_nuc   = uNucRadius;
    float t       = uTime;

    // Posición de los 3 quarks del PRIMER protón (para zoom quark)
    // Triángulo equilátero dentro del nucleón
    float qr = R_nuc * 0.38; // radio del triángulo de quarks
    vec3 src0 = uSourceCount > 0 ? uSources[0] : vec3(0.0);
    vec3 q1 = src0 + vec3(0.0,          qr,       0.0);
    vec3 q2 = src0 + vec3( qr*0.866, -qr*0.5,  0.0);
    vec3 q3 = src0 + vec3(-qr*0.866, -qr*0.5,  0.0);

    // Rotación lenta de los quarks (intercambio de color charge)
    float qrot = t * omega * 0.8;
    mat2 rot2 = mat2(cos(qrot), -sin(qrot), sin(qrot), cos(qrot));
    q1.xy = rot2 * (q1.xy - src0.xy) + src0.xy;
    q2.xy = rot2 * (q2.xy - src0.xy) + src0.xy;
    q3.xy = rot2 * (q3.xy - src0.xy) + src0.xy;

    for (int i = 0; i < 64; i++) {
        if (float(i) * stepSize > tMax) break;
        if (col.a >= 0.97) break;

        vec3 p = rayPos + rayDir * (float(i) * stepSize + stepSize * 0.5);

        // ── 1. CAMPO NUCLEAR (interferencia de todos los nucleones) ──
        // Contribución significativa solo dentro de ~2.5 radios del núcleo.
        // Si el punto está lejos de todos los nucleones, skip.
        float nucField = 0.0;
        float distFromOrigin = length(p);
        // Radio efectivo del núcleo + margen de onda
        float nucZone = R_nuc * 2.5 + 1.0 / omega;
        if (distFromOrigin < nucZone * 3.0) {
            for (int s = 0; s < 32; s++) {
                if (s >= uSourceCount) break;
                float ds = distance(p, uSources[s]);
                // exp(-d²×2.2) < 0.01 cuando d > 1.44 — skip si más lejos
                if (ds > 2.2) continue;
                nucField += nucleonWave(p, uSources[s], omega, t, uIsProton[s]);
            }
        }

        // ── 2. VÓRTICES DE QUARKS (solo visibles en zoom cercano) ───
        float quarkField = 0.0;
        float tubeField  = 0.0;

        // uZoomLevel: 0=léjos, 1=cerca del núcleo
        // Emergencia gradual: los quarks se revelan al hacer zoom
        float quarkVis = smoothstep(0.3, 1.0, uZoomLevel);

        if (quarkVis > 0.01) {
            // Fases desfasadas 120° — siempre hay uno "encendido"
            // Esto es el intercambio de carga de color: R→G→B→R
            quarkField += quarkVortex(p, q1, 0.0);
            quarkField += quarkVortex(p, q2, 2.0943951); // 2π/3
            quarkField += quarkVortex(p, q3, 4.1887902); // 4π/3

            // Tubos de gluón entre quarks
            tubeField += colorTube(p, q1, q2);
            tubeField += colorTube(p, q2, q3);
            tubeField += colorTube(p, q3, q1);
        }

        // ── 3. MAR DE QUARKS VIRTUALES (vacío hirviente) ────────────
        float seaField = 0.0;
        float distToCore = length(p);
        if (distToCore < R_nuc * 2.5) {
            seaField = quarkyVacuum(p, t) * 0.15
                     * exp(-distToCore / (R_nuc * 1.5));
        }

        // ── 4. ORBITAL (patrón de Chladni — el At-Ohm) ──────────────
        float orbital = 0.0;
        if (uShowShells > 0.5 && uZ > 0.0) {
            orbital = orbitalField(p, uOrbRadius);
        }

        // ══ COLORACIÓN ════════════════════════════════════════════════

        // Campo nuclear: rojo/cian según fase (protón/neutrón)
        float af = abs(nucField);
        if (af > 0.12) {
            vec3 posCol = vec3(2.2, 0.12, 0.45);  // magenta-rojo (protón)
            vec3 negCol = vec3(0.12, 1.4, 2.2);   // cian-azul (neutrón)
            vec3 baseCol = mix(negCol, posCol, step(0.0, nucField));

            // Resonancia dorada en picos (donde las ondas se refuerzan)
            float peak = smoothstep(0.45, 0.88, af);
            baseCol += vec3(3.0, 1.8, 0.3) * peak;

            float alpha = (af - 0.12) * 0.14 * stepSize / 0.1;
            alpha = clamp(alpha, 0.0, 0.05);
            col.rgb += baseCol * alpha * (1.0 - col.a);
            col.a   += alpha * (1.0 - col.a);
        }

        // Vórtices de quark: blanco-dorado HDR (tensión pura)
        // No son esferas de color — son puntos donde la función explota
        if (quarkField > 0.15 && quarkVis > 0.01) {
            // Color base: oro blanco — no RGB, la tensión no tiene "color"
            // El color charge es abstracto, no visible
            vec3 qCol = vec3(2.8, 2.2, 1.4); // blanco cálido

            // Halo tenue alrededor del vórtice
            vec3 halo = vec3(1.4, 0.9, 0.5) * smoothstep(0.15, 0.6, quarkField);

            float qa = quarkField * 0.12 * quarkVis;
            qa = clamp(qa, 0.0, 0.08);
            col.rgb += (qCol * smoothstep(0.6, 1.5, quarkField) + halo) * qa * (1.0 - col.a);
            col.a   += qa * (1.0 - col.a);
        }

        // Tubos de gluón: dorado intenso
        if (tubeField > 0.08 && quarkVis > 0.01) {
            vec3 tubeCol = vec3(3.5, 2.2, 0.3); // dorado-naranja brillante
            float ta = tubeField * 0.15 * quarkVis;
            ta = clamp(ta, 0.0, 0.1);
            col.rgb += tubeCol * ta * (1.0 - col.a);
            col.a   += ta * (1.0 - col.a);
        }

        // Mar de quarks virtuales: niebla tenue plateada
        if (seaField > 0.0) {
            vec3 seaCol = vec3(0.6, 0.7, 0.9) * seaField;
            float sa = seaField * 0.04;
            col.rgb += seaCol * sa * (1.0 - col.a);
            col.a   += sa * (1.0 - col.a);
        }

        // Orbital At-Ohm: shell verde-teal suave (el electrón como patrón)
        if (orbital > 0.02 && uShowShells > 0.5) {
            vec3 orbCol = vec3(0.3, 2.0, 1.4); // teal-verde
            // Modulación temporal lenta — el orbital respira
            float breathe = 0.7 + 0.3 * sin(t * omega * 0.5);
            float oa = orbital * 0.06 * breathe;
            oa = clamp(oa, 0.0, 0.04);
            col.rgb += orbCol * oa * (1.0 - col.a);
            col.a   += oa * (1.0 - col.a);
        }
    }

    if (col.a < 0.004) discard;
    gl_FragColor = col;
}
`;

// ═══════════════════════════════════════════════════════════════
//  MESH VOLUMÉTRICO
// ═══════════════════════════════════════════════════════════════
const BOX = 4.0;
const material = new THREE.ShaderMaterial({
    uniforms,
    vertexShader,
    fragmentShader,
    transparent: true,
    side:        THREE.FrontSide,
    depthWrite:  false,
    blending:    THREE.NormalBlending,
});

const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(BOX*2, BOX*2, BOX*2),
    material
);
scene.add(mesh);

// Partículas de fondo — vacío cuántico ambiental
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(800 * 3);
for (let i = 0; i < 800 * 3; i++) starPos[i] = (Math.random() - 0.5) * 120;
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({
    color: 0x112233, size: 0.06, sizeAttenuation: true
})));

// ═══════════════════════════════════════════════════════════════
//  ACTUALIZAR SHADER DESDE ESTADO DEL NÚCLEO
// ═══════════════════════════════════════════════════════════════
function syncNucleus() {
    const A = getA();
    const ω = nuclearFrequency(Z, N);
    const R = nuclearRadius(A);

    uniforms.uOmega.value     = Math.max(ω, 0.001);
    uniforms.uZ.value         = Z;
    uniforms.uA.value         = A;
    uniforms.uNucRadius.value = R;
    uniforms.uSourceCount.value = Math.min(A, MAX_SOURCES);

    // Box: crece con el núcleo pero tiene mínimo razonable
    const boxSize = Math.max(4.0, R * 3.5 + 2.0);
    uniforms.uBoxSize.value = boxSize;
    mesh.scale.setScalar(boxSize / BOX);

    // Posiciones de nucleones
    const allPos = nucleonPositions(A);
    // Protones primero, neutrones después
    const protonCount  = Z;

    allPos.forEach((pos, i) => {
        if (i < MAX_SOURCES) {
            uSources[i].copy(pos);
            uIsProton[i] = i < protonCount ? 1.0 : 0.0;
        }
    });

    // HUD
    const sym  = getSymbol();
    const name = getName();
    const period = atomicPeriod(Z);
    // Radio orbital visual: siempre fuera del núcleo, visible en el box
    // Escala con período (capas): H=1.8, He=1.6, Li=2.2, Ne=2.0...
    // Refleja que los períodos más altos tienen orbitales más grandes
    const R_orb = Math.max(R * 1.8, 1.2 + period * 0.35);
    uniforms.uOrbRadius.value = R_orb;

    document.getElementById('element-display').textContent =
        A === 0 ? '— vacío cuántico —'
                : `${sym} · ${name} · Z=${Z} N=${N} A=${A}`;
    document.getElementById('s-p').textContent = Z;
    document.getElementById('s-n').textContent = N;
    document.getElementById('s-a').textContent = A;
}

// ═══════════════════════════════════════════════════════════════
//  ZOOM LEVEL — emergencia visual de quarks al acercarse
// ═══════════════════════════════════════════════════════════════
function updateZoomLevel() {
    const dist = camera.position.length();
    const R    = Math.max(uniforms.uNucRadius.value, 0.3);

    // Zoom 0: lejos (orbital visible)
    // Zoom 1: dentro del núcleo (quarks visibles)
    const zl = 1.0 - smoothstep(R * 0.8, R * 3.0, dist);
    uniforms.uZoomLevel.value = zl;

    const label = dist > R * 8  ? 'orbital'
                : dist > R * 2  ? 'núcleo'
                :                 'quarks ⚡';
    document.getElementById('s-z').textContent = label;
}

function smoothstep(edge0, edge1, x) {
    const t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
    return t * t * (3 - 2 * t);
}

// ═══════════════════════════════════════════════════════════════
//  BOTONES
// ═══════════════════════════════════════════════════════════════
document.getElementById('btn-addP').onclick = () => { Z++; syncNucleus(); };
document.getElementById('btn-addN').onclick = () => { N++; syncNucleus(); };
document.getElementById('btn-remP').onclick = () => { if (Z > 0) { Z--; syncNucleus(); } };
document.getElementById('btn-remN').onclick = () => { if (N > 0) { N--; syncNucleus(); } };
document.getElementById('btn-reset').onclick = () => { Z = 0; N = 0; syncNucleus(); };

let shellsOn = true;
document.getElementById('btn-shells').onclick = function() {
    shellsOn = !shellsOn;
    uniforms.uShowShells.value = shellsOn ? 1.0 : 0.0;
    this.textContent = shellsOn ? 'Capas ON' : 'Capas OFF';
};

// ═══════════════════════════════════════════════════════════════
//  LOOP
// ═══════════════════════════════════════════════════════════════
let lastT = 0;
function animate(t) {
    requestAnimationFrame(animate);
    const dt = Math.min((t - lastT) / 1000, 0.05);
    lastT = t;

    uniforms.uTime.value += dt;
    uniforms.uCameraPos.value.copy(camera.position);

    updateZoomLevel();
    controls.update();
    composer.render();
}

// Iniciar con hidrógeno
Z = 1; N = 0;
syncNucleus();
animate(0);

// ─── RESIZE ───────────────────────────────────────────────────
window.addEventListener('resize', () => {
    const w = window.innerWidth, h = window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
    composer.setSize(w, h);
    bloomPass.resolution.set(w, h);
});
</script>
</body>
</html>
